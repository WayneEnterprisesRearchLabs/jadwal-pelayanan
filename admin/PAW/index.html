<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0c10">
<link rel="apple-touch-icon" href="icons/ADMIN-192.png">
<link rel="icon" type="image/png" href="icons/ADMIN-192.png">
<link rel="manifest" href="manifest.json">
<title>Admin Page - PAW</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
        integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
/* ── BASE RESET ─────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --page-pad: 25px;
  --gate-top: 17svh;
  --hdr-space: 250px;
}
        
html {
  -webkit-text-size-adjust: 100%;
  background: #0a0c10;
  overflow-x: hidden;
  width: 100%;
  max-width: 100%;
}

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: #0a0c10;
  color: #f0f0f5;
  min-height: 100svh;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  padding-top: env(safe-area-inset-top, 0px);
  user-select: none;
  -webkit-user-select: none;
}

input, textarea {
  user-select: text;
  -webkit-user-select: text;
}

/* ── HORIZONTAL TABLE ROLL OVER ─────── */
.ring-scroll {
  width: 100% !important;
  max-width: 100% !important;
  overflow-x: auto !important; /* Table scrolls internally, doesn't stretch screen */
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
}

.ring-tbl {
  min-width: 600px; /* Gives the summary table room to breathe */
}

/* ── OVERLAY + DRAWER ─────── */
.ov{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .3s}

/* ── OVERLAY + DRAWER ── */
.ov{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.7);opacity:0;pointer-events:none;transition:opacity .3s}
.ov.on{opacity:1;pointer-events:all}
.dr{position:fixed;left:0;top:0;bottom:0;z-index:200;width:260px;background:#12151c;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .32s cubic-bezier(.22,1,.36,1);padding-top:env(safe-area-inset-top,0px)}
.dr.on{transform:translateX(0)}
.dr-top{display:flex;align-items:center;gap:11px;padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.dr-ring{width:36px;height:36px;border-radius:50%;background:#e8b84b;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;animation:logoThrob 2.8s ease-in-out infinite}
.dr-ring img{width:100%;height:100%;object-fit:cover;display:block}
/* box-shadow ripple, not a ::after ring — the logo's own overflow:hidden would
   clip a pseudo-element, but never its own shadow. */
@keyframes logoThrob{
  0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(232,184,75,.45)}
  50%    {transform:scale(1.07);box-shadow:0 0 0 7px rgba(232,184,75,0)}
}
.dr-ring svg{width:19px;height:19px}
.dr-sub{font-size:10px;color:#8890aa;letter-spacing:.06em;text-transform:uppercase}
.dr-title{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;line-height:1.3;margin-top:1px}
.dr-nav{flex:1;padding:10px 0}
.dr-item{display:flex;align-items:center;gap:12px;padding:13px 18px;cursor:pointer;font-size:15px;font-weight:500;color:#8890aa;transition:background .12s,color .12s;position:relative}
.dr-item:active{background:rgba(255,255,255,.04)}
.dr-item.on{color:#f0f0f5}
.dr-item.on::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 3px 3px 0;background:#e8b84b}
.dr-item svg{opacity:.6;flex-shrink:0}
.dr-item.on svg{opacity:1}
.dr-close{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);color:#4a5070;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;padding-bottom:calc(14px + env(safe-area-inset-bottom,0px))}

/* ── PAGE ─────────────────── */
.page {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
  position: relative;
  overflow: hidden;
}


/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:40;background:#12151c;border-bottom:1px solid rgba(255,255,255,.08);padding:28px var(--page-pad) 20px;margin-bottom:16px;width:100%;transform-origin:top center}
/* Entrance only fires once the person is actually in the app (body.app-in),
   so it isn't wasted playing behind the gate on first paint. */
body.app-in .hdr{animation:hdrSlideIn .8s cubic-bezier(.22,1,.36,1) both}
@keyframes hdrSlideIn{
  0%  { opacity:0; transform:translateY(-46px) scaleY(.92); }
  70% { opacity:1; transform:translateY(3px) scaleY(1.015); }
  100%{ transform:translateY(0) scaleY(1); }
}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:0}
.menu-btn{width:36px;height:36px;border-radius:10px;background:none;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#f0f0f5;transition:background .15s;margin-left:-8px}
.menu-btn:active{background:rgba(255,255,255,.08)}
.hdr-text{flex:1;min-width:0}
.hdr-l1{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;line-height:1.22;letter-spacing:-.02em;color:#f0f0f5}

/* department pill — identical shape/colour/icon system to the volunteer app */
.dept-pill{display:inline-flex;align-items:center;gap:7px;padding:7px 13px 7px 9px;border-radius:11px;flex-shrink:0}
.dept-pill-icon{display:flex;align-items:center;justify-content:center;width:16px;height:16px;flex-shrink:0}
.dept-pill-icon svg{width:100%;height:100%;display:block}
.dept-pill-name{font-family:'Syne',sans-serif;font-weight:800;font-size:12px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}

/* Slides in once, then hands transform over to pillThrob. Scoped to #dept-pill,
   NOT .dept-pill — the lock dropdown reuses the class and must stay still. */
#dept-pill{position:relative;opacity:0}
#dept-pill.in{animation:deptSlideIn .85s cubic-bezier(.22,1,.36,1) .12s both, pillThrob 3.4s ease-in-out 1s infinite}
#dept-pill::after{content:'';position:absolute;inset:0;border-radius:inherit;border:1.5px solid currentColor;pointer-events:none;opacity:0}
#dept-pill.in::after{animation:pillHalo 3.4s cubic-bezier(.22,1,.36,1) 1s infinite}
@keyframes deptSlideIn{
  0%  {opacity:0;transform:translateX(78px) scale(.86)}
  60% {opacity:1;transform:translateX(-5px) scale(1.04)}
  100%{opacity:1;transform:translateX(0) scale(1)}
}
@keyframes pillThrob{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}
@keyframes pillHalo{0%{opacity:.5;transform:scale(1)}70%,100%{opacity:0;transform:scale(1.3)}}

/* ── CONTENT ── */
.content{flex:1;padding-left:var(--page-pad);padding-right:var(--page-pad);padding-bottom:calc(env(safe-area-inset-bottom,0px)+80px);box-sizing:border-box;overflow-x:hidden}

/* ── LOADING — dot-bounce, same as the volunteer app ──
   The three dots are the element itself + its ::before/::after, so every
   existing `<div class="big-spin"><span></span><span></span><span></span></div>` call site keeps working untouched. */
.init-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:calc(100svh - var(--hdr-space));padding:0}
/* Three real spans, like the volunteer app. The pseudo-element version had the
   container itself animating, so ::before/::after — being its children — got the
   parent's transform compounded onto their own. Container is now static.
   transform-origin:center bottom is what keeps the squash grounded: the bottom
   edge stays planted instead of the whole dot shrinking around its middle. */
.big-spin{display:flex;align-items:flex-end;justify-content:center;gap:8px;width:auto;height:32px;background:none;border:none;border-radius:0;margin:0 auto 24px;animation:none}
.big-spin span{width:12px;height:12px;border-radius:50%;background:#e8b84b;transform-origin:center bottom;animation:dotBounce .9s cubic-bezier(.34,1.56,.64,1) infinite}
.big-spin span:nth-child(2){animation-delay:.13s}
.big-spin span:nth-child(3){animation-delay:.26s}
.big-spin-lbl{font-size:15px;color:#8890aa;animation:ldPulse 1.3s ease-in-out infinite}
@keyframes dotBounce{
  0%   { transform:translateY(0) scale(1,1); }
  12%  { transform:translateY(0) scale(1.3,.7); }
  30%  { transform:translateY(-20px) scale(.8,1.25); }
  50%  { transform:translateY(-20px) scale(.8,1.25); }
  68%  { transform:translateY(0) scale(1.3,.7); }
  82%  { transform:translateY(0) scale(.92,1.08); }
  100% { transform:translateY(0) scale(1,1); }
}
@keyframes ldPulse{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.96) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* ── MONTH NAV — centered, yellow, auto below ── */
.month-nav-wrap{margin-top:8px;margin-bottom:28px}
.month-nav-wrap{margin-top:20px}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
/* Yellow, large month label */
.month-lbl{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.01em;color:#e8b84b;text-align:center;flex:1}
.mon-btn{width:36px;height:36px;border-radius:10px;background:#12151c;border:1px solid rgba(255,255,255,.13);color:#8890aa;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;flex-shrink:0}
.mon-btn:active{background:#222737;color:#f0f0f5}
.mon-btn:disabled{opacity:.22;cursor:default}
/* Auto assign all — full width below month nav */
.auto-all-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:12px;background:rgba(232,184,75,.13);border:1.5px solid rgba(232,184,75,.3);color:#e8b84b;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;margin-bottom:16px}

/* ── PUBLISH TOGGLE (per-month OPEN / CLOSE) ── */
.pub-toggle{display:flex;gap:8px}
.pub-btn{flex:1;padding:16px 0;border-radius:13px;background:#12151c;border:1.5px solid rgba(255,255,255,.13);color:#8890aa;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:.03em;cursor:pointer;transition:background .15s,border-color .15s,color .15s}
.pub-btn:active{transform:translateY(1px)}
.pub-btn.pub-close.active{background:rgba(220,53,69,.16);border-color:rgba(220,53,69,.6);color:#ff6b7a}
.pub-btn.pub-open.active{background:rgba(40,167,69,.16);border-color:rgba(40,167,69,.6);color:#4ade80}
.pub-note{margin-top:7px;font-size:11.5px;text-align:center;color:#8890aa;line-height:1.4}
.pub-note.closed{color:#ff6b7a}
.pub-note.open{color:#6ee7a0}
.rs-sub-hint{font-size:11px;color:#e8b84b;opacity:.92;margin:3px 0 2px 5px;line-height:1.35}
.rs-sub-hint b{font-weight:700}


/* ── EVENT LIST ── */
.ev-list{display:flex;flex-direction:column;gap:0}
.day-group{margin-bottom:20px}
.day-group{margin-top:20px}
/* Yellow, bigger date header */
.day-group-hdr{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#e8b84b;margin-bottom:10px;letter-spacing:-.01em}
.ev-cards{display:flex;flex-direction:column;gap:8px}
.ev-card{background:#12151c;border:1.5px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s,background .15s;animation:fadeUp .25s cubic-bezier(.22,1,.36,1) both}
@keyframes ev-breathe{0%,100%{box-shadow:0 0 0 0 rgba(232,184,75,0)}50%{box-shadow:0 0 0 9px rgba(232,184,75,.35)}}
.ev-card.just-saved{animation:ev-breathe 1s ease-in-out 1}
.ev-card:nth-child(1){animation-delay:.02s}.ev-card:nth-child(2){animation-delay:.05s}.ev-card:nth-child(3){animation-delay:.08s}
.ev-card:active{background:#1a1e28}
.ev-card.filled{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.06)}
.ev-card.filled .ev-svc-name{color:#4ade80}
.ev-card.filled .ev-svc-time{color:#2d9e57}
.ev-card.partial{border-color:rgba(232,184,75,.2);background:rgba(232,184,75,.03)}
.ev-card.partial .ev-svc-name{color:#e8b84b}
.ev-card.partial .ev-svc-time{color:#c49a32}
.ev-card.empty-tmpl{opacity:.65}
.ev-svc-info{flex:1;min-width:0}
.ev-svc-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#f0f0f5}
.ev-svc-time{font-size:13px;color:#8890aa;margin-top:2px}
.ev-fill-badge{flex-shrink:0;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.badge-full{background:rgba(74,222,128,.15);color:#4ade80}
.badge-partial{background:rgba(232,184,75,.15);color:#e8b84b}
.badge-empty{background:rgba(255,255,255,.06);color:#8890aa}
.ev-arrow{color:#4a5070;flex-shrink:0;display:flex;align-items:center}

/* ── ADD EVENT ── */
.add-ev-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:14px;border:1.5px dashed rgba(255,255,255,.15);background:none;color:#8890aa;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;transition:border-color .15s,color .15s}
.add-ev-btn:active{border-color:rgba(232,184,75,.4);color:#e8b84b}
.add-ev-form{background:#12151c;border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:16px;margin-top:8px;animation:fadeUp .2s cubic-bezier(.22,1,.36,1)}
.add-ev-form-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:12px;color:#e8b84b}
.form-row{margin-bottom:10px}
.form-inp{background:#1a1e28;border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:#f0f0f5;outline:none;-webkit-appearance:none;width:100%;transition:border-color .2s}
.form-inp:focus{border-color:#e8b84b}
.form-inp::placeholder{color:#4a5070}
.form-row-btns{display:flex;gap:8px}
.btn-save{flex:1;padding:10px;border-radius:10px;border:none;background:#e8b84b;color:#0a0c10;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.btn-cancel{padding:10px 16px;border-radius:10px;border:1.5px solid rgba(255,255,255,.1);background:none;color:#8890aa;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
.chk-row{display:flex;align-items:center;gap:10px;padding:8px 2px;cursor:pointer;font-size:13px;color:#8890aa}
.chk-box{position:relative;width:20px;height:20px;flex-shrink:0;-webkit-appearance:none;appearance:none;border-radius:6px;border:1.5px solid rgba(167,139,250,.4);background:rgba(167,139,250,.08);cursor:pointer;transition:all .15s;margin:0}
.chk-box:checked{background:#a78bfa;border-color:#a78bfa}
.chk-box:checked::after{content:'';position:absolute;left:6px;top:2px;width:5px;height:10px;border:solid #0a0c10;border-width:0 2px 2px 0;transform:rotate(45deg)}
#rp-copy-all{border-color:rgba(232,184,75,.45);background:rgba(232,184,75,.08)}
#rp-copy-all:checked{background:#e8b84b;border-color:#e8b84b}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(20px);background:#1a1e28;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 20px;font-size:14px;color:#f0f0f5;box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap;z-index:500}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(74,222,128,.3);color:#4ade80}
.toast.err{border-color:rgba(248,113,113,.3);color:#f87171}
.toast.warn{border-color:rgba(232,184,75,.3);color:#e8b84b}


/* ── ROSTER PAGE ── */
/* position:fixed, not absolute. Absolute anchored it to .page's TOP — and .page
   grows with the jadwal list — so opening the roster while scrolled down slid the
   panel in far above the viewport, forcing the jump to top you were seeing.
   visibility keeps the closed panel from hanging off the right edge on desktop,
   delayed so it only hides AFTER the slide-out finishes. */
.roster-page{position:fixed;top:0;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;z-index:100;background:#0d0f14;transform:translateX(100%);visibility:hidden;transition:transform .32s cubic-bezier(.22,1,.36,1),visibility 0s linear .32s;display:flex;flex-direction:column;overflow:hidden;padding-top:env(safe-area-inset-top,0px);padding-bottom:0}
.roster-page.on{transform:translateX(0);visibility:visible;transition:transform .32s cubic-bezier(.22,1,.36,1),visibility 0s}
@media(max-width:480px){
  .roster-page{left:0;transform:translateX(100vw)}
  .roster-page.on{transform:translateX(0)}
}
.rp-hdr{padding:14px var(--page-pad);background:#0d0f14;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;margin-bottom:14px}
.rp-hdr-row1{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.rp-back{width:36px;height:36px;border-radius:10px;background:none;border:1.5px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#f0f0f5;flex-shrink:0}
.rp-back:active{background:rgba(255,255,255,.08)}
.rp-info{flex:1;min-width:0}
.rp-date{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.01em;color:#f0f0f5}
.rp-svc{font-size:13px;color:#8890aa;margin-top:2px}
.rp-edit-form{background:#1a1e28;border-radius:12px;padding:12px;display:none;flex-direction:column;gap:8px}
.rp-edit-form.on{display:flex}
.rp-edit-row{display:flex;gap:8px}
.rp-inp{background:#0d0f14;border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:#f0f0f5;outline:none;-webkit-appearance:none;flex:1;min-width:0;transition:border-color .2s}
.rp-inp:focus{border-color:#e8b84b}
.rp-inp::placeholder{color:#4a5070}
.rp-edit-btns{display:flex;gap:8px}
.rp-apply-btn{flex:1;padding:9px;border-radius:9px;border:none;background:#e8b84b;color:#0a0c10;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.rp-cancel-edit-btn{padding:9px 14px;border-radius:9px;border:1.5px solid rgba(255,255,255,.1);background:none;color:#8890aa;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.rp-auto-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:11px;background:rgba(232,184,75,.13);border:1.5px solid rgba(232,184,75,.28);color:#e8b84b;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:24px;margin-bottom:16px}

.rp-auto-btn:active{background:rgba(232,184,75,.22)}
.rp-body{flex:1;overflow-y:auto;padding:0px var(--page-pad) 150px}
.rp-save-bar{position:absolute;bottom:0;left:0;right:0;padding:12px var(--page-pad) calc(12px + env(safe-area-inset-bottom,0px));background:linear-gradient(0deg,#0d0f14 85%,transparent);display:flex;flex-direction:column;gap:8px}
.rp-save-btn{width:100%;padding:14px;border-radius:13px;border:none;background:#333744;color:#666a7a;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:default;transition:background .25s,color .25s}
.rp-save-btn.dirty{background:#e8b84b;color:#0a0c10;cursor:pointer}
.rp-save-btn:active{opacity:.85;transform:scale(.98)}
.rp-save-btn:disabled{opacity:.4;cursor:default}
/* ── COPY TO SIBLING SERVICES ── */
.rp-copy-row{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:11px;background:rgba(232,184,75,.10);border:1px solid rgba(232,184,75,.28);font-size:13px;font-weight:600;color:#e8b84b;cursor:pointer;line-height:1.35;transition:background .15s}
.rp-copy-row:active{background:rgba(232,184,75,.18)}

/* ── CATATAN ── */
.notes-list{display:flex;flex-direction:column;gap:12px;padding-top:6px}
.note-card{background:#12151c;border:1.5px solid rgba(255,255,255,.07);border-radius:16px;padding:18px;animation:fadeUp .3s cubic-bezier(.22,1,.36,1) both;position:relative}
.note-card:nth-child(1){animation-delay:.04s}.note-card:nth-child(2){animation-delay:.08s}
.note-date{font-size:11px;color:#4a5070;margin-bottom:5px}

.note-del-btn{padding:8px 14px;border-radius:9px;border:1.5px solid rgba(248,113,113,.25);background:none;color:#f87171;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.note-form{background:#12151c;border:1.5px solid rgba(232,184,75,.25);border-radius:16px;padding:18px;margin-bottom:12px;animation:fadeUp .2s cubic-bezier(.22,1,.36,1)}
.note-form-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#e8b84b;margin-bottom:14px}

.note-form-inp:focus{border-color:#e8b84b}

.note-form-cancel{padding:10px 16px;border-radius:10px;border:1.5px solid rgba(255,255,255,.1);background:none;color:#8890aa;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
.add-note-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:14px;border:1.5px dashed rgba(255,255,255,.15);background:none;color:#8890aa;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;transition:border-color .15s,color .15s}
.add-note-btn:active{border-color:rgba(232,184,75,.4);color:#e8b84b}

/* ── ADMIN LOGIN GATE (matches volunteer gate) ─────── */
.lock{
  position:fixed;
  inset:0;
  z-index:9999;
  background:#0a0c10;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:calc(env(safe-area-inset-top,0px) + var(--gate-top)) var(--page-pad) 16px;
  overflow-y:auto;
  transition:opacity .35s ease
}
.lock.hide{opacity:0;pointer-events:none}
.lock-card{
  width:100%;
  max-width:360px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  opacity:0
}
.lock-card.in{animation:gatePop .62s cubic-bezier(.22,1.12,.36,1) both}
@keyframes gatePop{
  0%  { opacity:0; transform:scale(.94) translateY(18px); }
  70% { opacity:1; transform:scale(1.01) translateY(-2px); }
  100%{ opacity:1; transform:scale(1) translateY(0); }
}
.lock-ring{
  width:64px;
  height:64px;
  border-radius:20px;
  background:rgba(232,184,75,.13);
  border:1px solid rgba(232,184,75,.22);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 22px;
  overflow:hidden;
  animation:breathe 3s ease-in-out infinite
}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(232,184,75,.1)}50%{box-shadow:0 0 0 16px transparent}}
.lock-ring svg{width:28px;height:28px;color:#e8b84b}
.lock-ring img{width:100%;height:100%;object-fit:cover;display:none}
.lock-title{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:24px;
  letter-spacing:-.02em;
  text-align:center;
  margin-bottom:7px;
  color:#f0f0f5
}
.lock-sub{
  font-size:14px;
  color:#8890aa;
  text-align:center;
  line-height:1.6;
  margin-bottom:30px
}
.lock-form{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:0;
  padding:0 20px
}
.lock-form .dept-pick{margin-bottom:14px}
.lock-input-wrap{position:relative;width:100%;margin-bottom:14px}
.lock-input{
  width:100%;
  background:#12151c;
  border:1.5px solid rgba(255,255,255,.13);
  border-radius:13px;
  padding:13px 46px 13px 15px;
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  color:#f0f0f5;
  outline:none;
  -webkit-appearance:none;
  appearance:none;
  transition:border-color .2s,box-shadow .2s
}
.lock-input::placeholder{color:#4a5070}
.lock-input:focus{border-color:#e8b84b;box-shadow:0 0 0 3px rgba(232,184,75,.1)}
.lock-eye{
  position:absolute;
  right:6px;
  top:50%;
  transform:translateY(-50%);
  width:36px;
  height:36px;
  border:none;
  background:none;
  color:#8890aa;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border-radius:10px;
  transition:color .15s
}
.lock-eye:active{color:#e8b84b}
.lock-err{
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  color:#ff6b7a;
  min-height:18px;
  transition:opacity .15s;
  margin-bottom:4px;
  text-align:center
}
.lock-btn{
  width:100%;
  padding:14px;
  border-radius:13px;
  border:none;
  background:#e8b84b;
  color:#0a0c10;
  font-family:'Syne',sans-serif;
  font-size:16px;
  font-weight:800;
  letter-spacing:-.01em;
  cursor:pointer;
  transition:opacity .2s,transform .15s
}
.lock-btn:active{opacity:.85;transform:scale(.98)}
.lock-btn:disabled{opacity:.4;cursor:default}
.lock-spin{
  width:16px;
  height:16px;
  border:2px solid rgba(10,12,16,.35);
  border-top-color:#0a0c10;
  border-radius:50%;
  display:inline-block;
  vertical-align:middle;
  animation:lock-spin .7s linear infinite
}
@keyframes lock-spin{to{transform:rotate(360deg)}}

/* ── LOCK LOADING OVERLAY ── */
.lock-load{
  position:absolute;
  inset:0;
  z-index:10;
  background:#0a0c10;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:opacity .35s ease
}
.lock-load.off{opacity:0;pointer-events:none}
.lock-load .big-spin{margin:0 auto 24px}

/* ── DEPT PICKER (matches volunteer gate) ── */
.dept-pick{position:relative;width:100%}
.dept-trig{
  width:100%;
  min-height:46px;
  background:
#12151c;
  border:1.5px solid rgba(255,255,255,.13);
  border-radius:13px;
  padding:7px 11px 7px 10px;
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  transition:border-color .2s,box-shadow .2s,background .2s
}
.dept-trig.on{box-shadow:0 0 0 3px rgba(232,184,75,.1)}
.dept-trig:not(.picked).on{border-color:
#e8b84b}
.dept-trig.picked{/* bg/color/border set inline by JS */}
.dept-trig-ph{font-size:14px;color:
#4a5070;padding:0 2px}
.dept-trig-chev{margin-left:auto;padding-left:2px;flex-shrink:0;color:
#8890aa;transition:transform .22s cubic-bezier(.34,1.7,.64,1)}
.dept-trig.on .dept-trig-chev{transform:rotate(180deg)}
.dept-menu{
  position:absolute;
  top:calc(100% + 5px);
  left:0;
  right:0;
  z-index:120;
  background:#12151c;
  border:1.5px solid rgba(255,255,255,.13);
  border-radius:14px;
  padding:6px;
  max-height:340px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  display:none;
  box-shadow:0 14px 44px rgba(0,0,0,.75);
  animation:popIn .16s cubic-bezier(.34,1.5,.64,1) both;
  text-align:center
}
.dept-opt{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 6px;border-radius:12px;cursor:pointer;transition:background .1s;text-align:center}
.dept-opt:active{background:
#1a1e28}
.dept-opt.sel{background:var(--d-bg,rgba(255,255,255,.04));box-shadow:inset 0 0 0 1px var(--d-fg,transparent)}
.dept-opt-check{margin-left:auto;color:var(--d-fg,
#e8b84b);flex-shrink:0;opacity:0;transition:opacity .12s}
.dept-opt.sel .dept-opt-check{opacity:1}        
        
</style>

<div class="lock-input-wrap">

var EXEC_URL = "https://script.google.com/macros/s/AKfycbyRFSxg1KEJelSsBMs4rBBf6-h0G1jiWF04TsITRzFhkvGd-sIhLbjlaB3K3HgkghIA/exec";

var API_PARAM_MAP = {
  getConfig:         [],
  verifyKey:         ['dept','key'],
  getAdminData:      ['dept','year','month'],
  getMonthStatus:    ['dept','year','month'],
  setMonthStatus:    ['dept','year','month','status'],
  saveServiceRoster: ['dept','dateStr','service','time','dayName','rosterJson','isSpecial'],
  saveManyRosters:   ['dept','servicesJson'],
  deleteService:     ['dept','dateStr','service','time'],
  getNotes:          ['dept'],
  saveNote:          ['dept','idx','tanggal','judul','isi','oleh','link'],
  deleteNote:        ['dept','idx'],
  getAvailabilityMatrix: ['dept','year','month'],

  getSongGroups:     [],

// Matches the backend's ADMIN_ACTIONS in code.gs exactly (getAdminData is
// gated server-side too, not just the writes) — plus verifyKey, which needs
// the key sent but must NOT have it overwritten by the stored ADMIN_KEY var.
// All of these go over POST so the key never sits in a URL query string or
// server log, even for the "read" (getAdminData).
var API_KEY_REQUIRED = ['verifyKey','getAdminData','saveServiceRoster','saveManyRosters','deleteService',
  'saveNote','deleteNote','setMonthStatus','setAvailStatus','getAvailabilityMatrix',

var ADMIN_KEY  = sessionStorage.getItem('gms_admin_key')  || "";

/* ── HAPTICS ──
   navigator.vibrate is Android Chrome only (iOS Safari has no vibration API at
   all — this stays silent there, not broken). One delegated listener instead of
   touching every onclick: tag the elements that should buzz and match by closest(). */
var HAPTIC_MS=10;
var HAPTIC_SEL=[
  ".mon-btn",".menu-btn",".dr-item",".dept-trig",".dept-opt",
  ".pub-btn",".auto-all-btn",".ev-card",".rs-dd-tap",".rs-dd-item",

].join(",");
function buzz_(ms){
  try{ if(navigator.vibrate) navigator.vibrate(ms||HAPTIC_MS); }catch(e){}
}
document.addEventListener("click",function(e){
  var hit=e.target.closest(HAPTIC_SEL);
  if(hit && !hit.disabled) buzz_();
},true);   // capture phase — fires even if the handler below stops propagation

(function(){var sx=0;document.addEventListener("touchstart",function(e){sx=e.touches[0].clientX;},{passive:true});document.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-sx;if(dx<-50&&document.getElementById("dr").classList.contains("on"))closeDr();},{passive:true});})();
        
var _adminDataCache={};   // dept-year-month → getAdminData response (Jadwal/Ringkasan/Masukan all read from this)
function setAdminKey(k){ ADMIN_KEY = k || ""; if (k) sessionStorage.setItem('gms_admin_key', k); else sessionStorage.removeItem('gms_admin_key'); }
function setAdminDept(d){ ADMIN_DEPT = d || ""; if (d) sessionStorage.setItem('gms_admin_dept', d); else sessionStorage.removeItem('gms_admin_dept'); }

function callApi(action, args){
  var names = API_PARAM_MAP[action] || [];
  args = Array.prototype.slice.call(args || []);
  // The param map lists 'dept' as the FIRST param for dept-scoped actions, but
  // the existing call sites pass positional args WITHOUT a leading dept (e.g.
  // getAdminData(year, month)). So for any action whose first param is 'dept'
  // — except verifyKey, which passes [dept,key] explicitly — prepend the stored
  // ADMIN_DEPT so the positional mapping lines up correctly.
  if (names[0] === 'dept' && action !== 'verifyKey') args.unshift(ADMIN_DEPT);
  var params = {action: action};
  names.forEach(function(name, i){
    var val = args[i];
    params[name] = (val===undefined || val===null) ? "" : val;
  });
  var isKeyed = API_KEY_REQUIRED.indexOf(action) !== -1;
  // verifyKey already carries the freshly-typed key+dept via its own params;
  // don't clobber those with the stored values.
  if (isKeyed && action !== 'verifyKey') params.key = ADMIN_KEY;
  // Safety net: if a dept param is still somehow empty, fill it from storage.
  if (names.indexOf('dept') !== -1 && (params.dept === undefined || params.dept === "")) params.dept = ADMIN_DEPT;

  if (isKeyed){
    return fetch(EXEC_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(params)
    }).then(function(r){ return r.json(); }).then(handleAuth);
  }
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
  }).join('&');
  return fetch(EXEC_URL + '?' + qs).then(function(r){ return r.json(); }).then(handleAuth);
}

// If the backend rejects the key mid-session (revoked/changed), drop it and
// re-show the lock screen instead of silently failing writes. Backend
// returns the literal string "Unauthorized" (apiDispatch_ in code.gs) —
// matched case-insensitively so a future casing tweak server-side doesn't
// silently break this.
function handleAuth(data){
  if (data && data.error && String(data.error).toLowerCase() === 'unauthorized'){
    setAdminKey("");
    if (typeof showLock === 'function') showLock('Sesi berakhir. Masukkan password lagi.');
  }
  return data;
}

function titleTwoLines(text){
  var p=String(text||"").trim().split(/\s+/);
  if(p.length<=1)return esc(text);
  var mid=Math.ceil(p.length/2);
  return esc(p.slice(0,mid).join(" "))+"<br>"+esc(p.slice(mid).join(" "));

/* ── LOCK DEPT PICKER ── */
var LOCK_DEPTS=[], LOCK_DEPT="";

function toggleDeptMenu(e){
  if(e)e.stopPropagation();   // keep the document-click closer from firing on us
  var menu=document.getElementById("lock-dept-menu"),trig=document.getElementById("lock-dept-trig");
  if(!menu||!trig)return;
  var open=menu.style.display!=="block";
  menu.style.display=open?"grid":"none";

function hideDeptMenu(){
  var menu=document.getElementById("lock-dept-menu"),trig=document.getElementById("lock-dept-trig");

function pickLockDept(d){ hideDeptMenu(); setLockDept_(d); }

function setLockDept_(d){
  LOCK_DEPT=d;

  if(body)body.innerHTML=d?deptPillInnerHTML_(d):'<span class="dept-trig-ph">Pilih departemen…</span>';

    var o=document.getElementById("dopt-"+safeId(x));
    if(o)o.classList.toggle("sel",x===d);
  });
}

         '<span class="dept-pill-icon">'+m.icon+'</span>'+

function buildDeptMenu_(depts){
  LOCK_DEPTS=depts||[];

      '</div>';
    }).join('');
  }
  prefillLockFromMemory_();
  hideLockLoader_();
}  

function hideLockLoader_(){
  var el=document.getElementById("lock-load");

    // Pop the form in (matches volunteer gate animation)
    var card=document.querySelector(".lock-card");
    if(card){card.classList.remove("in");void card.offsetWidth;card.classList.add("in");}

/* Memory PREFILLS the lock — it no longer walks straight in. The admin still
   taps Masuk, so a refresh mid-task can't dump them into a page they didn't
   ask for. The key comes from sessionStorage (same tab, same session, put
   there by this admin) — drop the two `inp.value` lines if you'd rather retype. */
function prefillLockFromMemory_(){
  if(!ADMIN_DEPT || LOCK_DEPTS.indexOf(ADMIN_DEPT)===-1) return;
  setLockDept_(ADMIN_DEPT);
  var inp=document.getElementById("lock-input");
  if(inp && ADMIN_KEY) inp.value=ADMIN_KEY;
}

document.addEventListener("click",function(e){ if(!e.target.closest(".dept-pick"))hideDeptMenu(); });

// ── LOGIN GATE CONTROLLER ───────────────────────────────────
// msg is only passed on a REJECTION (wrong key / expired session) — that's the
// one case where the field should be cleared. The initLock call passes nothing,
// so a prefilled key survives.
function showLock(msg){
  var lock = document.getElementById('lock');
  if (lock) lock.classList.remove('hide');
  var err = document.getElementById('lock-err');
  if (err) err.textContent = msg || '';
  if (msg){
    var inp = document.getElementById('lock-input');
    if (inp){ inp.value=''; try{ inp.focus(); }catch(e){} }
  }
}
function hideLock(){
  var lock = document.getElementById('lock');
  if (lock) lock.classList.add('hide');
}
function setLockBusy(busy){
  var btn = document.getElementById('lock-btn');
  if (!btn) return;
  btn.disabled = busy;
  btn.innerHTML = busy ? '<span class="lock-spin"></span>' : 'Masuk';
}
function submitKey(ev){
  if (ev) ev.preventDefault();
  var inp  = document.getElementById('lock-input');
  var err  = document.getElementById('lock-err');
  var key  = inp ? inp.value.trim() : '';
  var dept = LOCK_DEPT;
  if (!dept){ if(err) err.textContent='Pilih departemen dulu.'; return false; }
  if (!key){ if(err) err.textContent='Password tidak boleh kosong.'; return false; }
  if (err) err.textContent='';
  setLockBusy(true);
  callApi('verifyKey', [dept, key]).then(function(data){
    setLockBusy(false);
    if (data && data.ok){
      setAdminDept(dept);
      setAdminKey(key);
      // Don't hide lock yet — keep spinner on button until data is ready
      setLockBusy(true);
      if (st.loaded && st.dept === dept) {
        applyDeptLabels();
        hideLock();
        renderTab();
      } else {
        loadDataThenReveal_();
      }
    } else {
      setAdminKey('');
      if (err) err.textContent = (data && data.message) || 'Password salah.';
      if (inp){ inp.value=''; inp.focus(); }
    }
  }).catch(function(e){
    setLockBusy(false);
    if (err) err.textContent = 'Gagal terhubung. Coba lagi.';
  });
  return false;
}

// Sets the header/drawer/title to the active dept. Called after login and on
// silent-resume. Kept separate so onDataLoaded doesn't fight it.

// A stored dept+key only PREFILLS the form AND fires a silent background
// prefetch of this month's data, so by the time they actually tap Masuk the
// request often has nothing left to do but read from cache.
(function initLock(){
  showLock();

  setTimeout(hideLockLoader_, 8000);   // a dead API must never trap them behind the loader

    var now=new Date();
    var py=now.getFullYear(), pm=now.getMonth();
    var pkey=ADMIN_DEPT+"-"+py+"-"+pm;

        if(data && !data.error) _adminDataCache[pkey]=data;
      }).catch(function(){});
    }
  }
})();

function GasRun(){ this._s=null; this._f=null; }
GasRun.prototype.withSuccessHandler=function(fn){ this._s=fn; return this; };
GasRun.prototype.withFailureHandler=function(fn){ this._f=fn; return this; };
Object.keys(API_PARAM_MAP).forEach(function(fnName){
  GasRun.prototype[fnName]=function(){
    var args=Array.prototype.slice.call(arguments), s=this._s, f=this._f;
    callApi(fnName, args).then(function(data){
      if (data && data.error){ if(f) f({message:data.error}); else console.error(data.error); return; }
      if (s) s(data);
    }).catch(function(err){
      if (f) f({message: err.message || String(err)}); else console.error(err);
    });
    return this;
  };
});

// Service → eligibility key (mirrors Code.gs)
function eligKeyOf_(service) {
  var s = String(service || "").trim();
  if (/^voltage$/i.test(s)) return "Voltage";
  if (/^aog/i.test(s))      return "AOG";
  if (/^umum/i.test(s))     return "Umum";
  return null;
}   

// Client-side eligibility check using the musician list from getAdminData.
function isVolEligible_(name, serviceName) {
  if (!name || !serviceName) return true;
  var key = eligKeyOf_(serviceName);
  if (!key) return true;   // unknown service type → no restriction
  var vols = (st.data && (st.data.musicians || st.data.volunteers)) || [];
  for (var i = 0; i < vols.length; i++) {
    if (vols[i].name === name) {
      if (!vols[i].elig) return true;   // null = no restriction
      return !!vols[i].elig[key];
    }
  }
  return true;
}

// A write (save roster, auto-assign, delete service, add event) changes
// data.services underneath the cache, but the cache object is never re-fetched

function prevMonth_(y,m){m--;if(m<0){m=11;y--;}return{y:y,m:m};}
function nextMonth_(y,m){m++;if(m>11){m=0;y++;}return{y:y,m:m};}

// Fires in the background right after a month loads — by the time the admin
// taps ‹ or ›, that month is usually already warm.
function prefetchAdjacentJadwalMonths_(){
  [prevMonth_(st.year,st.month),nextMonth_(st.year,st.month)].forEach(function(mo){
    var k=ADMIN_DEPT+"-"+mo.y+"-"+mo.m;
    if(_adminDataCache[k])return;
    google.script.run.withSuccessHandler(function(data){_adminDataCache[k]=data;}).withFailureHandler(function(){}).getAdminData(mo.y,mo.m);
  });
}

function generateSlots(year,month,existing){
  var used={},slots=[];
  var d=new Date(year,month,1);
  while(d.getMonth()===month){
    var dow=d.getDay(),tpls=null;
    if(dow===6&&ADMIN_DEPT!=="EK")tpls=SAT_TEMPLATES;else if(dow===0)tpls=SUN_TEMPLATES;
    if(tpls){tpls.forEach(function(t){var ds=isoDate(d),dn=dow===0?"Minggu":"Sabtu",key=ds+"|"+t.service+"|"+t.time;if(!used[key]){used[key]=true;var ex=null;for(var i=0;i<existing.length;i++){if(existing[i].date===ds&&existing[i].service===t.service&&existing[i].time===t.time){ex=existing[i];break;}}slots.push({date:ds,day:dn,time:t.time,service:t.service,slots:ex?ex.slots:{},key:key,isCustom:false,isSpecial:ex?!!ex.isSpecial:false});}});}
    d.setDate(d.getDate()+1);
  }
  existing.forEach(function(s){var key=s.date+"|"+s.service+"|"+s.time;if(!used[key]){used[key]=true;slots.push({date:s.date,day:s.day,time:s.time,service:s.service,slots:s.slots||{},key:key,isCustom:true,isSpecial:!!s.isSpecial});}});
  slots.sort(function(a,b){return (a.date+a.time+a.service).localeCompare(b.date+b.time+b.service);});
  return slots;
}

function setPubStatus(status){
  if(!st.data)return;
  var cur=st.data.monthStatus||"OPEN";
  if(cur===status)return;
  st.data.monthStatus=status;renderPubToggle();          // optimistic
  google.script.run
    .withSuccessHandler(function(res){
      if(res&&res.ok){
        st.data.monthStatus=res.status;renderPubToggle();
        showToast(res.status==="OPEN"?"Jadwal DIBUKA untuk volunteer.":"Jadwal DITUTUP dari volunteer.","ok");
      } else {
        st.data.monthStatus=cur;renderPubToggle();
        showToast("Gagal mengubah status.","err");
      }
    })
    .withFailureHandler(function(e){
      st.data.monthStatus=cur;renderPubToggle();
      showToast("Error: "+(e&&e.message||e),"err");
    })
    .setMonthStatus(st.year,st.month,status);
}

    var hdr=grp.querySelector(".day-group-hdr");

    var grpMatch=hdr&&hdr.textContent.toLowerCase().indexOf(q)!==-1;
    var anyCard=false;
    cards.forEach(function(card){
      var name=card.querySelector(".ev-svc-name");

      card.style.display=match?"":"none";
      if(match)anyCard=true;
    });

  });

function addNewEvent(){
  var dv=document.getElementById("nev-date").value;
  var sv=(document.getElementById("nev-svc").value||"").trim();
  var tv=(document.getElementById("nev-time").value||"").trim();
  var isSpecial=document.getElementById("nev-special").checked;
  if(!dv||!sv||!tv){showToast("Isi semua kolom.","warn");return;}
  var d=new Date(dv+"T00:00:00");var dn=HARI_L[d.getDay()];
  var key=dv+"|"+sv+"|"+tv;
  if(st.slots.some(function(s){return s.key===key;})){showToast("Ibadah sudah ada.","warn");return;}

  var btn=document.querySelector(".btn-save");
  if(btn){btn.disabled=true;btn.textContent="Menyimpan…";}

  google.script.run
    .withSuccessHandler(function(res){
      if(btn){btn.disabled=false;btn.textContent="Tambah";}
      if(res&&res.ok){
        st.slots.push({date:dv,day:dn,time:tv,service:sv,slots:{},key:key,isCustom:true,isSpecial:isSpecial});
        st.slots.sort(function(a,b){return (a.date+a.time+a.service).localeCompare(b.date+b.time+b.service);});
        invalidateCurrentMonthCache_();
        toggleAddForm();
        renderJadwal();
        showToast("Ibadah ditambahkan.","ok");
      } else {
        showToast((res&&res.msg)||"Gagal menyimpan.","err");
      }
    })
    .withFailureHandler(function(e){
      if(btn){btn.disabled=false;btn.textContent="Tambah";}
      showToast("Error: "+e.message,"err");
    })
    .saveServiceRoster(dv,sv,tv,dn,"{}",isSpecial);
}

function findSlot(key){for(var i=0;i<st.slots.length;i++){if(st.slots[i].key===key)return st.slots[i];}return null;}

function openRoster(key){
  var slot=findSlot(key);if(!slot)return;
  st.currentSlot=slot;
  // Identity AS LOADED. applyEdit mutates slot.service/time in place, so without
  // this the original rows can never be found again to delete them.
  st.origService=slot.service;
  st.origTime=slot.time;
  st.origSpecial=!!slot.isSpecial;   // ← add
  st.dirty=false;
  st.rosterState={};
  st.subState={};
  PAW_ROLES.forEach(function(role){
    var ex=slot.slots[role]||[];
    st.rosterState[role]=ex.map(function(x){return x.name||x;});
    st.subState[role]=ex.map(function(x){return (x&&x.sub)||"";});
    if(st.rosterState[role].length===0){st.rosterState[role]=[""];st.subState[role]=[""];}
  });
  var d=new Date(slot.date+"T00:00:00");
  document.getElementById("rp-date").textContent=HARI_L[d.getDay()]+", "+d.getDate()+" "+BLN_L[d.getMonth()];
  document.getElementById("rp-svc").textContent=slot.service+" · "+slot.time;
  document.getElementById("edit-svc-name").value=slot.service;
  document.getElementById("edit-svc-time").value=slot.time;
  document.getElementById("edit-svc-special").checked=slot.isSpecial||false;
  document.getElementById("rp-edit-form").classList.remove("on");
  st.songDirty=false;
  st.songs=null;
  st.dressUrl=null;
  st.dressDirty=false;
  renderRosterPage();
  updateSaveBtn();
  renderGroupDropdown();
  refreshCopyRow_();
  lockBodyScroll_();
  document.getElementById("rp").classList.add("on");
  document.getElementById("rp-body").scrollTop=0;
}

/* applyEdit mutates the slot in st.slots right away, so "Keluar Tanpa Simpan"
   has to put the identity back — otherwise the list keeps a renamed slot whose
   key no card's onclick matches, and it becomes unclickable. */
function revertEdit_(){
  var slot=st.currentSlot; if(!slot)return;
  if(st.origService)slot.service=st.origService;
  if(st.origTime)slot.time=st.origTime;
  if(st.origSpecial!==undefined)slot.isSpecial=st.origSpecial;
  slot.key=slot.date+"|"+slot.service+"|"+slot.time;
}
        
function closeRoster(){
  if(st.dirty){
      showModal("Belum Disimpan","Ada perubahan yang belum disimpan. Yakin keluar?","Keluar Tanpa Simpan",function(){
      revertEdit_();
      st.dirty=false;updateSaveBtn();
      unlockBodyScroll_();
      document.getElementById("rp").classList.remove("on");
      st.currentSlot=null;
      renderJadwal();
    });
    return;
  }
  st.dirty=false;
  unlockBodyScroll_();
  document.getElementById("rp").classList.remove("on");
  st.currentSlot=null;
}

function applyEdit(){
  var newName=(document.getElementById("edit-svc-name").value||"").trim();
  var newTime=(document.getElementById("edit-svc-time").value||"").trim();
  if(!newName||!newTime){showToast("Isi nama dan waktu.","warn");return;}
  var slot=st.currentSlot; if(!slot)return;
  var newKey=slot.date+"|"+newName+"|"+newTime;
  // Renaming onto an existing service would delete this one's rows and then
  // overwrite that one's roster under the same key. Block it.
  if(newKey!==slot.key && st.slots.some(function(s){return s.key===newKey;})){
    showToast("Ibadah dengan nama & waktu itu sudah ada.","warn");return;
  }
  slot.service=newName;
  slot.time=newTime;
  slot.key=newKey;
  slot.isSpecial=document.getElementById("edit-svc-special").checked;
  document.getElementById("rp-svc").textContent=newName+" · "+newTime;
  document.getElementById("rp-edit-form").classList.remove("on");
  st.dirty=true;updateSaveBtn();   // ← THE FIX: nothing set this, so Simpan stayed grey
  refreshCopyRow_();               // sibling detection keys off the NAME, so recompute
  showToast("Nama & waktu diperbarui. Tekan Simpan Jadwal untuk menyimpan.","ok");
}

function renderInputRow(role,idx,sel){

    '</div>';
  }

  var warnCls=isOverLimit(sel)?" warn-select":"";
  var svcName=st.currentSlot&&st.currentSlot.service;
  var slotDate=st.currentSlot&&st.currentSlot.date;
  var displayVal=sel||'';
  var h='<div class="rs-select-wrap" id="rs-row-'+sr+'-'+idx+'">'+
    '<div class="rs-dd-wrap" id="rs-dd-'+sr+'-'+idx+'">'+
      '<div class="rs-dd-tap'+warnCls+'" onclick="toggleRoleDd(\''+escQ(role)+'\','+idx+')" data-role="'+esc(role)+'" data-idx="'+idx+'">'+
        '<span class="rs-dd-val'+(displayVal?'':' rs-dd-ph')+'">'+esc(displayVal||'— Belum dipilih —')+'</span>'+
        '<svg class="rs-dd-chev" width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1L6 7L11 1" stroke="#8890aa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
      '</div>'+
      '<div class="rs-dd-list" id="rs-ddlist-'+sr+'-'+idx+'">';

  h+='<div class="rs-dd-item'+(sel?'':' selected')+'" onmousedown="pickDd(\''+escQ(role)+'\','+idx+',\'\')"><span>— Kosongkan —</span></div>';
  musicians.forEach(function(m){
    if(m.elig&&svcName){var key=eligKeyOf_(svcName);if(key&&!m.elig[key])return;}
    if(isBlocked_(m.name,slotDate)){
      h+='<div class="rs-dd-item blk-item"><span>'+esc(m.name)+'</span><span class="rs-dd-cnt">Tidak bisa</span></div>';
      return;
    }
    var cnt=getCountExcl(m.name);
    var warnCls2=cnt>=6?" warn-item":"";
    var selCls=m.name===sel?" selected":"";

function dimBg(bg,factor){
  var m=bg.match(/rgba\(([\d.]+),([\d.]+),([\d.]+),([\d.]+)\)/);
  if(!m)return bg;
  var a=parseFloat(m[4])*(factor!==undefined?factor:0.35);
  return "rgba("+m[1]+","+m[2]+","+m[3]+","+a.toFixed(3)+")";
}

function getMusiciansByRole(role){
  if(!st.data||!st.data.musicians)return[];
  return st.data.musicians.filter(function(m){return m.roles&&m.roles.indexOf(role)!==-1;});
}
function getCountExcl(name){
  var total=(st.data&&st.data.serviceCount&&st.data.serviceCount[name])||0;
  if(st.currentSlot&&st.currentSlot.slots){PAW_ROLES.forEach(function(r){(st.currentSlot.slots[r]||[]).forEach(function(x){if((x.name||x)===name)total--;});});}
  return Math.max(0,total);
}
function isOverLimit(name){return name&&getCountExcl(name)>=6;}

/* ── AVAILABILITY GATE ──
   st.data.blocked = { name: [5,12,19] } for the loaded month (from Ketersediaan).
   A blocked person can't be picked in the dropdown and is skipped by auto-assign.
   Note this is month-scoped: st.data is the CURRENT month, so a slot from another
   month can't be checked — chMonth reloads, so in practice they always match. */
function isBlocked_(name,dateStr){
  if(!name||!dateStr)return false;
  var days=((st.data&&st.data.blocked)||{})[name];
  if(!days||!days.length)return false;
  return days.indexOf(parseInt(dateStr.split("-")[2],10))!==-1;
}

  var q=(query||"").toLowerCase().trim();

    var svcName = st.currentSlot && st.currentSlot.service;

// True unless the current month is explicitly CLOSE.
function isMonthOpen(){ return !(st.data && st.data.monthStatus==="CLOSE"); }

// Status-aware pick. OPEN month: changing a filled slot to a different person
// records a substitution (original kept in the dropdown, new person becomes
// the "digantikan" pengganti); re-picking the original clears it. CLOSE month:
// picks overwrite directly (no substitution). Returns true if the substitute
// (hint) state changed, so pickDd knows to re-render the row.
function applyPick_(role,idx,name){
  name=(name||"").trim();
  if(!st.rosterState[role])st.rosterState[role]=[""];
  if(!st.subState[role])st.subState[role]=[];
  var orig=(st.rosterState[role][idx]||"").trim();
  var hadSub=!!((st.subState[role][idx]||"").trim());
  if(isMonthOpen()){
    if(!orig){ st.rosterState[role][idx]=name; st.subState[role][idx]=""; return hadSub; }
    if(name===orig){ st.subState[role][idx]=""; return hadSub; }   // revert → clear sub
    st.subState[role][idx]=name; return true;                       // substitute
  }
  st.rosterState[role][idx]=name; st.subState[role][idx]="";        // CLOSE: overwrite
  return hadSub;
}

// Explicitly clear a substitution (the × on the digantikan hint).
function clearSub(role,idx){
  if(st.subState&&st.subState[role])st.subState[role][idx]="";
  st.dirty=true;updateSaveBtn();
  renderRosterPage();
}

function addMultiRole(role){
  if(!canAddMore_(role)){showToast(role+" maksimal "+multiLimit_(role)+" orang.","warn");return;}
  if(!st.rosterState[role])st.rosterState[role]=[""];
  st.rosterState[role].push("");
  if(st.subState&&st.subState[role])st.subState[role].push("");
  var wrap=document.getElementById("rs-inputs-"+safeId(role));if(!wrap)return;
  var idx=st.rosterState[role].length-1;
  var btn=wrap.querySelector(".rs-add-btn");

/* ── AUTO ASSIGN (group-based) ──
   The band roles (WL/Singer/Keys/Guitar/Bass/Drums) are filled from one whole
   group per service — same mapping as the manual "Terapkan group" button — so
   a band stays cohesive instead of being cherry-picked per person. The solo /
   tech roles (Speaker, SPV, MD, Sequencer, SD, CM, Soundman) have no group, so
   they're filled from the general pool, least-scheduled first. */
var GROUP_ROLES_JS = ["WL","Singer","Keys","Guitar","Bass","Drums"];
// Roles that can have multiple people, and their max count.
// Singer and Soundman are unlimited (existing behavior).
// WL, MD, Sequencer are capped at 2.
var MULTI_ROLES = {
  "Singer": 99,
  "Soundman": 99,
  "WL": 2,
  "MD": 2,
  "Sequencer": 2
};

function isMultiRole_(role) { return MULTI_ROLES.hasOwnProperty(role); }
function multiLimit_(role) { return MULTI_ROLES[role] || 1; }
function canAddMore_(role) {
  var arr = st.rosterState[role] || [""];
  return arr.length < multiLimit_(role);
}

function buildGroupRoster(groupName, slot){
  var groups = (st.data && st.data.groups) || {};
  var group  = groups[groupName] || {};
  var result = {};

// Band roles straight from the group — minus anyone who blocked this date.
  // Per spec, a blocked member is simply left blank rather than substituted;
  // the group stays cohesive and the admin fills the gap by hand.
  GROUP_ROLES_JS.forEach(function(role){
    var names = (group[role] || []).filter(function(n){ return n && !isBlocked_(n, slot.date) && isVolEligible_(n, slot.service); });
    result[role] = names.length ? names : [""];
  });

  // Mark everyone the group already placed as used, so a band member isn't
  // also handed a tech role in the same service.
  var used = {};
  GROUP_ROLES_JS.forEach(function(role){
    (result[role]||[]).forEach(function(n){ if(n) used[n]=true; });
  });

  // Solo/tech roles from the general pool, balancing by how often each person
  // has already been scheduled this month.
  var cntMap = {};
  var sc = (st.data && st.data.serviceCount) || {};
  Object.keys(sc).forEach(function(n){ cntMap[n] = sc[n]||0; });
  var pool = {};
  (st.data.musicians||[]).forEach(function(m){
    if(!m.roles) return;
    m.roles.forEach(function(r){ if(GROUP_ROLES_JS.indexOf(r)===-1){ (pool[r]=pool[r]||[]).push(m.name); } });
  });
  PAW_ROLES.forEach(function(role){
    if(GROUP_ROLES_JS.indexOf(role)!==-1) return; // band already done
    var cands=(pool[role]||[]).filter(function(n){return !used[n]&&!isBlocked_(n,slot.date)&&isVolEligible_(n,slot.service);});
    cands.sort(function(a,b){return (cntMap[a]||0)-(cntMap[b]||0);});
    var picked=[];
    if(cands.length){ picked.push(cands[0]); used[cands[0]]=true; }
    result[role]=picked.length?picked:[""];
  });
  return result;
}

// Non-PAW auto-assign: fill each role from people who LIST that role (eligibility
// = their Peran), least-scheduled first, no double-booking within a service.
// Specialists (one role listed) naturally stay in lane; flexible people (many
// roles) fill remaining gaps.
function buildPersonRoster(slot){
  var result={};
  var used={};
  var cntMap={};
  var sc=(st.data&&st.data.serviceCount)||{};
  Object.keys(sc).forEach(function(n){ cntMap[n]=sc[n]||0; });

  // pool[role] = [names of everyone eligible for that role]
  var pool={};
  (st.data.musicians||st.data.volunteers||[]).forEach(function(m){
    if(!m.roles)return;
    m.roles.forEach(function(r){ (pool[r]=pool[r]||[]).push(m.name); });
  });

  // Fill rarer roles first (fewer eligible people) so specialists get priority
  // before flexible people are used up elsewhere.
  var roles=PAW_ROLES.filter(function(r){return !(r==="Speaker"&&st.dept!=="PAW");});
  roles.sort(function(a,b){ return (pool[a]||[]).length-(pool[b]||[]).length; });

  roles.forEach(function(role){
    var cands=(pool[role]||[]).filter(function(n){return !used[n]&&!isBlocked_(n,slot.date);});
    cands.sort(function(a,b){return (cntMap[a]||0)-(cntMap[b]||0);});
    if(cands.length){
      var pick=cands[0];
      result[role]=[pick];
      used[pick]=true;
      cntMap[pick]=(cntMap[pick]||0)+1; // count within this run so load spreads across services too
    } else {
      result[role]=[""];
    }
  });
  return result;
}

function autoAssignAll(){
  var vols=(st.data&&(st.data.musicians||st.data.volunteers));
  if(!vols){showToast("Data belum dimuat.","warn");return;}
  var isPaw=(st.dept==="PAW");
  var groups=(st.data&&st.data.groups)||{};
  var groupNames=Object.keys(groups);
  if(isPaw && !groupNames.length){showToast("Belum ada group di sheet Volunteers (kolom Grup).","warn");return;}
  var emptySlots=st.slots.filter(function(s){return countFilled(s)===0;});
  if(!emptySlots.length){showToast("Semua sudah terisi! 🎉","ok");return;}

  var msg=(isPaw
    ? ("Mengisi "+emptySlots.length+" ibadah kosong — band diisi per group secara bergiliran.")
    : ("Mengisi "+emptySlots.length+" ibadah kosong — tiap peran diisi orang paling jarang bertugas."))
    +" Volunteer yang blokir tanggalnya dilewati.";

  showModal("Auto Assign Semua",msg,"Lanjutkan",function(){
    // Rotate groups instead of picking at random — random repeats and starves.
    var gi=Math.floor(Math.random()*Math.max(1,groupNames.length));
    var payload=[],built=[];
    emptySlots.forEach(function(slot){
      var res=isPaw ? buildGroupRoster(groupNames[gi++ % groupNames.length],slot) : buildPersonRoster(slot);
      var clean={};
      PAW_ROLES.forEach(function(role){
        var names=(res[role]||[]).filter(function(x){return x;});
        if(names.length)clean[role]=names;
      });
      payload.push({dateStr:slot.date,service:slot.service,time:slot.time,dayName:slot.day,roster:clean,isSpecial:!!slot.isSpecial});
      built.push({slot:slot,clean:clean});
    });

    var btn=document.querySelector(".auto-all-btn");
    if(btn){btn.disabled=true;btn.textContent="Menyimpan…";}
    showToast("Menyimpan "+payload.length+" ibadah…","ok");

    // ONE request for the whole month. The old code fired one per service in
    // parallel; those executions raced on the same sheet and ate each other's rows.
    google.script.run
      .withSuccessHandler(function(r){
        if(btn){btn.disabled=false;btn.textContent="Auto Assign Semua";}
        if(r&&r.ok){
          built.forEach(function(b){
            b.slot.slots={};
            Object.keys(b.clean).forEach(function(role){
              b.slot.slots[role]=b.clean[role].map(function(n){return{name:n,sub:""};});
            });
          });
          invalidateCurrentMonthCache_();
          renderJadwal();
          showToast("Auto assign "+payload.length+" ibadah selesai.","ok");
        } else {
          showToast((r&&r.msg)||"Gagal menyimpan.","err");
        }
      })
      .withFailureHandler(function(e){
        if(btn){btn.disabled=false;btn.textContent="Auto Assign Semua";}
        showToast("Gagal: "+(e&&e.message||e),"err");
      })
      .saveManyRosters(JSON.stringify(payload));
  });
}

/* ── SELFIE QUEUE — two tiers ──
   Group (Voltage / AOG / Ibadah) selects the subset; status filters within it.
   Groups come from the backend's songGroupOf_() so Ibadah 1/2/3 collapse into
   one tab. Order is fixed for the three known groups; a special event whose name
   matches none of them gets appended its own tab rather than vanishing. */
var SELFIE_GROUP_ORDER=["Voltage","AOG","Ibadah"];
function selfieGroupOf_(it){ return it.group||it.service||""; }

function selfieGroups_(){
  var items=st.selfieItems||[],seen={},out=[];
  SELFIE_GROUP_ORDER.forEach(function(g){
    if(items.some(function(it){return selfieGroupOf_(it)===g;})){seen[g]=true;out.push(g);}
  });
  items.forEach(function(it){
    var g=selfieGroupOf_(it);
    if(g&&!seen[g]){seen[g]=true;out.push(g);}
  });
  return out;
}

// Single source of truth for what's on screen — decideSelfie indexes into this,
// so it must never drift from what buildSelfieQueue rendered.
function selfieShown_(){
  var g=st.selfieGroup,s=st.selfieFilter||"pending";
  return (st.selfieItems||[]).filter(function(it){
    return selfieGroupOf_(it)===g && it.status===s;
  });
}

function buildSelfieQueue(){
  var items=st.selfieItems||[];
  var groups=selfieGroups_();
  var h='<div class="sq-wrap">';

  if(!groups.length){
    h+='<div class="sq-empty">Belum ada selfie yang diupload.</div></div>';
    document.getElementById("content").innerHTML=h;
    return;
  }
  if(groups.indexOf(st.selfieGroup)===-1)st.selfieGroup=groups[0];
  var g=st.selfieGroup;

  // Tier 1 — group. Badge shows pending count, so a group needing attention is
  // visible without opening it.
  h+='<div class="sq-groups">';
  groups.forEach(function(gr){

/* ── COPY TO SIBLING SERVICES ──
   Ibadah 1/2/3 (and AOG Teens/Youth) are the same team on the same day, so the
   admin shouldn't assign them three times. When the open service has siblings on
   its date, offer a checkbox; on save the roster is written to all of them in ONE
   saveManyRosters call. Never parallel saveServiceRoster calls — those race on
   the sheet and eat each other's rows, which is what broke auto-assign. */
function svcGroupOf_(svc){
  var t=String(svc||"").trim().toLowerCase();
  if(/^umum\s*[123]\b/.test(t))return "Umum";
  if(/^aog\b/.test(t))return "AOG";
  return "";   // Voltage and one-off specials have no siblings
}

function siblingSlots_(slot){
  var g=svcGroupOf_(slot&&slot.service);
  if(!g)return [];
  return (st.slots||[]).filter(function(x){
    return x.date===slot.date && x.key!==slot.key && svcGroupOf_(x.service)===g;
  });
}

function refreshCopyRow_(){
  var row=document.getElementById("rp-copy-row"),box=document.getElementById("rp-copy-all");
  if(!row||!box)return;
  box.checked=false;   // opt in every time — overwriting two other services must be deliberate
  var sibs=siblingSlots_(st.currentSlot);
  if(!sibs.length){row.style.display="none";return;}
  row.style.display="flex";
  document.getElementById("rp-copy-lbl").textContent=
    "Terapkan juga ke "+sibs.map(function(x){return x.service;}).join(" & ");
}

function saveRoster(){
  if(!st.currentSlot)return;
  var btn=document.getElementById("rp-save");btn.disabled=true;btn.textContent="Menyimpan…";
  var clean={};
  PAW_ROLES.forEach(function(role){
    // Non-PAW: never write Speaker (it's PAW's data)
    if(role==="Speaker"&&st.dept!=="PAW"&&st.dept!=="EK")return;
    var arr=[];
    (st.rosterState[role]||[]).forEach(function(name,i){
      name=(name||"").trim(); if(!name)return;
      var sub=((st.subState[role]||[])[i]||"").trim();
      arr.push(sub?{name:name,sub:sub}:name); // {name,sub} when substituted, else plain name
    });
    if(arr.length)clean[role]=arr;
  });
  var slot=st.currentSlot;
  var box=document.getElementById("rp-copy-all");
  var targets=[slot].concat((box&&box.checked)?siblingSlots_(slot):[]);

  function ok(res){
    btn.disabled=false;btn.textContent="Simpan Jadwal ✓";
    if(!(res&&res.ok)){showToast((res&&res.msg)||"Gagal menyimpan.","err");return;}
    invalidateCurrentMonthCache_();
    st.dirty=false;updateSaveBtn();showToast(res.msg,"ok");
    // Mirror the save into local state for every service written, so the jadwal
    // list is correct without a refetch.
    targets.forEach(function(t){
      t.slots={};
      Object.keys(clean).forEach(function(r){
        t.slots[r]=clean[r].map(function(e){
          return (e&&typeof e==="object")?{name:e.name,sub:e.sub||""}:{name:e,sub:""};
        });
      });
    });
    closeRoster();renderJadwal();scrollToSavedCard(slot.key);
  }
  function fail(e){btn.disabled=false;btn.textContent="Simpan Jadwal ✓";showToast("Error: "+(e&&e.message||e),"err");}

function doSave(){
    if(targets.length>1){
      // One batched request for all siblings — each keeps its own time and
      // isSpecial flag, only the roster is copied across.
      var payload=targets.map(function(t){
        return {dateStr:t.date,service:t.service,time:t.time,dayName:t.day,roster:clean,isSpecial:!!t.isSpecial};
      });
      google.script.run.withSuccessHandler(ok).withFailureHandler(fail)
        .saveManyRosters(JSON.stringify(payload));
    } else {
      google.script.run.withSuccessHandler(ok).withFailureHandler(fail)
        .saveServiceRoster(slot.date,slot.service,slot.time,slot.day,JSON.stringify(clean),!!slot.isSpecial);
    }
  }

  // Renamed via applyEdit? The backend replaces rows by date|service|time, so the
  // OLD rows would survive untouched and the service would appear twice. Delete
  // them first, then save under the new identity.
  if(st.origService && (st.origService!==slot.service || st.origTime!==slot.time)){
    google.script.run
      .withSuccessHandler(function(){ st.origService=slot.service; st.origTime=slot.time; doSave(); })
      .withFailureHandler(fail)
      .deleteService(slot.date,st.origService,st.origTime);
  } else doSave();
}

function deleteThisService(){
  if(!st.currentSlot)return;
  showModal("Hapus Jadwal","Hapus \""+st.currentSlot.service+"\" pada "+st.currentSlot.date+"?\n\nSemua data roster akan hilang permanen.","Hapus Permanen",function(){
    var slot=st.currentSlot;
    google.script.run
      .withSuccessHandler(function(){showToast("Jadwal dihapus.","ok");slot.slots={};invalidateCurrentMonthCache_();closeRoster();renderJadwal();})
      .withFailureHandler(function(e){showToast("Gagal: "+e.message,"err");})
      .deleteService(slot.date,st.origService||slot.service,st.origTime||slot.time);
  });
}

function saveRingkasanAsImage(){
  var outerWrapper=document.getElementById("ring-table-wrap");
  var scrollDiv=outerWrapper?outerWrapper.querySelector(".ring-scroll"):null;
  var table=outerWrapper?outerWrapper.querySelector(".ring-tbl"):null;
  if(!outerWrapper||!table){alert("Tidak ada data tabel untuk disimpan.");return;}

  var savedOuter={overflow:outerWrapper.style.overflow,width:outerWrapper.style.width};
  var savedScroll={overflowX:scrollDiv.style.overflowX,width:scrollDiv.style.width};
  outerWrapper.style.overflow="visible";
  outerWrapper.style.width=table.scrollWidth+"px";
  scrollDiv.style.overflowX="visible";
  scrollDiv.style.width=table.scrollWidth+"px";

  html2canvas(outerWrapper,{
    scrollX:0,scrollY:0,
    windowWidth:outerWrapper.scrollWidth,windowHeight:outerWrapper.scrollHeight,
    backgroundColor:"#0a0c10",scale:2
  }).then(function(canvas){
    outerWrapper.style.overflow=savedOuter.overflow;
    outerWrapper.style.width=savedOuter.width;
    scrollDiv.style.overflowX=savedScroll.overflowX;
    scrollDiv.style.width=savedScroll.width;
    var link=document.createElement("a");
    link.download="Jadwal_"+(st.dept||"GMS")+"_"+BLN_L[st.month]+"_"+st.year+".png";
    link.href=canvas.toDataURL("image/png");
    link.click();
  }).catch(function(err){
    outerWrapper.style.overflow=savedOuter.overflow;
    outerWrapper.style.width=savedOuter.width;
    scrollDiv.style.overflowX=savedScroll.overflowX;
    scrollDiv.style.width=savedScroll.width;
    console.error(err);alert("Gagal membuat gambar. Silakan coba lagi.");
  });
}

/* ── KETERSEDIAAN (AVAILABILITY) ── */
function renderKetersediaan(){
  var key=ADMIN_DEPT+"-"+st.availYear+"-"+st.availMonth;
  if(st.availCache[key]){
    st.availData=st.availCache[key];
    buildKetersediaanUI(st.availData);
    prefetchAdjacentAvailMonths_();
    return;
  }
  document.getElementById("content").innerHTML='<div class="init-loading"><div class="big-spin"><span></span><span></span><span></span></div><div class="big-spin-lbl">Memuat ketersediaan…</div></div>';
  google.script.run
    .withSuccessHandler(function(data){
      st.availData=data;
      st.availCache[ADMIN_DEPT+"-"+st.availYear+"-"+st.availMonth]=data;
      buildKetersediaanUI(data);
      prefetchAdjacentAvailMonths_();
    })
    .withFailureHandler(function(e){document.getElementById("content").innerHTML='<div class="empty-state">Gagal memuat: '+esc(e.message)+'</div>';})
    .getAvailabilityMatrix(st.availYear,st.availMonth);
}

function chAvailMonth(dir){
  st.availMonth+=dir;
  if(st.availMonth>11){st.availMonth=0;st.availYear++;}
  if(st.availMonth<0){st.availMonth=11;st.availYear--;}
  renderKetersediaan();
}

function availToggleHtml(isOpen){
  return '<div class="pub-toggle">'+
      '<button type="button" class="pub-btn pub-close'+(!isOpen?' active':'')+'" onclick="setAvailPub(\'CLOSE\')">CLOSE</button>'+
      '<button type="button" class="pub-btn pub-open'+(isOpen?' active':'')+'" onclick="setAvailPub(\'OPEN\')">OPEN</button>'+
    '</div>'+
    '<div class="pub-note '+(isOpen?'open':'closed')+'">'+
      (isOpen
        ? 'Halaman ketersediaan TAMPIL untuk volunteer bulan ini — mereka bisa blokir tanggal.'
        : 'Halaman ketersediaan DISEMBUNYIKAN dari volunteer bulan ini.')+
    '</div>';
}

function setAvailPub(status){
  if(!st.availData)return;
  var cur=st.availData.availStatus||"CLOSE";
  if(cur===status)return;
  st.availData.availStatus=status;
  document.getElementById("avail-toggle-wrap").innerHTML=availToggleHtml(status==="OPEN"); // optimistic
  google.script.run
    .withSuccessHandler(function(res){
      if(res&&res.ok){
        st.availData.availStatus=res.availStatus;
        st.availCache[st.availYear+"-"+st.availMonth]=st.availData;
        document.getElementById("avail-toggle-wrap").innerHTML=availToggleHtml(res.availStatus==="OPEN");
        showToast(res.availStatus==="OPEN"?"Ketersediaan DIBUKA untuk volunteer.":"Ketersediaan DITUTUP.","ok");
      } else {
        st.availData.availStatus=cur;
        document.getElementById("avail-toggle-wrap").innerHTML=availToggleHtml(cur==="OPEN");
        showToast("Gagal mengubah status.","err");
      }
    })
    .withFailureHandler(function(e){
      st.availData.availStatus=cur;
      document.getElementById("avail-toggle-wrap").innerHTML=availToggleHtml(cur==="OPEN");
      showToast("Error: "+(e&&e.message||e),"err");
    })
    .setAvailStatus(st.availYear,st.availMonth,status);
}

function buildKetersediaanUI(data){
  var isOpen=data.availStatus==="OPEN";
  var chevL='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
  var chevR='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
  var h='<div class="avail-wrap">'+
    '<div class="month-nav-wrap"><div class="month-nav">'+
      '<button class="mon-btn" onclick="chAvailMonth(-1)">'+chevL+'</button>'+
      '<div class="month-lbl">'+BLN_L[st.availMonth]+' '+st.availYear+'</div>'+
      '<button class="mon-btn" onclick="chAvailMonth(1)">'+chevR+'</button>'+
    '</div>'+
    '<div id="avail-toggle-wrap">'+availToggleHtml(isOpen)+'</div></div>';
  // ── Service-type tabs ──
  var svcTabs=["all","Voltage","AOG","Umum"];
  var allVols=(data.allVolunteers||data.byRole||{});
  h+='<div class="avail-svc-tabs">';
  svcTabs.forEach(function(t){
    var label=t==="all"?"Semua":t;
    var cnt=0;
    if(t==="all"){data.roles.forEach(function(r){cnt+=((data.byRole||{})[r]||[]).length;});}
    else{data.roles.forEach(function(r){((data.byRole||{})[r]||[]).forEach(function(p){if(p.elig&&p.elig[t])cnt++;else if(!p.elig&&t!=="all")cnt++;});});}
    h+='<button class="avail-svc-tab'+(AVAIL_SVC_TAB===t?' on':'')+'" onclick="setAvailSvcTab(\''+escQ(t)+'\')">'+esc(label)+'<span class="avail-svc-cnt">'+cnt+'</span></button>';
  });
  h+='</div>';      

  var dates=data.dates||[];
  var anyPeople=data.roles.some(function(r){return ((data.byRole||{})[r]||[]).length;});
  if(!dates.length){
    h+='<div class="empty-state">Tidak ada tanggal Sabtu/Minggu di bulan ini.</div>';
  } else if(!anyPeople){
    h+='<div class="empty-state">Belum ada musisi aktif.</div>';
  } else {
    h+='<div class="avail-legend"><span><i style="background:rgba(74,222,128,.85)"></i>Bisa</span><span><i style="background:rgba(248,113,113,.9)"></i>Blokir</span></div>';
    h+=buildKetersediaanTables(data,AVAIL_SVC_TAB);
  }
  h+='</div>';
  document.getElementById("content").innerHTML=h;
}
function setAvailSvcTab(t){AVAIL_SVC_TAB=t;buildKetersediaanUI(st.availData);}        

function buildKetersediaanTables(data,svcFilter){
  var dates=data.dates||[],h="";
  data.roles.forEach(function(role){
    var allPeople=((data.byRole||{})[role])||[];
    var people=allPeople;
    if(svcFilter&&svcFilter!=="all"){
      people=allPeople.filter(function(p){
        if(!p.elig)return true;   // no elig data = eligible for all
        return !!p.elig[svcFilter];
      });
    }
    if(!people.length)return;
    var c=C(role);
    h+='<div class="avail-role-block">'+
      '<div class="avail-role-hdr" style="color:'+c.fg+'">'+esc(roleLabel(role))+' <span style="color:#4a5070;font-weight:500;font-size:12px">('+people.length+')</span></div>'+
      '<div class="avail-scroll"><table class="avail-tbl"><tr><th class="avail-name-col">Nama</th>';
    dates.forEach(function(dt){h+='<th class="avail-date-col">'+HARI_S[dt.dow]+'<br>'+dt.day+'</th>';});
    h+='</tr>';
    people.forEach(function(p){
      var bset={};(p.blocked||[]).forEach(function(d){bset[d]=true;});
      h+='<tr><td class="avail-name-col">'+esc(p.name)+'</td>';
      dates.forEach(function(dt){
        var blk=!!bset[dt.day];
        h+='<td class="avail-cell"><span class="avail-pill '+(blk?'blk':'ok')+'"></span></td>';
      });
      h+='</tr>';
    });
    h+='</table></div></div>';
  });
  return h;
}

      '<button class="note-form-cancel" onclick="cancelNoteForm()">Batal</button>'+

  '</div>';
  wrap.scrollIntoView({behavior:"smooth"});
}

function cancelNoteForm(){
  var wrap=document.getElementById("note-form-wrap");
  if(wrap)wrap.innerHTML="";
  if(_editingNoteIdx!==null){
    var card=document.getElementById("note-card-"+_editingNoteIdx);
    if(card)card.style.display="";
  }
  _editingNoteIdx=null;
}

function editNote(idx){
  showNoteForm(idx);
}

function deleteNote(idx){
  showModal("Hapus Catatan","Yakin hapus catatan \""+_notes[idx].judul+"\"?\nTindakan ini tidak bisa dibatalkan.","Hapus",function(){
    google.script.run
      .withSuccessHandler(function(){
        showToast("Catatan dihapus.","ok");
        st.notesCache=null;
        renderCatatan();
      })
      .withFailureHandler(function(e){showToast("Gagal: "+e.message,"err");})
      .deleteNote(idx);
  });
}

function saveNote(){
  var tanggal=(document.getElementById("nf-tanggal").value||"").trim();
  var judul=(document.getElementById("nf-judul").value||"").trim();
  var isi=(document.getElementById("nf-isi").value||"").trim();
  var oleh=(document.getElementById("nf-oleh").value||"").trim();
  var link=(document.getElementById("nf-link").value||"").trim();
  if(!judul||!isi){showToast("Judul dan isi wajib diisi.","warn");return;}
  var btn=document.querySelector(".note-form-save");
  if(btn){btn.disabled=true;btn.textContent="Menyimpan…";}
  google.script.run
    .withSuccessHandler(function(){
      showToast("Catatan disimpan.","ok");
      _editingNoteIdx=null;
      st.notesCache=null;
      renderCatatan();
    })
    .withFailureHandler(function(e){
      if(btn){btn.disabled=false;btn.textContent="Simpan";}
      showToast("Gagal: "+e.message,"err");
    })
    .saveNote(_editingNoteIdx,tanggal,judul,isi,oleh,link);
}

/* ── HELPERS ── */
function countFilled(slot){var n=0;PAW_ROLES.forEach(function(r){if(r==="Speaker"&&st.dept!=="PAW"&&st.dept!=="EK")return;if(slot.slots[r]&&slot.slots[r].length>0)n++;});return n;}
function isoDate(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function pad(n){return n<10?"0"+n:String(n);}
function safeId(k){return k.replace(/[^a-z0-9]/gi,"_");}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function escQ(s){return String(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
var _tt=null;
function showToast(msg,type){var el=document.getElementById("toast");el.textContent=msg;el.className="toast "+(type||"ok");clearTimeout(_tt);setTimeout(function(){el.classList.add("on");},10);_tt=setTimeout(function(){el.classList.remove("on");},3200);}
(function(){var sx=0;document.addEventListener("touchstart",function(e){sx=e.touches[0].clientX;},{passive:true});document.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-sx;if(dx<-50&&document.getElementById("dr").classList.contains("on"))closeDr();},{passive:true});})();

var _modalCb=null;
function showModal(title,msg,confirmTxt,cb){
  _modalCb=cb;
  document.getElementById("modal-title").textContent=title;
  document.getElementById("modal-msg").textContent=msg;
  document.getElementById("modal-confirm-btn").textContent=confirmTxt;
  document.getElementById("modal-ov").classList.add("on");
  document.getElementById("modal-box").classList.add("on");
}
function closeModal(){
  document.getElementById("modal-ov").classList.remove("on");
  document.getElementById("modal-box").classList.remove("on");
  _modalCb=null;
}
function doModalConfirm(){
  var cb=_modalCb;
  closeModal();
  if(cb)cb();
}

/* ── BACK BUTTON GUARD ──
   Back would otherwise drop the admin straight out — mid-edit, unsaved roster and
   all. We keep one sentinel history entry armed at all times: back pops it, we
   handle the press ourselves, then immediately re-arm. Net zero entries, so
   history never grows. */
var _navGuardArmed=false;

function armNavGuard(){
  try{ history.pushState({gmsGuard:1},""); _navGuardArmed=true; }catch(e){}
}

function isOn_(id){ var el=document.getElementById(id); return !!(el&&el.classList.contains("on")); }

function onNavBack(){
  armNavGuard();   // re-arm FIRST — if anything below throws, the guard survives

  // Peel overlays one layer at a time, topmost z-index first.
  if(isOn_("modal-ov")){closeModal();return;}
  if(isOn_("dr")){closeDr();return;}
  if(isOn_("slp")){closeSonglistEditor();return;}   // has its own unsaved-songlist prompt
  if(isOn_("rp")){closeRoster();return;}            // has its own unsaved-roster prompt

  var msg=st.dirty
    ? "Ada perubahan yang belum disimpan. Yakin keluar dari aplikasi Admin?"
    : "Yakin keluar dari aplikasi Admin?";
   showModal("Keluar Aplikasi",msg,"Keluar",function(){ exitApp_(); });
}

/* Best-effort exit. JS can't force-close an installed PWA: history.go() only
   leaves if there's somewhere to go, and window.close() only works on
   script-opened windows. So try both, then check whether we're still here — if
   we are, RE-ARM the guard (otherwise back would be dead for the rest of the
   session) and say so plainly instead of pretending it worked. */
function exitApp_(){
  _navGuardArmed=false;
  window.removeEventListener("popstate",onPopGuard);

  var t=setTimeout(function(){
    window.addEventListener("popstate",onPopGuard);
    armNavGuard();
    showToast("Tidak bisa menutup otomatis — tutup lewat tombol sistem.","warn");
  },600);
  window.addEventListener("pagehide",function(){clearTimeout(t);},{once:true});   // we left → cancel the retry

  // history.length is 2 on a fresh launch (initial entry + our sentinel), so
  // >2 means there's real prior history to fall back to.
  if(history.length>2)history.go(-2);
  else { try{ window.close(); }catch(e){} }
}

function onPopGuard(){ if(_navGuardArmed)onNavBack(); }
window.addEventListener("popstate",onPopGuard);
armNavGuard();

</script>
