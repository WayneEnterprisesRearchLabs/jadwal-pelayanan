<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0c10">
<link rel="apple-touch-icon" href="icons/ADMIN-192.png">
<link rel="icon" type="image/png" href="icons/ADMIN-192.png">
<link rel="manifest" href="manifest.json">
<title>Admin Page - PAW</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
        integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
/* ── BASE RESET ─────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --page-pad: 25px;
}

html {
  -webkit-text-size-adjust: 100%;
  background: #0a0c10;
  overflow-x: hidden;
  width: 100%;
  max-width: 100%;
}

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: #0a0c10;
  color: #f0f0f5;
  min-height: 100svh;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  padding-top: env(safe-area-inset-top, 0px);
  user-select: none;
  -webkit-user-select: none;
}

input, textarea {
  user-select: text;
  -webkit-user-select: text;
}

/* ── HORIZONTAL TABLE ROLL OVER ─────── */
.ring-scroll {
  width: 100% !important;
  max-width: 100% !important;
  overflow-x: auto !important; /* Table scrolls internally, doesn't stretch screen */
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
}

.ring-tbl {
  min-width: 600px; /* Gives the summary table room to breathe */
}

/* ── OVERLAY + DRAWER ─────── */
.ov{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .3s}

/* ── OVERLAY + DRAWER ── */
.ov{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.7);opacity:0;pointer-events:none;transition:opacity .3s}
.ov.on{opacity:1;pointer-events:all}
.dr{position:fixed;left:0;top:0;bottom:0;z-index:200;width:260px;background:#12151c;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .32s cubic-bezier(.22,1,.36,1);padding-top:env(safe-area-inset-top,0px)}
.dr.on{transform:translateX(0)}
.dr-top{display:flex;align-items:center;gap:11px;padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.dr-ring{width:36px;height:36px;border-radius:50%;background:#e8b84b;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.dr-ring img{width:100%;height:100%;object-fit:cover;display:none}
.dr-ring svg{width:19px;height:19px}
.dr-sub{font-size:10px;color:#8890aa;letter-spacing:.06em;text-transform:uppercase}
.dr-title{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;line-height:1.3;margin-top:1px}
.dr-nav{flex:1;padding:10px 0}
.dr-item{display:flex;align-items:center;gap:12px;padding:13px 18px;cursor:pointer;font-size:15px;font-weight:500;color:#8890aa;transition:background .12s,color .12s;position:relative}
.dr-item:active{background:rgba(255,255,255,.04)}
.dr-item.on{color:#f0f0f5}
.dr-item.on::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 3px 3px 0;background:#e8b84b}
.dr-item svg{opacity:.6;flex-shrink:0}
.dr-item.on svg{opacity:1}
.dr-close{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);color:#4a5070;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;padding-bottom:calc(14px + env(safe-area-inset-bottom,0px))}

/* ── PAGE ─────────────────── */
.page {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
  position: relative;
  overflow: hidden;
}

.page:has(.roster-page.on) {
  height: 100svh;
  min-height: unset;
  overflow: hidden;
}

/* ── HEADER ── */
.hdr{
  position:sticky;
  top:0;
  z-index:40;
  background:linear-gradient(180deg,#12151c 85%,transparent);
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:24px var(--page-pad) 14px;
  margin-bottom:12px;
  width:100%;
  animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;
}
.hdr-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.menu-btn{width:36px;height:36px;border-radius:10px;background:none;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#f0f0f5;transition:background .15s;margin-top:2px}
.menu-btn:active{background:rgba(255,255,255,.08)}
.hdr-text{flex:1;min-width:0}
.hdr-badge{display:inline-flex;align-items:center;background:rgba(244,160,110,.15);color:#f4a06e;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border-radius:7px;flex-shrink:0;margin-top:5px}
.hdr-title{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;line-height:1;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:10px;color:#8890aa;letter-spacing:.06em;text-transform:uppercase;margin-top:3px}
.hdr-logo{width:36px;height:36px;border-radius:50%;background:#e8b84b;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;animation:logoBreathe 3.5s ease-in-out infinite;margin-top:2px}
@keyframes logoBreathe{
  0%,100%{ box-shadow:0 0 0px 0px rgba(232,184,75,0);background:#e8b84b; }
  50%    { box-shadow:0 0 16px 6px rgba(232,184,75,.5);background:#f2ca52; }
}
.hdr-logo img{width:100%;height:100%;object-fit:cover;display:none;opacity:0;transition:opacity .4s ease}
.hdr-logo img.loaded{opacity:1}

/* ── CONTENT ── */
.content{flex:1;padding-left:var(--page-pad);padding-right:var(--page-pad);padding-bottom:calc(env(safe-area-inset-bottom,0px)+80px);box-sizing:border-box;overflow-x:hidden}

/* ── LOADING ── */
.init-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;text-align:center}
.big-spin{width:36px;height:36px;border-radius:50%;border:3px solid #222737;border-top-color:#e8b84b;animation:spin .7s linear infinite;margin:0 auto 16px}
.big-spin-lbl{font-size:15px;color:#8890aa}

/* ── MONTH NAV — centered, yellow, auto below ── */
.month-nav-wrap{margin-top:8px;margin-bottom:16px}
.month-nav-wrap{margin-top:20px}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
/* Yellow, large month label */
.month-lbl{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.01em;color:#e8b84b;text-align:center;flex:1}
.mon-btn{width:36px;height:36px;border-radius:10px;background:#12151c;border:1px solid rgba(255,255,255,.13);color:#8890aa;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;flex-shrink:0}
.mon-btn:active{background:#222737;color:#f0f0f5}
.mon-btn:disabled{opacity:.22;cursor:default}
/* Auto assign all — full width below month nav */
.auto-all-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:12px;background:rgba(232,184,75,.13);border:1.5px solid rgba(232,184,75,.3);color:#e8b84b;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.auto-all-btn:active{background:rgba(232,184,75,.22)}

/* ── PUBLISH TOGGLE (per-month OPEN / CLOSE) ── */
.pub-toggle{display:flex;gap:8px}
.pub-btn{flex:1;padding:10px 0;border-radius:12px;background:#12151c;border:1.5px solid rgba(255,255,255,.13);color:#8890aa;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;letter-spacing:.03em;cursor:pointer;transition:background .15s,border-color .15s,color .15s}
.pub-btn:active{transform:translateY(1px)}
.pub-btn.pub-close.active{background:rgba(220,53,69,.16);border-color:rgba(220,53,69,.6);color:#ff6b7a}
.pub-btn.pub-open.active{background:rgba(40,167,69,.16);border-color:rgba(40,167,69,.6);color:#4ade80}
.pub-note{margin-top:7px;font-size:11.5px;text-align:center;color:#8890aa;line-height:1.4}
.pub-note.closed{color:#ff6b7a}
.pub-note.open{color:#6ee7a0}
.rs-sub-hint{font-size:11px;color:#e8b84b;opacity:.92;margin:3px 0 2px 5px;line-height:1.35}
.rs-sub-hint b{font-weight:700}


/* ── EVENT LIST ── */
.ev-list{display:flex;flex-direction:column;gap:0}
.day-group{margin-bottom:20px}
.day-group{margin-top:20px}
/* Yellow, bigger date header */
.day-group-hdr{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#e8b84b;margin-bottom:10px;letter-spacing:-.01em}
.ev-cards{display:flex;flex-direction:column;gap:8px}
.ev-card{background:#12151c;border:1.5px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s,background .15s;animation:fadeUp .25s cubic-bezier(.22,1,.36,1) both}
@keyframes ev-breathe{0%,100%{box-shadow:0 0 0 0 rgba(232,184,75,0)}50%{box-shadow:0 0 0 9px rgba(232,184,75,.35)}}
.ev-card.just-saved{animation:ev-breathe 1s ease-in-out 1}
.ev-card:nth-child(1){animation-delay:.02s}.ev-card:nth-child(2){animation-delay:.05s}.ev-card:nth-child(3){animation-delay:.08s}
.ev-card:active{background:#1a1e28}
.ev-card.filled{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.06)}
.ev-card.filled .ev-svc-name{color:#4ade80}
.ev-card.filled .ev-svc-time{color:#2d9e57}
.ev-card.partial{border-color:rgba(232,184,75,.2);background:rgba(232,184,75,.03)}
.ev-card.partial .ev-svc-name{color:#e8b84b}
.ev-card.partial .ev-svc-time{color:#c49a32}
.ev-card.empty-tmpl{opacity:.65}
.ev-svc-info{flex:1;min-width:0}
.ev-svc-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#f0f0f5}
.ev-svc-time{font-size:13px;color:#8890aa;margin-top:2px}
.ev-fill-badge{flex-shrink:0;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.badge-full{background:rgba(74,222,128,.15);color:#4ade80}
.badge-partial{background:rgba(232,184,75,.15);color:#e8b84b}
.badge-empty{background:rgba(255,255,255,.06);color:#8890aa}
.ev-arrow{color:#4a5070;flex-shrink:0;display:flex;align-items:center}

/* ── ADD EVENT ── */
.add-ev-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:14px;border:1.5px dashed rgba(255,255,255,.15);background:none;color:#8890aa;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;transition:border-color .15s,color .15s}
.add-ev-btn:active{border-color:rgba(232,184,75,.4);color:#e8b84b}
.add-ev-form{background:#12151c;border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:16px;margin-top:8px;animation:fadeUp .2s cubic-bezier(.22,1,.36,1)}
.add-ev-form-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:12px;color:#e8b84b}
.form-row{margin-bottom:10px}
.form-inp{background:#1a1e28;border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:#f0f0f5;outline:none;-webkit-appearance:none;width:100%;transition:border-color .2s}
.form-inp:focus{border-color:#e8b84b}
.form-inp::placeholder{color:#4a5070}
.form-row-btns{display:flex;gap:8px}
.btn-save{flex:1;padding:10px;border-radius:10px;border:none;background:#e8b84b;color:#0a0c10;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.btn-cancel{padding:10px 16px;border-radius:10px;border:1.5px solid rgba(255,255,255,.1);background:none;color:#8890aa;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
.chk-row{display:flex;align-items:center;gap:10px;padding:8px 2px;cursor:pointer;font-size:13px;color:#8890aa}
.chk-box{position:relative;width:20px;height:20px;flex-shrink:0;-webkit-appearance:none;appearance:none;border-radius:6px;border:1.5px solid rgba(167,139,250,.4);background:rgba(167,139,250,.08);cursor:pointer;transition:all .15s;margin:0}
.chk-box:checked{background:#a78bfa;border-color:#a78bfa}
.chk-box:checked::after{content:'';position:absolute;left:6px;top:2px;width:5px;height:10px;border:solid #0a0c10;border-width:0 2px 2px 0;transform:rotate(45deg)}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(20px);background:#1a1e28;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 20px;font-size:14px;color:#f0f0f5;box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap;z-index:500}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(74,222,128,.3);color:#4ade80}
.toast.err{border-color:rgba(248,113,113,.3);color:#f87171}
.toast.warn{border-color:rgba(232,184,75,.3);color:#e8b84b}


/* ── ROSTER PAGE ── */
.roster-page{position:absolute;inset:0;z-index:100;background:#0d0f14;transform:translateX(100%);transition:transform .32s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;overflow:hidden;padding-top:env(safe-area-inset-top,0px);padding-bottom:0}
.roster-page.on{transform:translateX(0)}
@media(max-width:480px){
  .roster-page{left:0;transform:translateX(100vw)}
  .roster-page.on{transform:translateX(0)}
}
.rp-hdr{padding:14px var(--page-pad);background:#0d0f14;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.rp-hdr-row1{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.rp-back{width:36px;height:36px;border-radius:10px;background:none;border:1.5px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#f0f0f5;flex-shrink:0}
.rp-back:active{background:rgba(255,255,255,.08)}
.rp-info{flex:1;min-width:0}
.rp-date{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.01em;color:#f0f0f5}
.rp-svc{font-size:13px;color:#8890aa;margin-top:2px}
.rp-edit-form{background:#1a1e28;border-radius:12px;padding:12px;display:none;flex-direction:column;gap:8px}
.rp-edit-form.on{display:flex}
.rp-edit-row{display:flex;gap:8px}
.rp-inp{background:#0d0f14;border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:#f0f0f5;outline:none;-webkit-appearance:none;flex:1;min-width:0;transition:border-color .2s}
.rp-inp:focus{border-color:#e8b84b}
.rp-inp::placeholder{color:#4a5070}
.rp-edit-btns{display:flex;gap:8px}
.rp-apply-btn{flex:1;padding:9px;border-radius:9px;border:none;background:#e8b84b;color:#0a0c10;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.rp-cancel-edit-btn{padding:9px 14px;border-radius:9px;border:1.5px solid rgba(255,255,255,.1);background:none;color:#8890aa;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.rp-auto-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:11px;background:rgba(232,184,75,.13);border:1.5px solid rgba(232,184,75,.28);color:#e8b84b;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:24px;margin-bottom:16px}

.rp-auto-btn:active{background:rgba(232,184,75,.22)}
.rp-body{flex:1;overflow-y:auto;padding:0px var(--page-pad) 150px}
.rp-save-bar{position:absolute;bottom:0;left:0;right:0;padding:12px var(--page-pad) calc(12px + env(safe-area-inset-bottom,0px));background:linear-gradient(0deg,#0d0f14 85%,transparent);display:flex;flex-direction:column;gap:8px}
.rp-save-btn{width:100%;padding:14px;border-radius:13px;border:none;background:#333744;color:#666a7a;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:default;transition:background .25s,color .25s}
.rp-save-btn.dirty{background:#e8b84b;color:#0a0c10;cursor:pointer}
.rp-save-btn:active{opacity:.85;transform:scale(.98)}
.rp-save-btn:disabled{opacity:.4;cursor:default}
.rp-del-btn{width:100%;padding:12px;border-radius:13px;border:1.5px solid rgba(248,113,113,.3);background:none;color:#f87171;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:16px}

/* ── ROSTER SEGMENTS ── */
.rs-block{border-radius:12px;overflow:visible;margin-bottom:20px;margin-left:0px;margin-right:0px}
.rs-sub-divider{height:1px;background:rgba(255,255,255,.1)}
.rs-role-row{display:flex;align-items:center;gap:0;min-height:48px;position:relative}
.rs-block .rs-role-row:first-child{border-top-left-radius:12px;border-top-right-radius:12px}
.rs-block .rs-role-row:last-child{border-bottom-left-radius:12px;border-bottom-right-radius:12px}
.rs-lbl{flex-shrink:0;width:30%;min-width:72px;padding:10px 8px 10px 14px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;line-height:1.2;display:flex;align-items:center}
.rs-inputs{flex:1;padding:6px 12px 6px 6px;display:flex;flex-direction:column;gap:5px;border-left:1px solid rgba(255,255,255,.08)}
.rs-select-wrap{display:flex;align-items:center;gap:6px}
.rs-select{flex:1;background:#0d0f14;border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:8px 30px 8px 10px;font-family:'DM Sans',sans-serif;font-size:14px;color:#f0f0f5;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;transition:border-color .2s;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='%238890aa' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center}
.rs-select:focus{border-color:#e8b84b}
.rs-select.warn-select{border-color:rgba(248,113,113,.5)}
.rs-text-inp{flex:1;background:#0d0f14;border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:#f0f0f5;outline:none;-webkit-appearance:none;transition:border-color .2s}
.rs-text-inp:focus{border-color:#e8b84b}
.rs-text-inp::placeholder{color:#4a5070}
.rs-remove-btn{width:20px;height:20px;border-radius:8px;border:1px solid rgba(248,113,113,.25);background:none;color:#f87171;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.rs-add-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;border:1px dashed rgba(255,255,255,.15);background:none;color:#8890aa;font-size:12px;font-weight:500;cursor:pointer;align-self:flex-start;margin-top:2px}
.rs-add-btn:active{border-color:rgba(232,184,75,.4);color:#e8b84b}
.group-lbl{text-align:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#e8b84b;letter-spacing:.08em;text-transform:uppercase;padding:4px 0;margin:4px 0}
.warn-box{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:10px 14px;margin-bottom:16px;margin-left:13px;margin-right:13px;font-size:13px;color:#f87171;line-height:1.5;display:none}
.warn-box.on{display:block}

/* ── RINGKASAN ── */
.ring-wrap{animation:fadeUp .3s cubic-bezier(.22,1,.36,1)}

@keyframes lock-spin{to{transform:rotate(360deg)}}

</style>

<script>
// ============================================================
//  GAS SHIM — makes google.script.run work over fetch() (static PWA)
//  Ported from the volunteer index.html shim so the admin's existing
//  google.script.run.*(...) call sites keep working with no rewrites.
// ============================================================
var EXEC_URL = "https://script.google.com/macros/s/AKfycbyRFSxg1KEJelSsBMs4rBBf6-h0G1jiWF04TsITRzFhkvGd-sIhLbjlaB3K3HgkghIA/exec";

var API_PARAM_MAP = {
  verifyKey:         ['key'],
  getAdminData:      ['year','month'],
  getMonthStatus:    ['year','month'],
  setMonthStatus:    ['year','month','status'],
  saveServiceRoster: ['dateStr','service','time','dayName','rosterJson','isSpecial'],
  deleteService:     ['dateStr','service','time'],
  getNotes:          [],
  saveNote:          ['idx','tanggal','judul','isi','oleh'],
  deleteNote:        ['idx']
};
// Matches the backend's ADMIN_ACTIONS in code.gs exactly (getAdminData is
// gated server-side too, not just the writes) — plus verifyKey, which needs
// the key sent but must NOT have it overwritten by the stored ADMIN_KEY var.
// All of these go over POST so the key never sits in a URL query string or
// server log, even for the "read" (getAdminData).
var API_KEY_REQUIRED = ['verifyKey','getAdminData','saveServiceRoster','deleteService','saveNote','deleteNote'];

// Access key held only in sessionStorage (cleared when the tab closes).
// It is attached to every gated request; the Apps Script backend (ADMIN_KEY
// check in apiDispatch_) is what actually enforces it — this frontend gate
// is UX, not the security boundary.
var ADMIN_KEY = sessionStorage.getItem('paw_admin_key') || "";
function setAdminKey(k){ ADMIN_KEY = k || ""; if (k) sessionStorage.setItem('paw_admin_key', k); else sessionStorage.removeItem('paw_admin_key'); }

function callApi(action, args){
  var names = API_PARAM_MAP[action] || [];
  var params = {action: action};
  names.forEach(function(name, i){
    var val = args[i];
    params[name] = (val===undefined || val===null) ? "" : val;
  });
  var isKeyed = API_KEY_REQUIRED.indexOf(action) !== -1;
  // verifyKey already carries the freshly-typed key via its own param (above);
  // don't clobber it with the (possibly empty/stale) stored ADMIN_KEY.
  if (isKeyed && action !== 'verifyKey') params.key = ADMIN_KEY;

  if (isKeyed){
    return fetch(EXEC_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(params)
    }).then(function(r){ return r.json(); }).then(handleAuth);
  }
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
  }).join('&');
  return fetch(EXEC_URL + '?' + qs).then(function(r){ return r.json(); }).then(handleAuth);
}

// If the backend rejects the key mid-session (revoked/changed), drop it and
// re-show the lock screen instead of silently failing writes. Backend
// returns the literal string "Unauthorized" (apiDispatch_ in code.gs) —
// matched case-insensitively so a future casing tweak server-side doesn't
// silently break this.
function handleAuth(data){
  if (data && data.error && String(data.error).toLowerCase() === 'unauthorized'){
    setAdminKey("");
    if (typeof showLock === 'function') showLock('Sesi berakhir. Masukkan kunci lagi.');
  }
  return data;
}

// ── LOGIN GATE CONTROLLER ───────────────────────────────────
function showLock(msg){
  var lock = document.getElementById('lock');
  if (lock) lock.classList.remove('hide');
  var err = document.getElementById('lock-err');
  if (err) err.textContent = msg || '';
  var inp = document.getElementById('lock-input');
  if (inp){ inp.value=''; try{ inp.focus(); }catch(e){} }
}
function hideLock(){
  var lock = document.getElementById('lock');
  if (lock) lock.classList.add('hide');
}
function setLockBusy(busy){
  var btn = document.getElementById('lock-btn');
  if (!btn) return;
  btn.disabled = busy;
  btn.innerHTML = busy ? '<span class="lock-spin"></span>' : 'Masuk';
}
function submitKey(ev){
  if (ev) ev.preventDefault();
  var inp = document.getElementById('lock-input');
  var err = document.getElementById('lock-err');
  var key = inp ? inp.value.trim() : '';
  if (!key){ if(err) err.textContent='Kunci tidak boleh kosong.'; return false; }
  if (err) err.textContent='';
  setLockBusy(true);
  callApi('verifyKey', [key]).then(function(data){
    setLockBusy(false);
    if (data && data.ok){
      setAdminKey(key);
      hideLock();
    } else {
      setAdminKey('');
      if (err) err.textContent = (data && data.message) || 'Kunci salah.';
      if (inp){ inp.value=''; inp.focus(); }
    }
  }).catch(function(e){
    setLockBusy(false);
    if (err) err.textContent = 'Gagal terhubung. Coba lagi.';
  });
  return false;
}
// On load: if a key is already stored this session, verify it silently and
// skip the prompt; otherwise show the lock. Reads have already begun behind it.
(function initLock(){
  if (ADMIN_KEY){
    callApi('verifyKey', [ADMIN_KEY]).then(function(data){
      if (data && data.ok) hideLock(); else { setAdminKey(''); showLock(); }
    }).catch(function(){ showLock(); });
  } else {
    showLock();
  }
})();

function GasRun(){ this._s=null; this._f=null; }
GasRun.prototype.withSuccessHandler=function(fn){ this._s=fn; return this; };
GasRun.prototype.withFailureHandler=function(fn){ this._f=fn; return this; };
Object.keys(API_PARAM_MAP).forEach(function(fnName){
  GasRun.prototype[fnName]=function(){
    var args=Array.prototype.slice.call(arguments), s=this._s, f=this._f;
    callApi(fnName, args).then(function(data){
      if (data && data.error){ if(f) f({message:data.error}); else console.error(data.error); return; }
      if (s) s(data);
    }).catch(function(err){
      if (f) f({message: err.message || String(err)}); else console.error(err);
    });
    return this;
  };
});

function generateSlots(year,month,existing){
  var used={},slots=[];
  var d=new Date(year,month,1);
  while(d.getMonth()===month){
    var dow=d.getDay(),tpls=null;
    if(dow===6)tpls=SAT_TEMPLATES;else if(dow===0)tpls=SUN_TEMPLATES;
    if(tpls){tpls.forEach(function(t){var ds=isoDate(d),dn=dow===0?"Minggu":"Sabtu",key=ds+"|"+t.service+"|"+t.time;if(!used[key]){used[key]=true;var ex=null;for(var i=0;i<existing.length;i++){if(existing[i].date===ds&&existing[i].service===t.service&&existing[i].time===t.time){ex=existing[i];break;}}slots.push({date:ds,day:dn,time:t.time,service:t.service,slots:ex?ex.slots:{},key:key,isCustom:false,isSpecial:ex?!!ex.isSpecial:false});}});}
    d.setDate(d.getDate()+1);
  }
  existing.forEach(function(s){var key=s.date+"|"+s.service+"|"+s.time;if(!used[key]){used[key]=true;slots.push({date:s.date,day:s.day,time:s.time,service:s.service,slots:s.slots||{},key:key,isCustom:true,isSpecial:!!s.isSpecial});}});
  slots.sort(function(a,b){return (a.date+a.time+a.service).localeCompare(b.date+b.time+b.service);});
  return slots;
}

function filterJadwal(q){

    var cards=grp.querySelectorAll(".ev-card");

    var anyCard=false;
    cards.forEach(function(card){
      var name=card.querySelector(".ev-svc-name");
      var time=card.querySelector(".ev-svc-time");
      var match=!q||grpMatch||(name&&name.textContent.toLowerCase().indexOf(q)!==-1)||(time&&time.textContent.toLowerCase().indexOf(q)!==-1);

  });
}

function dimBg(bg,factor){
  var m=bg.match(/rgba\(([\d.]+),([\d.]+),([\d.]+),([\d.]+)\)/);
  if(!m)return bg;
  var a=parseFloat(m[4])*(factor!==undefined?factor:0.35);
  return "rgba("+m[1]+","+m[2]+","+m[3]+","+a.toFixed(3)+")";
}

function getMusiciansByRole(role){

function getCountExcl(name){
  var total=(st.data&&st.data.serviceCount&&st.data.serviceCount[name])||0;
  if(st.currentSlot&&st.currentSlot.slots){PAW_ROLES.forEach(function(r){(st.currentSlot.slots[r]||[]).forEach(function(x){if((x.name||x)===name)total--;});});}

}

/* ── AUTO ASSIGN ── */
function doAutoAssign(){
  if(!st.data||!st.data.musicians){showToast("Data belum dimuat.","warn");return;}
  st.rosterState=autoAssignRoster(st.data.musicians,st.data.serviceCount,st.currentSlot);
  st.dirty=true;updateSaveBtn();
  renderRosterPage();showToast("Auto assign selesai. Cek sebelum simpan.","ok");
}

function autoAssignAll(){
  if(!st.data||!st.data.musicians){showToast("Data belum dimuat.","warn");return;}
  var emptySlots=st.slots.filter(function(s){return countFilled(s)===0;});
  if(!emptySlots.length){showToast("Semua sudah terisi! 🎉","ok");return;}
  showModal("Auto Assign Semua","Ini akan mengisi otomatis "+emptySlots.length+" ibadah yang masih kosong.","Lanjutkan",function(){
    var total=emptySlots.length,done=0,failed=0;
    showToast("Menyimpan "+total+" ibadah…","ok");
    emptySlots.forEach(function(slot){
      var res=autoAssignRoster(st.data.musicians,st.data.serviceCount,slot);
      var clean={};
      PAW_ROLES.forEach(function(role){
        var names=(res[role]||[]).filter(function(x){return x;});
        if(names.length)clean[role]=names;
      });
      google.script.run
        .withSuccessHandler(function(r){
          done++;
          if(r&&r.ok){
            slot.slots={};
            Object.keys(clean).forEach(function(role){slot.slots[role]=clean[role].map(function(n){return{name:n};});});
          } else {
            failed++;
          }
          if(done===total){
            renderJadwal();
            showToast(failed?("Selesai, "+failed+" gagal disimpan."):("Auto assign "+total+" ibadah selesai."),failed?"warn":"ok");
          }
        })
        .withFailureHandler(function(e){
          done++;failed++;
          if(done===total){
            renderJadwal();
            showToast("Selesai, "+failed+" gagal disimpan.","warn");
          }
        })
        .saveServiceRoster(slot.date,slot.service,slot.time,slot.day,JSON.stringify(clean),!!slot.isSpecial);
    });
  });
}

function autoAssignRoster(musicians,serviceCount,slot){
  var pool={};PAW_ROLES.forEach(function(r){pool[r]=[];});
  musicians.forEach(function(m){if(!m.roles)return;m.roles.forEach(function(r){if(pool[r])pool[r].push(m.name);});});
  var cntMap={};if(serviceCount)Object.keys(serviceCount).forEach(function(n){cntMap[n]=serviceCount[n]||0;});
  if(slot&&slot.slots){PAW_ROLES.forEach(function(r){(slot.slots[r]||[]).forEach(function(x){var nm=x.name||x;cntMap[nm]=Math.max(0,(cntMap[nm]||0)-1);});});}
  var used={},result={};
  PAW_ROLES.forEach(function(role){
    var cands=pool[role].filter(function(n){return !used[n];});
    cands.sort(function(a,b){return (cntMap[a]||0)-(cntMap[b]||0);});
    var cnt=role==="Singer"?3:1,picked=[];
    cands.forEach(function(n){if(picked.length<cnt){picked.push(n);used[n]=true;}});
    result[role]=picked.length>0?picked:[""];
  });
  return result;
}

function saveRoster(){
  if(!st.currentSlot)return;
  var btn=document.getElementById("rp-save");btn.disabled=true;btn.textContent="Menyimpan…";
  var clean={};
  PAW_ROLES.forEach(function(role){var names=(st.rosterState[role]||[]).filter(function(n){return n&&n.trim();});if(names.length)clean[role]=names;});
  var slot=st.currentSlot;
  google.script.run
    .withSuccessHandler(function(res){
      btn.disabled=false;btn.textContent="Simpan Jadwal ✓";
      if(res.ok){st.dirty=false;updateSaveBtn();showToast(res.msg,"ok");slot.slots={};Object.keys(clean).forEach(function(r){slot.slots[r]=clean[r].map(function(n){return{name:n};});});closeRoster();renderJadwal();scrollToSavedCard(slot.key);}   
      else showToast(res.msg||"Gagal menyimpan.","err");
    })
    .withFailureHandler(function(e){btn.disabled=false;btn.textContent="Simpan Jadwal ✓";showToast("Error: "+e.message,"err");})
    .saveServiceRoster(slot.date,slot.service,slot.time,slot.day,JSON.stringify(clean),!!slot.isSpecial);
}

      '<button class="mon-btn" onclick="chMonth(-1)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>'+
      '<div style="font-family:Syne,sans-serif;font-weight:800;font-size:18px;color:#e8b84b">'+BLN_L[st.month]+" "+st.year+'</div>'+
      '<button class="mon-btn" onclick="chMonth(1)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>'+
    '</div>';

  if(!satSun.length){
    h+='<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Belum ada data Sabtu/Minggu.</div>';
    document.getElementById("content").innerHTML=h;
    return;
  }

  h+='<button class="ring-save-img-btn" onclick="saveRingkasanAsImage()" style="width:100%;background:#e8b84b;color:#0a0c10;border:none;font-weight:700;font-size:15px;padding:13px;border-radius:13px;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px">'+
    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'+
    'Simpan Gambar'+
  '</button>';

  var groupMap={};
  var groups=(st.data&&st.data.groups)||{};
  Object.keys(groups).forEach(function(g){
    Object.keys(groups[g]).forEach(function(role){
      groups[g][role].forEach(function(name){groupMap[name]=g;});
    });
  });

  var dateGroups={},dateOrder=[];
  satSun.forEach(function(s){if(!dateGroups[s.date]){dateGroups[s.date]={day:s.day,slots:[]};dateOrder.push(s.date);}dateGroups[s.date].slots.push(s);});
  var weekMap={},weekOrder=[];
  dateOrder.forEach(function(ds){var d=new Date(ds+"T00:00:00"),w=Math.ceil(d.getDate()/7);if(!weekMap[w]){weekMap[w]={dates:[],count:0};weekOrder.push(w);}weekMap[w].dates.push(ds);weekMap[w].count+=dateGroups[ds].slots.length;});

  h+='<div id="ring-table-wrap" style="background:#0a0c10;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.08)">';

  h+='<div style="padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.08);background:#12151c">'+
    '<span style="font-family:Syne,sans-serif;font-weight:800;font-size:20px;letter-spacing:-.02em;color:#f0f0f5">PAW</span>'+
    '<span style="font-family:Syne,sans-serif;font-weight:700;font-size:20px;letter-spacing:-.01em;color:#e8b84b;margin-left:10px">'+BLN_L[st.month].toUpperCase()+' '+st.year+'</span>'+
  '</div>';

  var ringColWidth=90, ringLabelWidth=80;
  var ringTotalWidth=ringLabelWidth+(satSun.length*ringColWidth);
  h+='<div class="ring-scroll"><table class="ring-tbl" style="width:'+ringTotalWidth+'px"><colgroup><col style="width:'+ringLabelWidth+'px">';
  satSun.forEach(function(){h+='<col style="width:'+ringColWidth+'px">';});
  h+='</colgroup>';

  h+='<tr><th class="role-col"></th>';
  weekOrder.forEach(function(w){h+='<th class="week-hdr" colspan="'+weekMap[w].count+'">WEEK '+w+'</th>';});
  h+='</tr>';

  h+='<tr><th class="role-col"></th>';
  dateOrder.forEach(function(ds){
    var d=new Date(ds+"T00:00:00");
    var dstr=HARI_S[d.getDay()]+", "+d.getDate()+" "+BLN_L[d.getMonth()];
    var isSpec=dateGroups[ds].slots.some(function(s){return s.isSpecial;});
    var style=isSpec?'background:rgba(192,132,252,.15);color:#c084fc':'';
    h+='<th class="date-hdr" colspan="'+dateGroups[ds].slots.length+'" style="'+style+'">'+esc(dstr)+'</th>';
  });
  h+='</tr>';

  h+='<tr><th class="role-col"></th>';
  satSun.forEach(function(s){
    var isSpec=!!s.isSpecial;
    var style=isSpec?'background:rgba(192,132,252,.12);color:#c084fc':'';
    h+='<th class="svc-hdr" style="'+style+'">'+esc(serviceLabel(s.service))+'<br><span style="color:#4a5070;font-size:10px">'+esc(s.time)+'</span></th>';
  });
  h+='</tr>';

  if(PAW_ROLES.indexOf("Speaker")!==-1){
    var spC=C("Speaker"),spTint=dimBg(spC.bg,0.3);
    h+='<tr><td class="role-col" style="color:'+spC.fg+';background:'+spC.bg+'">'+esc(roleLabel("Speaker"))+'</td>';
    satSun.forEach(function(s){
      var people=s.slots["Speaker"]||[];
      var names=people.map(function(p){var nm=p.name||p,sub=p.sub;return sub?'<s style="color:#f87171">'+esc(nm)+'</s><br><span style="color:#4ade80">'+esc(sub)+'</span>':esc(nm);}).join('<br><br>');
      var cellBg=s.isSpecial?'rgba(192,132,252,.14)':spTint;
      h+='<td class="'+(names?"cell-filled":"cell-empty")+'" style="background:'+cellBg+'">'+names+'</td>';
    });
    h+='</tr>';
  }

  h+='<tr><th class="role-col" style="color:#8890aa;font-size:10px;letter-spacing:.06em;text-transform:uppercase">Group</th>';
  satSun.forEach(function(s){
    var bandRoles=["WL","Singer","Keys","Guitar","Bass","Drums"];
    var g=null,isMix=false;
    bandRoles.forEach(function(role){
      (s.slots[role]||[]).forEach(function(p){
        var name=p.name||p;
        var pg=groupMap[name];
        if(!pg)return;
        if(g===null)g=pg;
        else if(g!==pg)isMix=true;
      });
    });
    var label=isMix?"MIX":(g?"GROUP "+String(g).replace(/^group\s*/i,'').trim():"—");
    var col=isMix?"color:#f59e0b":"color:#e8b84b";
    var grpBg=s.isSpecial?'background:rgba(192,132,252,.18);':'background:#1a1e28;';
    h+='<th style="'+grpBg+'font-size:11px;font-weight:800;'+col+'">'+label+'</th>';
  });
  h+='</tr>';

  PAW_ROLES.forEach(function(role){
    if(role==="Speaker")return;
    var c=C(role);
    var tint=dimBg(c.bg,0.5);
    h+='<tr><td class="role-col" style="color:'+c.fg+';background:'+c.bg+'">'+esc(roleLabel(role))+'</td>';
    satSun.forEach(function(s){
      var people=s.slots[role]||[];
      var names=people.map(function(p){var nm=p.name||p,sub=p.sub;return sub?'<s style="color:#f87171">'+esc(nm)+'</s><br><span style="color:#4ade80">'+esc(sub)+'</span>':esc(nm);}).join('<br><br>');
      var cellBg=s.isSpecial?'rgba(192,132,252,.14)':tint;
      var cls=names?"cell-filled":"cell-empty";
      h+='<td class="'+cls+'" style="background:'+cellBg+'">'+names+'</td>';
    });
    h+='</tr>';
  });

  h+='</table></div></div></div>';
  document.getElementById("content").innerHTML=h;
}
 
function saveRingkasanAsImage(){
  var outerWrapper=document.getElementById("ring-table-wrap");
  var scrollDiv=outerWrapper?outerWrapper.querySelector(".ring-scroll"):null;
  var table=outerWrapper?outerWrapper.querySelector(".ring-tbl"):null;
  if(!outerWrapper||!table){alert("Tidak ada data tabel untuk disimpan.");return;}

  var savedOuter={overflow:outerWrapper.style.overflow,width:outerWrapper.style.width};
  var savedScroll={overflowX:scrollDiv.style.overflowX,width:scrollDiv.style.width};
  outerWrapper.style.overflow="visible";
  outerWrapper.style.width=table.scrollWidth+"px";
  scrollDiv.style.overflowX="visible";
  scrollDiv.style.width=table.scrollWidth+"px";

  html2canvas(outerWrapper,{
    scrollX:0,scrollY:0,
    windowWidth:outerWrapper.scrollWidth,windowHeight:outerWrapper.scrollHeight,
    backgroundColor:"#0a0c10",scale:2
  }).then(function(canvas){
    outerWrapper.style.overflow=savedOuter.overflow;
    outerWrapper.style.width=savedOuter.width;
    scrollDiv.style.overflowX=savedScroll.overflowX;
    scrollDiv.style.width=savedScroll.width;
    var link=document.createElement("a");
    link.download="Jadwal_PAW_"+BLN_L[st.month]+"_"+st.year+".png";
    link.href=canvas.toDataURL("image/png");
    link.click();
  }).catch(function(err){
    outerWrapper.style.overflow=savedOuter.overflow;
    outerWrapper.style.width=savedOuter.width;
    scrollDiv.style.overflowX=savedScroll.overflowX;
    scrollDiv.style.width=savedScroll.width;
    console.error(err);alert("Gagal membuat gambar. Silakan coba lagi.");
  });
}

/* ── MASUKAN ── */
function renderMasukan(){
  var masukan=(st.data&&st.data.masukan)||[];
  var h='<div class="masukan-list">';
  if(!masukan.length)h+='<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Belum ada masukan.</div>';
  else masukan.forEach(function(m,i){h+='<div class="masukan-card" style="animation-delay:'+(i*.04)+'s"><div class="masukan-meta">'+esc(m.ts)+'</div><div class="masukan-nama">'+esc(m.nama)+'</div><div class="masukan-pesan">'+esc(m.pesan).replace(/\n/g,'<br>')+'</div></div>';});
  h+='</div>';document.getElementById("content").innerHTML=h;
}

function renderSheet(){
  var url=(st.data&&st.data.sheetUrl)||"";
  var sheets=["Musisi","Jadwal","Catatan","Masukan"];
  var colors=["#b78df7","#e8b84b","#5ecfa8","#7eb8f7"];
  var descs=["Daftar nama & peran musisi","Data jadwal ibadah","Pengumuman & catatan admin","Kritik & saran dari volunteer"];
  var h='<div style="padding-top:20px">'+
    '<div style="font-family:Syne,sans-serif;font-weight:800;font-size:20px;margin-bottom:6px">Google Sheet</div>'+
    '<div style="font-size:14px;color:#8890aa;margin-bottom:24px;line-height:1.65">Akses langsung ke spreadsheet jadwal PAW.</div>'+
    '<div style="display:flex;flex-direction:column;gap:10px">';
  sheets.forEach(function(name,i){h+=sheetBtn(url,name,descs[i],colors[i]);});
  h+='</div></div>';
  document.getElementById("content").innerHTML=h;
}

function sheetBtn(baseUrl,sheetName,desc,color){
  return '<div onclick="window.open(\''+baseUrl+'\',\'_blank\')" style="background:#12151c;border:1.5px solid rgba(255,255,255,.08);border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer" onmouseenter="this.style.background=\'#1a1e28\'" onmouseleave="this.style.background=\'#12151c\'">'+
    '<div style="width:42px;height:42px;border-radius:12px;background:'+color+'33;flex-shrink:0;display:flex;align-items:center;justify-content:center">'+
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>'+
    '</div>'+
    '<div style="min-width:0">'+
      '<div style="font-family:Syne,sans-serif;font-size:15px;font-weight:700;color:#f0f0f5">'+sheetName+'</div>'+
      '<div style="font-size:13px;color:#8890aa;margin-top:2px">'+desc+'</div>'+
    '</div>'+
    '<svg style="margin-left:auto;flex-shrink:0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4a5070" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>'+
  '</div>';
}

/* ── CATATAN ── */
var _notes=[];
var _editingNoteIdx=null;

function renderCatatan(){
  document.getElementById("content").innerHTML='<div class="init-loading"><div class="big-spin"></div><div class="big-spin-lbl">Memuat catatan…</div></div>';
  google.script.run
    .withSuccessHandler(function(notes){
      _notes=notes||[];
      renderCatatanUI();
    })
    .withFailureHandler(function(e){showToast("Gagal memuat: "+e.message,"err");})
    .getNotes();
}

function renderCatatanUI(){
  var h='<div style="padding-top:20px">';
  h+='<div id="note-form-wrap"></div>';
  if(!_notes.length){
    h+='<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Belum ada catatan.</div>';
  } else {
    h+='<div class="notes-list">';
    _notes.forEach(function(n,i){
      h+='<div class="note-card" id="note-card-'+i+'">';
      if(n.tanggal)h+='<div class="note-date">'+esc(n.tanggal)+(n.oleh?' · '+esc(n.oleh):'')+'</div>';
      if(n.judul)h+='<div class="note-title">'+esc(n.judul)+'</div>';
      if(n.isi)h+='<div class="note-body">'+esc(n.isi).replace(/\n/g,'<br>')+'</div>';
      h+='<div class="note-actions">'+
        '<button class="note-edit-btn" onclick="editNote('+i+')">Edit</button>'+
        '<button class="note-del-btn" onclick="deleteNote('+i+')">Hapus</button>'+
      '</div>';
      h+='</div>';
    });
    h+='</div>';
  }
  h+='<button class="add-note-btn" onclick="showNoteForm()">'+
    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'+
    'Tambah Catatan'+
  '</button>';
  h+='</div>';
  document.getElementById("content").innerHTML=h;
}

function showNoteForm(n){
  _editingNoteIdx=n!==undefined?n:null;
  var note=n!==undefined?_notes[n]:{};
  var today=isoDate(new Date());
  var wrap=document.getElementById("note-form-wrap");
  if(!wrap)return;
  if(_editingNoteIdx!==null){
    var card=document.getElementById("note-card-"+_editingNoteIdx);
    if(card)card.style.display="none";
  }
  wrap.innerHTML='<div class="note-form">'+
    '<div class="note-form-title">'+(_editingNoteIdx!==null?"Edit Catatan":"Catatan Baru")+'</div>'+
    '<div class="note-form-row"><div class="note-form-lbl">Tanggal</div>'+
      '<input class="note-form-inp" id="nf-tanggal" type="date" value="'+(note.tanggal||today)+'"></div>'+
    '<div class="note-form-row"><div class="note-form-lbl">Judul</div>'+
      '<input class="note-form-inp" id="nf-judul" type="text" placeholder="Judul catatan…" value="'+esc(note.judul||'')+'"></div>'+
    '<div class="note-form-row"><div class="note-form-lbl">Isi</div>'+
      '<textarea class="note-form-inp note-form-ta" id="nf-isi" placeholder="Tulis catatan di sini…">'+esc(note.isi||'')+'</textarea></div>'+
    '<div class="note-form-row"><div class="note-form-lbl">Oleh</div>'+
      '<input class="note-form-inp" id="nf-oleh" type="text" placeholder="Nama penulis…" value="'+esc(note.oleh||'')+'"></div>'+
    '<div class="note-form-btns">'+
      '<button class="note-form-save" onclick="saveNote()">Simpan</button>'+
      '<button class="note-form-cancel" onclick="cancelNoteForm()">Batal</button>'+
    '</div>'+
  '</div>';
  wrap.scrollIntoView({behavior:"smooth"});
}

function cancelNoteForm(){
  var wrap=document.getElementById("note-form-wrap");
  if(wrap)wrap.innerHTML="";
  if(_editingNoteIdx!==null){
    var card=document.getElementById("note-card-"+_editingNoteIdx);
    if(card)card.style.display="";
  }
  _editingNoteIdx=null;
}

function editNote(idx){
  showNoteForm(idx);
}

function deleteNote(idx){
  showModal("Hapus Catatan","Yakin hapus catatan \""+_notes[idx].judul+"\"?\nTindakan ini tidak bisa dibatalkan.","Hapus",function(){
    google.script.run
      .withSuccessHandler(function(){
        showToast("Catatan dihapus.","ok");
        renderCatatan();
      })
      .withFailureHandler(function(e){showToast("Gagal: "+e.message,"err");})
      .deleteNote(idx);
  });
}

function saveNote(){
  var tanggal=(document.getElementById("nf-tanggal").value||"").trim();
  var judul=(document.getElementById("nf-judul").value||"").trim();
  var isi=(document.getElementById("nf-isi").value||"").trim();
  var oleh=(document.getElementById("nf-oleh").value||"").trim();
  if(!judul||!isi){showToast("Judul dan isi wajib diisi.","warn");return;}
  var btn=document.querySelector(".note-form-save");
  if(btn){btn.disabled=true;btn.textContent="Menyimpan…";}
  google.script.run
    .withSuccessHandler(function(){
      showToast("Catatan disimpan.","ok");
      _editingNoteIdx=null;
      renderCatatan();
    })
    .withFailureHandler(function(e){
      if(btn){btn.disabled=false;btn.textContent="Simpan";}
      showToast("Gagal: "+e.message,"err");
    })
    .saveNote(_editingNoteIdx,tanggal,judul,isi,oleh);
}

/* ── HELPERS ── */
function countFilled(slot){var n=0;PAW_ROLES.forEach(function(r){if(slot.slots[r]&&slot.slots[r].length>0)n++;});return n;}
function isoDate(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function pad(n){return n<10?"0"+n:String(n);}
function safeId(k){return k.replace(/[^a-z0-9]/gi,"_");}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function escQ(s){return String(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
var _tt=null;
function showToast(msg,type){var el=document.getElementById("toast");el.textContent=msg;el.className="toast "+(type||"ok");clearTimeout(_tt);setTimeout(function(){el.classList.add("on");},10);_tt=setTimeout(function(){el.classList.remove("on");},3200);}
(function(){var sx=0;document.addEventListener("touchstart",function(e){sx=e.touches[0].clientX;},{passive:true});document.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-sx;if(dx<-50&&document.getElementById("dr").classList.contains("on"))closeDr();},{passive:true});})();

var _modalCb=null;
function showModal(title,msg,confirmTxt,cb){
  _modalCb=cb;
  document.getElementById("modal-title").textContent=title;
  document.getElementById("modal-msg").textContent=msg;
  document.getElementById("modal-confirm-btn").textContent=confirmTxt;
  document.getElementById("modal-ov").classList.add("on");
  document.getElementById("modal-box").classList.add("on");
}
function closeModal(){
  document.getElementById("modal-ov").classList.remove("on");
  document.getElementById("modal-box").classList.remove("on");
  _modalCb=null;
}
function doModalConfirm(){
  var cb=_modalCb;
  closeModal();
  if(cb)cb();
}

</script>
<div class="modal-ov" id="modal-ov" onclick="closeModal()"></div>
<div class="modal-box" id="modal-box">
  <div class="modal-title" id="modal-title"></div>
  <div class="modal-msg" id="modal-msg"></div>
  <div class="modal-btns">
    <button class="modal-confirm-btn" id="modal-confirm-btn" onclick="doModalConfirm()"></button>
    <button class="modal-cancel-btn" onclick="closeModal()">Batal</button>
  </div>
</div>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(err){ console.warn('SW registration failed', err); });
  });
}
</script>
