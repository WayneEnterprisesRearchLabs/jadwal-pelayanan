<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Jadwal PAW</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/PAW-192.png">
<link rel="apple-touch-icon" href="icons/PAW-192.png">
<meta name="theme-color" content="#0a0c10">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
        integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
/* ── BASE RESET ─────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --page-pad: 25px;
}

html {
  -webkit-text-size-adjust: 100%;
  background: #0a0c10;
  overflow-x: hidden;
  width: 100%;
  max-width: 100%;
}

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: #0a0c10;
  color: #f0f0f5;
  min-height: 100svh;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  padding-top: env(safe-area-inset-top, 0px);
  user-select: none;
  -webkit-user-select: none;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background: radial-gradient(
    140px circle at var(--gx, 50%) var(--gy, 30%),
    rgba(232,184,75,.18) 0%,
    rgba(232,184,75,.08) 40%,
    rgba(232,184,75,.02) 70%,
    transparent 100%
  );
  filter: blur(6px);
  will-change: background;
}

input, textarea {
  user-select: text;
  -webkit-user-select: text;
}

/* ── HORIZONTAL TABLE ROLL OVER ─────── */
.ring-scroll {
  width: 100% !important;
  max-width: 100% !important;
  overflow-x: auto !important;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
}

.ring-tbl {
  min-width: 600px;
}

/* ── OVERLAY + DRAWER ─────── */
.ov{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .3s}
.ov.on{opacity:1;pointer-events:all}
.dr{position:fixed;left:0;top:0;bottom:0;z-index:200;width:264px;background:#12151c;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .32s cubic-bezier(.22,1,.36,1);padding-top:env(safe-area-inset-top,0px)}
.dr.on{transform:translateX(0)}
.dr-top{display:flex;align-items:center;gap:11px;padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.dr-ring{width:36px;height:36px;border-radius:50%;background:#e8b84b;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.dr-ring img{width:100%;height:100%;object-fit:cover;display:none}
.dr-church{font-size:10px;color:#8890aa;letter-spacing:.06em;text-transform:uppercase}
.dr-team{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;line-height:1.3;margin-top:1px}
.dr-nav{flex:1;padding:10px 0}
.dr-item{display:flex;align-items:center;gap:13px;padding:13px 18px;cursor:pointer;font-size:15px;font-weight:500;color:#8890aa;transition:background .12s,color .12s;position:relative}
.dr-item:active{background:rgba(255,255,255,.04)}
.dr-item.on{color:#f0f0f5}
.dr-item.on::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 3px 3px 0;background:#e8b84b}
.dr-item svg{opacity:.6;flex-shrink:0;transition:opacity .15s}
.dr-item.on svg{opacity:1}

/* ── PAGE ─────────────────── */
.page {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
}

/* ── HEADER — 32px sides ──── */
.hdr{position:sticky;top:0;z-index:40;background:#12151c;border-bottom:1px solid rgba(255,255,255,.08);padding:28px var(--page-pad) 20px;width:100%;transform-origin:top center;animation:hdrSlideIn .5s cubic-bezier(.22,1,.36,1) both}

@keyframes hdrSlideIn{
  0%  { opacity:0; transform:translateY(-46px) scaleY(.9); }
  60% { opacity:1; transform:translateY(4px) scaleY(1.02); }
  100%{ transform:translateY(0) scaleY(1); }
}
.hdr-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:0;}
.menu-btn{width:36px;height:36px;border-radius:10px;background:none;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#f0f0f5;transition:background .15s;margin-top:2px}
.menu-btn:active{background:rgba(255,255,255,.08)}
.hdr-text{flex:1;min-width:0}
.hdr-l1{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;line-height:1.05;letter-spacing:-.02em;color:#f0f0f5}
.hdr-l2{display:inline-flex;align-items:center;background:rgba(244,160,110,.15);color:#f4a06e;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border-radius:7px;margin-top:5px}
.hdr-logo{width:36px;height:36px;border-radius:50%;background:#e8b84b;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;animation:logoBreathe 3.5s ease-in-out infinite;margin-top:2px}
@keyframes logoBreathe{
  0%,100%{ box-shadow:0 0 0px 0px rgba(232,184,75,0);background:#e8b84b; }
  50%    { box-shadow:0 0 16px 6px rgba(232,184,75,.5);background:#f2ca52; }
}
.hdr-logo img{width:100%;height:100%;object-fit:cover;display:none;opacity:0;transition:opacity .4s ease}
.hdr-logo img.loaded{opacity:1}

        /* Big loader (full-page: jadwal / ringkasan / catatan) */
.big-spin{display:flex;gap:8px;justify-content:center;align-items:flex-end;height:30px;margin:0 auto 14px}
.big-spin span{width:12px;height:12px;border-radius:50%;background:#e8b84b;display:inline-block;animation:dotBounce .9s cubic-bezier(.34,1.56,.64,1) infinite}
.big-spin span:nth-child(1){animation-delay:0s}
.big-spin span:nth-child(2){animation-delay:.13s}
.big-spin span:nth-child(3){animation-delay:.26s}

@keyframes dotBounce{
  0%   { transform:translateY(0) scale(1,1); }
  12%  { transform:translateY(0) scale(1.3,.7); }
  30%  { transform:translateY(-20px) scale(.8,1.25); }
  50%  { transform:translateY(-20px) scale(.8,1.25); }
  68%  { transform:translateY(0) scale(1.3,.7); }
  82%  { transform:translateY(0) scale(.92,1.08); }
  100% { transform:translateY(0) scale(1,1); }
}

/* Small inline loader (roster "Memuat tim…") */
.r-spin{display:inline-flex;gap:4px;align-items:flex-end;height:14px}
.r-spin span{width:6px;height:6px;border-radius:50%;background:#e8b84b;display:inline-block;animation:dotBounce .9s cubic-bezier(.34,1.56,.64,1) infinite}
.r-spin span:nth-child(1){animation-delay:0s}
.r-spin span:nth-child(2){animation-delay:.13s}
.r-spin span:nth-child(3){animation-delay:.26s}

/* subtle life in the loading text */
.ld-txt{font-size:14px;color:#8890aa;animation:ldPulse 1.3s ease-in-out infinite}
@keyframes ldPulse{0%,100%{opacity:.55}50%{opacity:1}}

/* ── SEARCH ───────────────── */
.srch{position:relative;margin-bottom:14px}
.srch-icon{position:absolute;left:calc(var(--page-pad) + 13px);top:50%;transform:translateY(-50%);color:#4a5070;pointer-events:none;transition:color .2s}
.srch:focus-within .srch-icon{color:#e8b84b}
.srch-inp{width:100%;background:#12151c;border:1.5px solid rgba(255,255,255,.13);border-radius:14px;padding:13px 42px 13px 42px;font-family:'DM Sans',sans-serif;font-size:16px;color:#f0f0f5;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s,box-shadow .2s}
.srch-inp::placeholder{color:#4a5070}
.srch-inp:focus{border-color:#e8b84b;box-shadow:0 0 0 3px rgba(232,184,75,.1)}
.srch-clear{position:absolute;right:calc(var(--page-pad) + 11px);top:50%;transform:translateY(-50%);width:26px;height:26px;border-radius:50%;background:#222737;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;color:#8890aa;font-size:14px}

/* ── SUGGESTIONS ──────────── */
.sug{position:absolute;top:calc(100%+5px);left:var(--page-pad);right:var(--page-pad);z-index:100;background:#12151c;border:1.5px solid rgba(255,255,255,.13);border-radius:14px;overflow:hidden;display:none;box-shadow:0 14px 44px rgba(0,0,0,.75);animation:popIn .16s cubic-bezier(.34,1.5,.64,1) both}
@keyframes popIn{from{opacity:0;transform:scale(.96) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.sug-item{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);transition:background .1s}
.sug-item:last-child{border:none}
.sug-item:active{background:#1a1e28}
.sug-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.sug-av img{width:100%;height:100%;object-fit:cover;display:block}
.sug-name{font-size:15px;font-weight:500}
.sug-badges{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.badge{display:inline-block;font-size:13px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.sug-empty{padding:18px;text-align:center;font-size:14px;color:#8890aa}

/* ── CONTENT — 32px sides ─── */
.content{flex:1;padding-left:var(--page-pad);padding-right:var(--page-pad);padding-bottom:calc(env(safe-area-inset-bottom,0px)+72px);overflow-x:hidden;width:100%;box-sizing:border-box}
#content{opacity:0;transform:translateY(14px) scale(.985);transition:opacity .3s cubic-bezier(.22,1,.36,1),transform .36s cubic-bezier(.22,1,.36,1)}
#content.ready{opacity:1;transform:translateY(0) scale(1)}

/* ── HOME ─────────────────── */
.home{padding:52px 0 28px;text-align:center;animation:homePop .42s cubic-bezier(.34,1.56,.64,1) both}

@keyframes homePop{
  0%  { opacity:0; transform:scale(.85) translateY(14px); }
  55% { opacity:1; transform:scale(1.04) translateY(-2px); }
  100%{ transform:scale(1) translateY(0); }
}
.home-orb{width:70px;height:70px;border-radius:22px;background:rgba(232,184,75,.13);border:1px solid rgba(232,184,75,.22);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(232,184,75,.1)}50%{box-shadow:0 0 0 16px transparent}}
.home-h{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;letter-spacing:-.03em;line-height:1.15;margin-bottom:10px}
.home-p{font-size:15px;color:#8890aa;line-height:1.65}

/* ── VOL CARD ─────────────── */
.vol-card{display:flex;align-items:center;gap:13px;background:#12151c;border:1.5px solid rgba(255,255,255,.13);border-radius:18px;padding:18px;margin-bottom:14px;transform-origin:top center;animation:slideDown .36s cubic-bezier(.34,1.56,.64,1) both}
@keyframes slideDown{
  0%  { opacity:0; transform:translateY(-10px) scaleY(.88); }
  65% { opacity:1; transform:translateY(1px) scaleY(1.03); }
  100%{ transform:translateY(0) scaleY(1); }
}
.vol-av{width:52px;height:52px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;border:2px solid}
.vol-av img{width:100%;height:100%;object-fit:cover;display:block}
.vol-name{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-.02em;line-height:1.1;margin-bottom:6px;color:#e8b84b}
.vol-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.vol-meta{font-size:13px;color:#8890aa;margin-top:10px}

/* ── SCHED TABS ───────────── */
.sched-tabs{display:flex;gap:5px;margin-bottom:16px;background:#12151c;border-radius:13px;padding:4px;border:1px solid rgba(255,255,255,.06);animation:tabsPop .34s cubic-bezier(.34,1.56,.64,1) .08s both}
@keyframes tabsPop{
  0% { opacity:0; transform:scale(.9); }
  60%{ opacity:1; transform:scale(1.03); }
  100%{ transform:scale(1); }
}
.sched-tab{flex:1;padding:9px 0;border-radius:9px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:#8890aa;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.sched-tab.on{background:#222737;color:#f0f0f5}

/* ── MONTH NAV ────────────── */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-top:10px;margin-bottom:12px;animation:navSlideIn .36s cubic-bezier(.22,1,.36,1) .14s both}
@keyframes navSlideIn{
  0%{ opacity:0; transform:translateX(26px); }
  100%{ opacity:1; transform:translateX(0); }
}
.month-lbl{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.01em}
.mon-btn{width:34px;height:34px;border-radius:10px;background:#12151c;border:1px solid rgba(255,255,255,.13);color:#8890aa;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.mon-btn:active{background:#222737;color:#f0f0f5}
.mon-btn:disabled{opacity:.22;cursor:default}

/* ── MINI CALENDAR ────────── */
.mini-cal{background:#12151c;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px 10px 10px;margin-bottom:18px;transform-origin:top center;animation:calIn .38s cubic-bezier(.34,1.56,.64,1) .20s both}
@keyframes calIn{
  0%  { opacity:0; transform:translateY(-14px) scaleY(.88); }
  60% { opacity:1; transform:translateY(3px) scaleY(1.03); }
  100%{ transform:translateY(0) scaleY(1); }
}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px}
.cal-dow{text-align:center;font-size:12px;font-weight:700;color:#e8b84b;padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0}
.cal-cell{height:34px;display:flex;align-items:center;justify-content:center}
.cal-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#4a5070;transition:all .15s}
.cal-cell.is-today:not(.has-event) .cal-num{box-shadow:0 0 0 1.5px #f0f0f5;color:#f0f0f5;font-weight:700}
.cal-cell.has-event:not(.is-today){cursor:pointer}
.cal-cell.has-event:not(.is-today) .cal-num{background:rgba(232,184,75,.18);color:#e8b84b;font-weight:800;font-size:14px}
.cal-cell.has-event:not(.is-today):active .cal-num{background:rgba(232,184,75,.32)}
.cal-cell.is-today.has-event{cursor:pointer}
.cal-cell.is-today.has-event .cal-num{background:#e8b84b;color:#0a0c10;font-weight:800;font-size:14px;box-shadow:0 0 0 2px #0a0c10,0 0 0 3.5px rgba(240,240,245,.6)}

/* ── SEC LABEL ────────────── */
.sec-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#4a5070;margin-top:14px;margin-bottom:10px}
        
/* ── MONTH SLIDE TRANSITION ── */
@keyframes slideInRight{from{opacity:0;transform:translateX(48px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-48px)}to{opacity:1;transform:translateX(0)}}
.slide-in-right{animation:slideInRight .45s cubic-bezier(.22,1,.36,1) both}
.slide-in-left{animation:slideInLeft .45s cubic-bezier(.22,1,.36,1) both}

/* ── EVENT LIST ───────────── */
.ev-list{display:flex;flex-direction:column;gap:10px}

/* ── EVENT CARD ───────────── */
.ecard{background:#12151c;border:1.5px solid rgba(255,255,255,.07);border-radius:18px;overflow:hidden;cursor:pointer;transition:border-color .2s,background .15s;transform-origin:top center;animation:cardBounce .42s cubic-bezier(.34,1.56,.64,1) both}
.ecard:nth-child(1){animation-delay:.28s}
.ecard:nth-child(2){animation-delay:.33s}
.ecard:nth-child(3){animation-delay:.38s}
.ecard:nth-child(4){animation-delay:.43s}
.ecard:nth-child(5){animation-delay:.48s}
.ecard:nth-child(n+6){animation-delay:.50s}

@keyframes cardBounce{
  0%  { opacity:0; transform:translateY(16px) scaleY(.9); }
  60% { opacity:1; transform:translateY(-2px) scaleY(1.03); }
  100%{ transform:translateY(0) scaleY(1); }
}
.ecard:active{background:#1a1e28}
.ecard.open{border-color:rgba(232,184,75,.45)}
.ecard.past{opacity:.38}
.ecard.digantikan{border-color:rgba(248,113,113,.3);opacity:.6}
.ecard.menggantikan{border-color:rgba(74,222,128,.4)}
.ecard.special{border-color:rgba(192,132,252,.45)}
.ecard-top{display:flex;align-items:center;padding:15px 16px;gap:25px}
.date-blk{flex-shrink:0;align-self:flex-start;width:65px;height:85px;background:#1a1e28;border-radius:12px;padding:9px 5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.date-blk.today{background:#e8b84b}
.db-dow{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8890aa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:54px;text-align:center}
.db-num{font-family:'DM Sans',sans-serif;font-size:30px;font-weight:900;line-height:1;color:#e8b84b}
.db-mon{font-size:11px;font-weight:600;color:#8890aa}
.date-blk.today .db-dow,.date-blk.today .db-num,.date-blk.today .db-mon{color:#0a0c10}
.ecard-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:4px}
.ecard-time-top{font-size:14px;font-weight:700;color:#e8b84b;letter-spacing:.02em;margin-bottom:3px}
.ecard-svc{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;letter-spacing:-.02em;color:#f0f0f5;line-height:1.2;margin-bottom:3px}
.ecard-meta-row{display:flex;align-items:center;gap:10px}
.ecard-meta-row{display:flex;align-items:center;gap:8px}
.ecard-tags-wrap{display:flex;flex-wrap:wrap;align-items:center;gap:8px;flex:1;min-width:0}
.ecard-time{font-size:16px;font-weight:700;color:#e8b84b}
.role-chip{display:inline-block;font-size:13px;font-weight:600;padding:4px 11px;border-radius:20px;white-space:nowrap}
.sub-badge{font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
.sub-badge.out{background:rgba(248,113,113,.18);color:#f87171}
.sub-badge.in{background:rgba(74,222,128,.18);color:#4ade80}
.ecard-arr{color:#4a5070;flex-shrink:0;display:flex;align-items:center;margin-left:4px;transition:transform .22s cubic-bezier(.34,1.7,.64,1),color .15s}
.ecard.open .ecard-arr{transform:rotate(90deg);color:#e8b84b}

/* ── ROSTER PANEL ─────────── */
.roster{max-height:0;overflow:hidden;transform-origin:top;transition:max-height .34s cubic-bezier(.22,1,.36,1)}

@keyframes rosterFadeIn{
  0%  { opacity:0; transform:translateY(-8px) scaleY(.9); }
  60% { opacity:1; transform:translateY(1px) scaleY(1.03); }
  100%{ transform:translateY(0) scaleY(1); }
}
.roster-fadein{transform-origin:top;animation:rosterFadeIn .3s cubic-bezier(.34,1.56,.64,1) both}
.roster-fadein{animation:rosterFadeIn 1.2s cubic-bezier(.16,1,.3,1) both}
.roster-inner{border-top:1px solid rgba(255,255,255,.06);padding:10px;background:#1a1e28;display:flex;flex-direction:column;gap:7px}
.roster-spin{display:flex;align-items:center;gap:8px;font-size:13px;color:#8890aa;padding:4px}
.r-spin{width:15px;height:15px;border-radius:50%;border:2px solid #222737;border-top-color:#e8b84b;animation:spin .6s linear infinite;flex-shrink:0}

/* ── GROUP LABEL ──────────── */
.group-lbl{text-align:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#e8b84b;letter-spacing:.08em;text-transform:uppercase;padding:3px 0}

/* ── SEGMENT BLOCKS ───────── */
.seg-block{border-radius:12px;overflow:hidden;margin:0}
.sub-divider{height:1px;background:rgba(255,255,255,.1)}

/* ── ROLE ROW ── */
.role-row{display:flex;align-items:stretch;min-height:40px}
.r-lbl{width:33%;min-width:72px;max-width:108px;flex-shrink:0;display:flex;align-items:center;padding:8px 6px 8px 12px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;line-height:1.2}
.r-names{flex:1;display:flex;flex-direction:column;gap:5px;padding:7px 12px 7px 8px;border-left:1px solid rgba(255,255,255,.08)}

/* ── NAME CHIPS ───────────── */
.nchip{display:inline-flex;align-items:center;gap:7px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.07);border-radius:30px;padding:5px 13px 5px 5px;width:fit-content;animation:chipIn .2s cubic-bezier(.22,1,.36,1) both}
.nchip.me{background:rgba(232,184,75,.18);border-color:rgba(232,184,75,.35)}
.nchip-av{width:26px;height:26px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.nchip-av img{width:100%;height:100%;object-fit:cover;display:block}
.nchip-name{font-size:15px;font-weight:500;color:#f0f0f5}
.nchip.me .nchip-name{color:#e8b84b;font-weight:600}
.sub-grp{background:transparent;border:none;padding:0;display:flex;flex-direction:column;gap:6px;width:fit-content;animation:chipIn .22s cubic-bezier(.22,1,.36,1) both}
.n-orig{display:inline-flex;align-items:center;gap:7px;padding:2px 4px}
.n-orig .nchip-av{width:22px;height:22px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(248,113,113,.15)}
.n-orig .nname{font-size:13px;font-weight:500;color:#f87171;text-decoration:line-through;text-decoration-thickness:2px}
.n-new{display:inline-flex;align-items:center;gap:7px;background:rgba(74,222,128,.16);border:1px solid rgba(74,222,128,.32);border-radius:30px;padding:5px 13px 5px 5px;width:fit-content}
.n-new .nchip-av{width:24px;height:24px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(74,222,128,.2)}
.n-new .nname{font-size:14px;font-weight:600;color:#4ade80}


/* ── HISTORY ──────────────── */
.hist-group{margin-bottom:22px}
.hist-month{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#8890aa;margin-bottom:10px}

/* ── CATATAN ──────────────── */
.notes-list{display:flex;flex-direction:column;gap:12px;padding-top:6px}
.note-card{background:#12151c;border:1.5px solid rgba(255,255,255,.07);border-radius:16px;padding:18px;animation:noteSlideIn .36s cubic-bezier(.34,1.56,.64,1) both}
.note-card:nth-child(1){animation-delay:.03s}
.note-card:nth-child(2){animation-delay:.09s}
.note-card:nth-child(3){animation-delay:.15s}
.note-card:nth-child(n+4){animation-delay:.20s}
@keyframes noteSlideIn{
  0%  { opacity:0; transform:translateX(-24px) scale(.97); }
  60% { opacity:1; transform:translateX(3px) scale(1.01); }
  100%{ transform:translateX(0) scale(1); }
}

.note-date{font-size:11px;color:#4a5070;margin-bottom:5px}
.note-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:7px}
.note-body{font-size:14px;color:#8890aa;line-height:1.7}
.note-by{font-size:11px;color:#4a5070;margin-top:8px}

/* ── MASUKAN ──────────────── */
.fb-wrap{padding-top:6px;animation:fbPopIn .38s cubic-bezier(.34,1.56,.64,1) both}
@keyframes fbPopIn{
  0%  { opacity:0; transform:translateY(20px) scale(.96); }
  60% { opacity:1; transform:translateY(-2px) scale(1.01); }
  100%{ transform:translateY(0) scale(1); }
}
.fb-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.02em;margin-bottom:7px}
.fb-sub{font-size:14px;color:#8890aa;margin-bottom:22px;line-height:1.65}
.form-g{margin-bottom:14px}
.form-lbl{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#8890aa;margin-bottom:6px;display:block}
.form-inp{width:100%;background:#12151c;border:1.5px solid rgba(255,255,255,.13);border-radius:13px;padding:13px 15px;font-family:'DM Sans',sans-serif;font-size:15px;color:#f0f0f5;outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s}
.form-inp::placeholder{color:#4a5070}
.form-inp:focus{border-color:#e8b84b;box-shadow:0 0 0 3px rgba(232,184,75,.1)}
textarea.form-inp{resize:vertical;min-height:110px;line-height:1.6}
.sub-btn{width:100%;padding:14px;border-radius:13px;border:none;background:#e8b84b;color:#0a0c10;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s;margin-top:4px}
.sub-btn:active{opacity:.85;transform:scale(.98)}
.sub-btn:disabled{opacity:.4;cursor:default}
.fb-ok{text-align:center;padding:48px 0;animation:fadeUp .4s cubic-bezier(.22,1,.36,1)}
.fb-ok-ico{font-size:48px;margin-bottom:14px}
.fb-ok-h{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:8px}
.fb-ok-p{font-size:14px;color:#8890aa;line-height:1.6}

/* ── RINGKASAN (volunteer view) ── */
.ring-wrap{animation:fadeUp .3s cubic-bezier(.22,1,.36,1)}
.ring-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;margin-top:20px}
.ring-month-lbl{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.01em;color:#e8b84b}
.ring-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;border:1px solid rgba(255,255,255,.08)}
table.ring-tbl{border-collapse:collapse;font-size:12px;table-layout:fixed}
.ring-tbl th,.ring-tbl td{border:1px solid rgba(255,255,255,.08);padding:7px 10px;text-align:center;vertical-align:middle}
.ring-tbl th{background:#1a1e28;font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:11px}
.ring-tbl .week-hdr{background:#0f2d52;color:#e8b84b;font-size:11px;font-weight:800;letter-spacing:.08em}
.ring-tbl .date-hdr{background:#1e2636;color:#f0f0f5;font-size:12px;font-weight:700;white-space:nowrap}
.ring-tbl .svc-hdr{background:#1a1e28;color:#8890aa;font-size:11px;white-space:nowrap}
.ring-tbl .role-col{text-align:left;font-weight:700;font-size:11px;letter-spacing:.04em;text-transform:uppercase;padding-left:12px;white-space:nowrap;min-width:80px}
.ring-tbl .cell-filled{background:rgba(74,222,128,.05)}
.ring-tbl .cell-empty{color:#4a5070}
.ring-tbl tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.ring-save-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:13px;border:none;background:#e8b84b;color:#0a0c10;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:48px;transition:opacity .2s}
.ring-save-btn:active{opacity:.85}

/* ── STATES ───────────────── */
.empty{text-align:center;padding:40px 0;animation:emptyPop .32s cubic-bezier(.34,1.56,.64,1) both}
@keyframes emptyPop{
  0% { opacity:0; transform:scale(.88); }
  60%{ opacity:1; transform:scale(1.04); }
  100%{ transform:scale(1); }
}
.empty-ico{margin-bottom:10px}
.empty-msg{font-size:14px;color:#8890aa;line-height:1.6}
.loading{text-align:center;padding:48px 0;animation:loadPop .22s cubic-bezier(.22,1,.36,1) both}
@keyframes loadPop{
  0%{ opacity:0; transform:scale(.9); }
  100%{ opacity:1; transform:scale(1); }
}
.big-spin{width:28px;height:28px;border-radius:50%;border:3px solid #222737;border-top-color:#e8b84b;animation:spin .7s linear infinite;margin:0 auto 12px}
.ld-txt{font-size:14px;color:#8890aa}
.no-ev{background:#12151c;border:1px solid rgba(255,255,255,.06);border-radius:13px;padding:22px;text-align:center;font-size:14px;color:#8890aa}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<script>
// ============================================================
//  GAS SHIM — makes google.script.run work over fetch() on GitHub Pages
// ============================================================
var EXEC_URL = "https://script.google.com/macros/s/AKfycbyRFSxg1KEJelSsBMs4rBBf6-h0G1jiWF04TsITRzFhkvGd-sIhLbjlaB3K3HgkghIA/exec"; // e.g. https://script.google.com/macros/s/AKfycb.../exec

var API_PARAM_MAP = {
  getConfig: [], getAllMusicians: [], getNotes: [],
  searchMusicians: ['query'],
  getMusicianSchedule: ['name'],
  getServiceRoster: ['date','service'],
  getAdminData: ['year','month'],
  submitFeedback: ['nama','pesan'],
  saveServiceRoster: ['dateStr','service','time','dayName','rosterJson','isSpecial'],
  deleteService: ['dateStr','service','time'],
  saveNote: ['idx','tanggal','judul','isi','oleh'],
  deleteNote: ['idx'],
  getPublicMonthData: ['year','month'],
        
};
var API_WRITE_ACTIONS = ['submitFeedback','saveServiceRoster','deleteService','saveNote','deleteNote'];

function callApi(action, args){
  var names = API_PARAM_MAP[action] || [];
  var params = {action: action};
  names.forEach(function(name, i){
    var val = args[i];
    params[name] = (val===undefined || val===null) ? "" : val;
  });
  if (API_WRITE_ACTIONS.indexOf(action) !== -1){
    return fetch(EXEC_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(params)
    }).then(function(r){ return r.json(); });
  }
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
  }).join('&');
  return fetch(EXEC_URL + '?' + qs).then(function(r){ return r.json(); });
}

function GasRun(){ this._s=null; this._f=null; }
GasRun.prototype.withSuccessHandler=function(fn){ this._s=fn; return this; };
GasRun.prototype.withFailureHandler=function(fn){ this._f=fn; return this; };
Object.keys(API_PARAM_MAP).forEach(function(fnName){
  GasRun.prototype[fnName]=function(){
    var args=Array.prototype.slice.call(arguments), s=this._s, f=this._f;
    callApi(fnName, args).then(function(data){
      if (data && data.error){ if(f) f({message:data.error}); else console.error(data.error); return; }
      if (s) s(data);
    }).catch(function(err){
      if (f) f({message: err.message || String(err)}); else console.error(err);
    });
    return this;
  };
});
var google = { script: { run: null } };
Object.defineProperty(google.script, 'run', { get: function(){ return new GasRun(); } });

var SPLASH_MIN_MS = 1200;
var splashStart = Date.now();
function hideSplash(){
  var el = document.getElementById('native-splash');
  if(!el) return;
  var elapsed = Date.now() - splashStart;
  var wait = Math.max(0, SPLASH_MIN_MS - elapsed);
  setTimeout(function(){
    el.style.transition = 'opacity .35s ease';
    el.style.opacity = '0';
    setTimeout(function(){ el.remove(); }, 350);
  }, wait);
}
window.addEventListener('load', hideSplash);

// ============================================================
//  APP TEMPLATE CONFIG — edit these when cloning for a new department
// ============================================================/////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
var APP_CONFIG = {
  storagePrefix: "paw_",        // unique per department! prevents saved-name clashes if hosted on same domain
  appTitle: "Jadwal Pelayanan", // main header line 1
  deptLabel: "PAW DEPARTMENT",  // small orange badge under the title
  ringkasanBrand: "PAW"         // short brand text on the Ringkasan summary image
};
  
// ============================================================
//  ORIGINAL APP CODE — unchanged below this point
// ============================================================
var BLN_L=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
var BLN_S=["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agt","Sep","Okt","Nov","Des"];
var HARI_L=["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
var HARI_S=["Min","Sen","Sel","Rab","Kam","Jum","Sab"];
var DOW=["M","S","S","R","K","J","S"];
var ROST=[{seg:1,roles:["Speaker"]},{seg:2,sub:1,roles:["WL","Singer"]},{seg:2,sub:2,roles:["Keys","Guitar","Bass","Drums"]},{seg:3,sub:1,roles:["SPV","MD","Sequencer","SD"]},{seg:3,sub:2,roles:["CM"]},{seg:4,roles:["Soundman"]}];

var RC={
  speaker:  {fg:"#22c3ff",bg:"rgba(34,195,255,.22)"},
  wl:       {fg:"#3ddc84",bg:"rgba(61,220,132,.22)"},
  singer:   {fg:"#5eead4",bg:"rgba(94,234,212,.20)"},
  keys:     {fg:"#5b7cfa",bg:"rgba(91,124,250,.24)"},

  bass:     {fg:"#5b7cfa",bg:"rgba(91,124,250,.24)"},
  drums:    {fg:"#5b7cfa",bg:"rgba(91,124,250,.24)"},
  spv:      {fg:"#ff9d3d",bg:"rgba(255,157,61,.22)"},
  md:       {fg:"#ff9d3d",bg:"rgba(255,157,61,.22)"},
  sequencer:{fg:"#ff9d3d",bg:"rgba(255,157,61,.22)"},
  sd:       {fg:"#ff9d3d",bg:"rgba(255,157,61,.22)"},
  cm:       {fg:"#ffc23c",bg:"rgba(255,194,60,.24)"},
  soundman: {fg:"#b8c2d9",bg:"rgba(184,194,217,.16)"},
  sound:    {fg:"#b8c2d9",bg:"rgba(184,194,217,.16)"}
};

var SS={1:"background:rgba(244,160,110,.10)",2:"background:rgba(250,200,100,.09)",3:"background:rgba(126,184,247,.09)",4:"background:rgba(148,163,184,.09)"};

var PAW_ROLES=["Speaker","WL","Singer","Keys","Guitar","Bass","Drums","SPV","MD","Sequencer","SD","CM","Soundman"];

var REGULAR_SERVICES=["Voltage","AOG Teens","AOG Youth","Ibadah 1","Ibadah 2","Ibadah 3"];

function C(r){return RC[(r||"").toLowerCase()]||RC.soundman;}
function chipCss(r){var c=C(r);return"color:"+c.fg+";background:"+c.bg;}
function avCss(r){var c=C(r);return"background:"+c.bg+";color:"+c.fg;}
function rcolor(r){return C(r).fg;}
function roleLabel(r){var map={"Soundman":"Sound","Sequencer":"Seq"};return map[r]||r;}
function serviceLabel(s){var map={"Ibadah 123":"Umum"};return map[s]||s;}

function defaultTimesFor(rawService,firstOnly){
  var full={"Ibadah 123":"07:00, 09:30, 17:00","AOG":"17:00, 18:30"};
  var val=full[rawService]||"";
  if(firstOnly&&val)return val.split(",")[0].trim();
  return val;
}

function rowTint(role){
  var c=C(role);
  var m=c.bg.match(/rgba\(([\d.]+),([\d.]+),([\d.]+),([\d.]+)\)/);
  if(!m)return c.bg;
  var a=parseFloat(m[4])*0.5;
  return "rgba("+m[1]+","+m[2]+","+m[3]+","+a.toFixed(3)+")";
}

var st={
  mainTab:"jadwal",
  vol:null,allEvents:[],schedTab:"jadwal",viewYear:0,viewMonth:0,monthDir:1,openKey:null,rosterCache:{},query:"",debounce:null,sugList:[],justPicked:false,
  ringYear:0,ringMonth:0,ringCache:{}
};

google.script.run.withSuccessHandler(function(c){
  var church=c.churchName||"GMS Salatiga";
  document.getElementById("hdr-l1").textContent=APP_CONFIG.appTitle;
  document.getElementById("hdr-l2").textContent=APP_CONFIG.deptLabel;

  if(c.pawRoles)PAW_ROLES=c.pawRoles;
if(c.logoUrl){
  ["hdr-logo-img","dr-logo"].forEach(function(id){
    var el=document.getElementById(id);
    if(el){
      el.style.display="block";
      el.onload=function(){ el.classList.add("loaded"); };
      el.src=c.logoUrl;
    }
  });
}
}).getConfig();

google.script.run.withSuccessHandler(function(list){
  st.allMusicians = list || [];
  var savedName = null;
  try{ savedName = localStorage.getItem(APP_CONFIG.storagePrefix + "volName"); }catch(e){ console.warn("localStorage read failed", e); }
  if(savedName){
    var match = st.allMusicians.find(function(m){return m.name===savedName;});
    if(match){
      st.vol = match;
      st.justPicked = true;
      document.getElementById("sinp").value = match.name;
      document.getElementById("sbtn").style.display = "flex";
      showLoading();
      google.script.run.withSuccessHandler(gotEvents).withFailureHandler(function(e){showErr(e.message);}).getMusicianSchedule(match.name);
    }
  }
}).getAllMusicians();

function openDr(){document.getElementById("dr").classList.add("on");document.getElementById("ov").classList.add("on");}
function closeDr(){document.getElementById("dr").classList.remove("on");document.getElementById("ov").classList.remove("on");}

function navTo(tab){
  st.mainTab=tab;closeDr();
  ["jadwal","ringkasan","catatan","masukan"].forEach(function(t){var el=document.getElementById("dn-"+t);if(el)el.classList.toggle("on",t===tab);});
  document.getElementById("srch-wrap").style.display=tab==="jadwal"?"block":"none";
  if(tab==="jadwal")renderJadwal();
  else if(tab==="ringkasan")renderRingkasan();
  else if(tab==="catatan")renderCatatan();
  else renderMasukan();
}

/* ── SEARCH ── */
function onInput(){
  var q=document.getElementById("sinp").value.trim();
  st.query=q;
  st.justPicked=false;
  document.getElementById("sbtn").style.display=q?"flex":"none";
  if(!q){hideSug();return;}
  clearTimeout(st.debounce);
  st.debounce=setTimeout(function(){doSearch(q);},150);
}

function onFocus(){
  if(st.justPicked||st.vol){st.justPicked=false;return;}
  if(st.query)doSearch(st.query);
}

function doSearch(q){
  if(!st.allMusicians || !st.allMusicians.length){
    google.script.run.withSuccessHandler(function(list){
      if(st.vol || document.getElementById("sinp").value.trim()!==q) return;
      showSug(list);
    }).searchMusicians(q);
    return;
  }
  var ql=q.toLowerCase();
  var list=st.allMusicians.filter(function(m){
    return m.name.toLowerCase().indexOf(ql)!==-1;
  }).slice(0,15);
  showSug(list);
}

function showSug(list){
  st.sugList=list||[];var box=document.getElementById("sug");
  if(!st.sugList.length){box.innerHTML='<div class="sug-empty">Nama tidak ditemukan</div>';}
  else{box.innerHTML=st.sugList.map(function(m,i){return'<div class="sug-item" onclick="pickVol('+i+')"><div class="sug-av" style="'+avCss(m.roles[0]||"soundman")+'">'+av(m.photo,m.name,36,m.roles[0])+'</div><div><div class="sug-name">'+esc(m.name)+'</div><div class="sug-badges">'+m.roles.map(function(r){return'<span class="badge" style="'+chipCss(r)+'">'+esc(roleLabel(r))+'</span>';}).join('')+'</div></div></div>';}).join('');}
  box.style.display="block";
}
function hideSug(){document.getElementById("sug").style.display="none";}

function pickVol(idx){
  var v=st.sugList[idx];if(!v)return;
  st.vol=v;st.justPicked=true;st.openKey=null;st.rosterCache={};
  document.getElementById("sinp").value=v.name;
  document.getElementById("sbtn").style.display="flex";

  document.getElementById("sinp").blur();
  showLoading();
  try{localStorage.setItem(APP_CONFIG.storagePrefix + "volName", v.name);}catch(e){console.warn("localStorage set failed",e);}
  google.script.run.withSuccessHandler(gotEvents).withFailureHandler(function(e){showErr(e.message);}).getMusicianSchedule(v.name);

  st.allEvents=events;var now=new Date();st.viewYear=now.getFullYear();st.viewMonth=now.getMonth();

  var y=st.viewYear,m=st.viewMonth;
  var evs=st.allEvents.filter(function(e){return !e.isPast&&mOf(e.date).key===mKey(y,m);});
  var eD={};evs.forEach(function(e){eD[e.date]=true;});
  var now=new Date();
  var canPrev=mKey(y,m)>mKey(now.getFullYear(),now.getMonth());
  var dir=(st.monthDir!==0)?(st.monthDir>0?'slide-in-right':'slide-in-left'):'';
  st.monthDir=0;

  var h='<div class="month-nav">'+
    '<button class="mon-btn" onclick="chMonth(-1)"'+(canPrev?'':' disabled')+'>'+
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>'+
    '</button>'+
    '<div class="month-lbl">'+BLN_L[m]+' '+y+'</div>'+
    '<button class="mon-btn" onclick="chMonth(1)">'+
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>'+
    '</button>'+

    h+='<div class="no-ev '+dir+'">Belum ada jadwal bulan ini</div>';
  } else {
    h+='<div class="sec-lbl">Ibadah &amp; Acara</div>'+
       '<div class="ev-list '+dir+'">';

function buildCal(year,mon,eD){
  var fd=new Date(year,mon,1).getDay(),days=new Date(year,mon+1,0).getDate(),todayStr=isoToday();
  var h='<div class="mini-cal"><div class="cal-dow-row">';DOW.forEach(function(l){h+='<div class="cal-dow">'+l+'</div>';});h+='</div><div class="cal-grid">';
  for(var d=1;d<=days;d++){var iso=year+"-"+pad(mon+1)+"-"+pad(d);var isTod=iso===todayStr,hasEv=!!eD[iso];var cls="cal-cell"+(isTod?" is-today":"")+(hasEv?" has-event":"");var clk=hasEv?' onclick="scrollToDate(\''+iso+'\')"':"";var style=(d===1&&fd>0)?' style="grid-column-start:'+(fd+1)+'"':"";h+='<div class="'+cls+'"'+style+clk+'><div class="cal-num">'+d+'</div></div>';}
  h+='</div></div>';return h;
}

function buildRiwayat(){
  var past=st.allEvents.filter(function(e){return e.isPast;});
  if(!past.length)return'<div class="empty"><div class="empty-ico"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#4a5070" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="empty-msg">Belum ada riwayat ibadah.</div></div>';
  var g={},ord=[];past.slice().reverse().forEach(function(e){var mk=mOf(e.date).key;if(!g[mk]){g[mk]={lbl:mLabel(e.date),evs:[]};ord.push(mk);}g[mk].evs.push(e);});
  var h="";ord.forEach(function(mk){var gi=g[mk];h+='<div class="hist-group"><div class="hist-month">'+gi.lbl+'</div><div class="ev-list">';gi.evs.forEach(function(ev,i){h+=cardHTML(ev,i);});h+='</div></div>';});return h;

function cardHTML(ev,idx){
  var dp=ev.date.split("-"),dObj=new Date(ev.date+"T00:00:00"),key=ev.date+"|"+ev.service,kid=safeId(key),isTod=ev.date===isoToday(),ss=ev.subStatus||"aktif";

function scrollToCard(card){
  setTimeout(function(){
    var top=card.getBoundingClientRect().top+window.pageYOffset-90;
    window.scrollTo({top:top,behavior:"smooth"});
  },360); // was 80 — now waits out the .34s roster collapse transition first
}
        
function toggleCard(key,myName){
  var kid=safeId(key),card=document.getElementById("card-"+kid);
  if(!card)return;

  if(st.openKey&&st.openKey!==key){
    var prevKid=safeId(st.openKey);
    var prev=document.getElementById("card-"+prevKid);
    var prevRoster=document.getElementById("r-"+prevKid);
    if(prev)prev.classList.remove("open");
    if(prevRoster)prevRoster.style.maxHeight="0px";
  }

  var opening=card.classList.toggle("open");
  st.openKey=opening?key:null;
  var rosterEl=document.getElementById("r-"+kid);

  if(opening){
    if(rosterEl)rosterEl.style.maxHeight=rosterEl.scrollHeight+"px";
    if(st.rosterCache[key]){
      fillRoster("ri-"+kid,st.rosterCache[key],myName);
      growRoster(kid);
      scrollToCard(card);
    } else {
      var pipe=key.indexOf("|");
      google.script.run
        .withSuccessHandler(function(data){
          st.rosterCache[key]=data;
          fillRoster("ri-"+kid,data,myName);
          growRoster(kid);
          scrollToCard(card);
        })
        .withFailureHandler(function(e){
          console.error("getServiceRoster failed:",e);
          setRosterHTML(document.getElementById("ri-"+kid),'<div style="color:#f87171;font-size:13px;text-align:center;padding:6px">Gagal memuat: '+esc(e.message)+'</div>');
          growRoster(kid);
        })
        .getServiceRoster(key.substring(0,pipe),key.substring(pipe+1));
    }
  } else {
    if(rosterEl)rosterEl.style.maxHeight="0px";
  }
}

function growRoster(kid){
  var el=document.getElementById("r-"+kid);
  if(!el)return;
  requestAnimationFrame(function(){
    el.style.maxHeight=el.scrollHeight+"px";
  });
}

function setRosterHTML(el,html){
  el.innerHTML=html;
  el.classList.remove("roster-fadein");
  void el.offsetWidth;
  el.classList.add("roster-fadein");
}

function fillRoster(elId,data,myName){
  var el=document.getElementById(elId);if(!el)return;
  var slots=data.slots||data,groupLabel=data.groupLabel||"",myLo=myName.toLowerCase();
  if(!Object.keys(slots).length){setRosterHTML(el,'<div style="color:#8890aa;font-size:13px;text-align:center;padding:6px">Belum ada data roster.</div>');return;}
  var h="",prevSeg=null,prevSub=null,segOpen=false;
  ROST.forEach(function(grp){
    var hasData=grp.roles.some(function(r){return slots[r]&&slots[r].length;});if(!hasData)return;
    if(grp.seg!==prevSeg){if(segOpen)h+='</div>';h+='<div class="seg-block" style="'+SS[grp.seg]+'">';segOpen=true;prevSeg=grp.seg;prevSub=null;}
    if(grp.sub!==undefined&&grp.sub!==prevSub&&prevSub!==null)h+='<div class="sub-divider"></div>';
    if(grp.sub!==undefined)prevSub=grp.sub;
    var roleRendered=false;
    grp.roles.forEach(function(role){
      if(!slots[role]||!slots[role].length)return;
      if(roleRendered)h+='<div class="sub-divider"></div>';
      roleRendered=true;
      var c=C(role);
      h+='<div class="role-row" style="background:'+rowTint(role)+'"><div class="r-lbl" style="color:'+c.fg+'">'+esc(roleLabel(role))+'</div><div class="r-names">';
      slots[role].forEach(function(slot,si){
        var orig=slot.original,sub=slot.substitute;
        if(!sub){
          var me=orig.name.toLowerCase().trim()===myLo.trim();
          h+='<div class="nchip'+(me?" me":"")+'"><div class="nchip-av" style="'+avCss(role)+'">'+av(orig.photo,orig.name,26,role)+'</div><span class="nchip-name">'+esc(orig.name)+'</span></div>';
        } else {
          h+='<div class="sub-grp"><div class="n-orig"><div class="nchip-av">'+av(orig.photo,orig.name,22,role)+'</div><span class="nname">'+esc(orig.name)+'</span></div><div class="n-new"><div class="nchip-av">'+av(sub.photo,sub.name,22,role)+'</div><span class="nname">'+esc(sub.name)+'</span></div></div>';
        }
      });
      h+='</div></div>';
    });
  });
  if(segOpen)h+='</div>';
  if(groupLabel){var m2=h.indexOf('style="'+SS[2]+'"');if(m2!==-1){var bs=h.lastIndexOf('<div class="seg-block"',m2);if(bs!==-1)h=h.substring(0,bs)+'<div class="group-lbl">'+esc(groupLabel)+'</div>'+h.substring(bs);}}
  setRosterHTML(el,h);
}

  var groupMap={};
  var groups=data.groups||{};
  Object.keys(groups).forEach(function(g){

    });

    document.getElementById("content").innerHTML=h;

      var people=s.slots[role]||[];
      var names=people.map(function(p){
        var nm=p.name||p,sub=p.sub;
        return sub?'<s style="color:#f87171">'+esc(nm)+'</s><br><span style="color:#4ade80">'+esc(sub)+'</span>':esc(nm);
      }).join('<br><br>');
      var cellBg=s.isSpecial?'rgba(192,132,252,.14)':tint;
      h+='<td class="'+(names?"cell-filled":"cell-empty")+'" style="background:'+cellBg+'">'+names+'</td>';
    });
    h+='</tr>';
  });

  h+='</table></div></div></div>';
  document.getElementById("content").innerHTML=h;
}
 

function saveRingkasanAsImage(){
  var outerWrapper=document.getElementById("ring-table-wrap");
  var scrollDiv=outerWrapper?outerWrapper.querySelector(".ring-scroll"):null;
  var table=outerWrapper?outerWrapper.querySelector(".ring-tbl"):null;
  if(!outerWrapper||!table){alert("Tidak ada data tabel untuk disimpan.");return;}

  var savedOuter={overflow:outerWrapper.style.overflow,width:outerWrapper.style.width};
  var savedScroll={overflowX:scrollDiv.style.overflowX,width:scrollDiv.style.width};
  outerWrapper.style.overflow="visible";
  outerWrapper.style.width=table.scrollWidth+"px";
  scrollDiv.style.overflowX="visible";
  scrollDiv.style.width=table.scrollWidth+"px";

  html2canvas(outerWrapper,{
    scrollX:0,scrollY:0,
    windowWidth:outerWrapper.scrollWidth,windowHeight:outerWrapper.scrollHeight,
    backgroundColor:"#0a0c10",scale:2
  }).then(function(canvas){
    outerWrapper.style.overflow=savedOuter.overflow;
    outerWrapper.style.width=savedOuter.width;
    scrollDiv.style.overflowX=savedScroll.overflowX;
    scrollDiv.style.width=savedScroll.width;
    var link=document.createElement("a");
    link.download="Jadwal_PAW_"+BLN_L[st.ringMonth]+"_"+st.ringYear+".png";
    link.href=canvas.toDataURL("image/png");
    link.click();
  }).catch(function(err){
    outerWrapper.style.overflow=savedOuter.overflow;
    outerWrapper.style.width=savedOuter.width;
    scrollDiv.style.overflowX=savedScroll.overflowX;
    scrollDiv.style.width=savedScroll.width;
    console.error(err);alert("Gagal membuat gambar. Silakan coba lagi.");
  });
}

// ── GYRO LIGHT ──
(function(){
  var cx=50,cy=30;
  var tx=50,ty=30;
  var ticking=false;

  function lerp(a,b,t){return a+(b-a)*t;}

  function updateLight(){
    cx=lerp(cx,tx,0.12);
    cy=lerp(cy,ty,0.12);
    document.body.style.setProperty('--gx',cx.toFixed(1)+'%');
    document.body.style.setProperty('--gy',cy.toFixed(1)+'%');
    ticking=false;
  }

  function onGyro(e){
    if(ticking)return;
    ticking=true;
    var beta =Math.min(Math.max(e.beta ,-80),80);
    var gamma=Math.min(Math.max(e.gamma,-80),80);
    tx=50+(gamma/80)*72;
    ty=30+(beta /80)*65;
    requestAnimationFrame(updateLight);
  }

  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    document.addEventListener('touchend',function ask(){
      DeviceOrientationEvent.requestPermission().then(function(state){
        if(state==='granted')window.addEventListener('deviceorientation',onGyro,{passive:true});
      }).catch(function(){});
      document.removeEventListener('touchend',ask);
    },{once:true});
  } else {
    window.addEventListener('deviceorientation',onGyro,{passive:true});
  }
})();
