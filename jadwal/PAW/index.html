function addToolDresscode(){
  var date=(document.getElementById("tdc-n-date")||{}).value||"";
  var svc=((document.getElementById("tdc-n-svc")||{}).value||"").trim();
  var url=((document.getElementById("tdc-n-url")||{}).value||"").trim();
  if(!date||!svc||!url){alert("Isi semua kolom.");return;}
  callApi('saveDresscode',[date,svc,url,st.toolDressDept,st.vol.name]).then(function(res){
   if(res&&res.ok){st._toolDressByKey={};showToast(res.msg||"Tersimpan.","ok");renderToolDresscode();}
    else showToast((res&&res.msg)||"Gagal.","err");
  }).catch(function(e){showToast("Gagal: "+(e.message||e),"err");});
}

/* ── QC SELFIE APPROVAL TOOL ───────────────────────────────── */
var TOOL_SELFIE_GROUP_ORDER=["Voltage","AOG","Ibadah"];
function toolSelfieGroupOf(it){return it.group||it.service||"";}

function renderToolSelfie(){
  if(!st.isQC){document.getElementById("content").innerHTML='<div class="tsq-empty">Fitur ini hanya untuk Stylist.</div>';return;}
  if(st._toolSelfieLoaded&&st.toolSelfieItems.length){buildToolSelfieQueue();return;}
  document.getElementById("content").innerHTML='<div class="loading"><div class="big-spin"><span></span><span></span><span></span></div><div class="ld-txt">Memuat selfie…</div></div>';
  callApi('getSelfieQueue',[st.vol.name]).then(function(res){
    st.toolSelfieItems=(res&&res.items)||[];st._toolSelfieLoaded=true;buildToolSelfieQueue();
  }).catch(function(e){document.getElementById("content").innerHTML='<div class="tsq-empty">Gagal: '+esc(e.message||e)+'</div>';});
}

function toolSelfieGroups(){
  var items=st.toolSelfieItems||[],seen={},out=[];
  TOOL_SELFIE_GROUP_ORDER.forEach(function(g){if(items.some(function(it){return toolSelfieGroupOf(it)===g;})){seen[g]=true;out.push(g);}});
  items.forEach(function(it){var g=toolSelfieGroupOf(it);if(g&&!seen[g]){seen[g]=true;out.push(g);}});
  return out;
}

function toolSelfieShown(){
  var g=st.toolSelfieGroup,s=st.toolSelfieFilter||"pending";
  return(st.toolSelfieItems||[]).filter(function(it){return toolSelfieGroupOf(it)===g&&it.status===s;});
}

function buildToolSelfieQueue(){
  var items=st.toolSelfieItems||[],groups=toolSelfieGroups();
  var h='<div class="tool-wrap"><div class="tool-title">Approval Selfie</div>';
  if(!groups.length){h+='<div class="tsq-empty">Belum ada selfie yang diupload.</div></div>';document.getElementById("content").innerHTML=h;return;}
  if(groups.indexOf(st.toolSelfieGroup)===-1)st.toolSelfieGroup=groups[0];
  var g=st.toolSelfieGroup;

  h+='<div class="tsq-groups">';
  groups.forEach(function(gr){
    var pend=items.filter(function(it){return toolSelfieGroupOf(it)===gr&&it.status==="pending";}).length;
    h+='<button class="tsq-gbtn'+(gr===g?" on":"")+'" onclick="setToolSelfieGroup(\''+escQ(gr)+'\')">'+esc(gr)+(pend?'<span class="tsq-gdot">'+pend+'</span>':'')+'</button>';
  });
  h+='</div>';

  var counts={pending:0,approved:0,rejected:0};
  items.forEach(function(it){if(toolSelfieGroupOf(it)===g)counts[it.status]=(counts[it.status]||0)+1;});
  var filt=st.toolSelfieFilter||"pending";
  h+='<div class="tsq-filter">'+
    '<button class="tsq-fbtn'+(filt==="pending"?" on":"")+'" onclick="setToolSelfieFilter(\'pending\')">Menunggu ('+counts.pending+')</button>'+
    '<button class="tsq-fbtn'+(filt==="approved"?" on":"")+'" onclick="setToolSelfieFilter(\'approved\')">Disetujui ('+counts.approved+')</button>'+
    '<button class="tsq-fbtn'+(filt==="rejected"?" on":"")+'" onclick="setToolSelfieFilter(\'rejected\')">Ditolak ('+counts.rejected+')</button></div>';

  var shown=toolSelfieShown();
  if(!shown.length){h+='<div class="tsq-empty">Tidak ada selfie '+(filt==="pending"?"menunggu":"")+'.</div>';}
  else{
    shown.forEach(function(it,i){
      var d=new Date(it.date+"T00:00:00");
      var dstr=HARI_L[d.getDay()]+", "+d.getDate()+" "+BLN_L[d.getMonth()];
      var week=Math.ceil(d.getDate()/7);
      var badge='<span class="tsq-badge '+it.status+'">'+(it.status==="pending"?"⏳ Menunggu":it.status==="approved"?"✅ Disetujui":"❌ Ditolak")+'</span>';
      var actions='<div class="tsq-actions">';
      if(it.status!=="approved")actions+='<button class="tsq-btn tsq-approve" onclick="decideToolSelfie('+i+',\'approved\')">Setujui</button>';
      if(it.status!=="rejected")actions+='<button class="tsq-btn tsq-reject" onclick="decideToolSelfie('+i+',\'rejected\')">Tolak</button>';
      actions+='</div>';
      h+='<div class="tsq-card '+it.status+'" id="tsq-card-'+i+'">'+
        (it.url?'<img class="tsq-img" src="'+encodeURI(it.url)+'" alt="selfie" onclick="window.open(this.src,\'_blank\')">':'')+
        '<div class="tsq-body"><div class="tsq-name">'+esc(it.name)+'</div>'+
          '<div class="tsq-meta">'+esc(it.service)+' · '+esc(dstr)+' · Week '+week+'</div>'+
          badge+actions+'</div></div>';
    });
  }
  h+='</div>';
  document.getElementById("content").innerHTML=h;
}

function setToolSelfieGroup(g){st.toolSelfieGroup=g;buildToolSelfieQueue();}
function setToolSelfieFilter(f){st.toolSelfieFilter=f;buildToolSelfieQueue();}

function decideToolSelfie(idx,decision){
  var it=toolSelfieShown()[idx];if(!it)return;
  var card=document.getElementById("tsq-card-"+idx);
  if(card)card.querySelectorAll(".tsq-btn").forEach(function(b){b.disabled=true;});
  callApi('approveSelfie',[it.date,it.service,it.name,decision,st.vol.name]).then(function(res){
    if(res&&res.ok){
      st.toolSelfieItems.forEach(function(x){if(x.date===it.date&&x.service===it.service&&x.name===it.name)x.status=decision;});
      buildToolSelfieQueue();
    } else {if(card)card.querySelectorAll(".tsq-btn").forEach(function(b){b.disabled=false;});alert((res&&res.msg)||"Gagal.");}
  }).catch(function(e){if(card)card.querySelectorAll(".tsq-btn").forEach(function(b){b.disabled=false;});alert("Gagal: "+(e.message||e));});
}

function homeHTML(){return'<div class="home"><div class="home-orb"><svg viewBox="0 0 24 24" fill="none" stroke="#e8b84b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="32" height="32"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div><div class="home-h">Welcome Home!</div><div class="home-p">Cari namamu untuk melihat<br>jadwal pelayananmu.</div></div>';}

// contentOut_ commits the hidden state; contentReady_ plays it back in on the
// next frame. Pair them around any innerHTML swap you want animated.
function contentOut_(){
  var c=document.getElementById("content");
  if(!c)return;
  c.classList.remove("ready");
  void c.offsetWidth;
}
function contentReady_(){
  var c=document.getElementById("content");
  if(!c)return;
  requestAnimationFrame(function(){c.classList.add("ready");});
  setTimeout(function(){c.classList.add("ready");},90);   // rAF is throttled/dropped when backgrounded
}

function showLoading(){
  document.body.classList.add("app-loading");
  contentOut_();
  var el=document.getElementById("content");
  el.innerHTML='<div class="loading"><div class="big-spin"><span></span><span></span><span></span></div><div class="ld-txt">Memuat jadwal…</div></div>';
  contentReady_();
}

function showErr(msg){
  document.getElementById("content").innerHTML='<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-msg">'+esc(msg)+'</div></div>';
  contentReady_();
  appLoaded_();   // an error is a result too — don't strand the header off-screen
}

// Ends the headerless loading state.
function appLoaded_(){
  if(!document.body.classList.contains("app-loading"))return;
  document.body.classList.remove("app-loading");

  // Data beat the gate — the loader was never actually on screen, so there's
  // nothing to transition FROM. Restoring the header now, behind the closed
  // gate, means the page is already whole when it's revealed. Animating here
  // would land after the lift and shove the content down: an unearned second pop.
  if(revealBusy_)return;

  var h=document.querySelector(".hdr");
  if(!h)return;
  h.classList.remove("drop");
  void h.offsetWidth;
  h.classList.add("drop");
}

function isoToday(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}

function safeId(k){return k.replace(/[^a-z0-9]/gi,"_");}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function escQ(s){return String(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
function mOf(iso){var p=iso.split("-");return{year:parseInt(p[0]),month:parseInt(p[1])-1,key:mKey(parseInt(p[0]),parseInt(p[1])-1)};}

/* ── HAPTICS ──
   navigator.vibrate is Android Chrome only (iOS Safari has no vibration API at
   all — this stays silent there, not broken). One delegated listener instead of
   touching every onclick: tag the elements that should buzz and match by closest(). */
var HAPTIC_MS=10;
var HAPTIC_SEL=[
  ".sub-btn",".mon-btn",".menu-btn",".sched-tab",".card-tab",
  ".dept-trig",".dept-opt",".av-cell.svc",".av-month-pill",
  ".vol-card",".ecard-top",".ecard-notif",".selfie-btn",
  ".sug-item",".dr-item",".cal-cell.has-event"
].join(",");

function buzz_(ms){
  try{ if(navigator.vibrate) navigator.vibrate(ms||HAPTIC_MS); }catch(e){}
}

document.addEventListener("click",function(e){
  var hit=e.target.closest(HAPTIC_SEL);
  if(hit && !hit.disabled) buzz_();
},true);   // capture phase — fires even if the handler below stops propagation

document.addEventListener("touchstart",function(e){if(!e.target.closest(".srch"))hideGateSug();if(!e.target.closest(".dept-pick"))hideDeptMenu();},{passive:true});
document.addEventListener("click",function(e){if(!e.target.closest(".srch"))hideGateSug();if(!e.target.closest(".dept-pick"))hideDeptMenu();});
(function(){var sx=0;document.addEventListener("touchstart",function(e){sx=e.touches[0].clientX;},{passive:true});document.addEventListener("touchend",function(e){if(e.changedTouches[0].clientX-sx<-50&&document.getElementById("dr").classList.contains("on"))closeDr();},{passive:true});})();

// ── GYRO LIGHT ──
(function(){
  var cx=50,cy=30;
  var tx=50,ty=30;
  var ticking=false;

  function lerp(a,b,t){return a+(b-a)*t;}

  function updateLight(){
    cx=lerp(cx,tx,0.12);
    cy=lerp(cy,ty,0.12);
    document.body.style.setProperty('--gx',cx.toFixed(1)+'%');
    document.body.style.setProperty('--gy',cy.toFixed(1)+'%');
    ticking=false;
  }

  function onGyro(e){
    if(ticking)return;
    ticking=true;
    var beta =Math.min(Math.max(e.beta ,-80),80);
    var gamma=Math.min(Math.max(e.gamma,-80),80);
    tx=50+(gamma/80)*72;
    ty=30+(beta /80)*65;
    requestAnimationFrame(updateLight);
  }

  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    document.addEventListener('touchend',function ask(){
      DeviceOrientationEvent.requestPermission().then(function(state){
        if(state==='granted')window.addEventListener('deviceorientation',onGyro,{passive:true});
      }).catch(function(){});
      document.removeEventListener('touchend',ask);
    },{once:true});
  } else {
    window.addEventListener('deviceorientation',onGyro,{passive:true});
  }
})();

}
