<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Volunteer Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/PAW-192.png">
<link rel="apple-touch-icon" href="icons/PAW-192.png">
<meta name="theme-color" content="#0a0c10">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
        integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
/* ── BASE RESET ─────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --page-pad: 25px;
  --gate-top: 17svh;    /* how far down the gate content starts — smaller = higher up the page */
  --hdr-space: 190px;  /* header + bottom padding the full-page loader discounts when centering */
}

html {
  -webkit-text-size-adjust: 100%;
  background: #0a0c10;
  overflow-x: hidden;
  width: 100%;
  max-width: 100%;
}

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: #0a0c10;
  color: #f0f0f5;
  min-height: 100svh;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  padding-top: env(safe-area-inset-top, 0px);
  user-select: none;
  -webkit-user-select: none;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background: radial-gradient(
    140px circle at var(--gx, 50%) var(--gy, 30%),
    rgba(232,184,75,.18) 0%,
    rgba(232,184,75,.08) 40%,
    rgba(232,184,75,.02) 70%,
    transparent 100%
  );
  filter: blur(6px);
  will-change: background;
}

input, textarea {
  user-select: text;
  -webkit-user-select: text;
}

/* ── HORIZONTAL TABLE ROLL OVER ─────── */
.ring-scroll {
  width: 100% !important;
  max-width: 100% !important;
  overflow-x: auto !important;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
}

.ring-tbl {
  min-width: 600px;
}

/* ── OVERLAY + DRAWER ─────── */
.ov{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .3s}
.ov.on{opacity:1;pointer-events:all}
.dr{position:fixed;left:0;top:0;bottom:0;z-index:200;width:264px;background:#12151c;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .32s cubic-bezier(.22,1,.36,1);padding-top:env(safe-area-inset-top,0px)}
.dr.on{transform:translateX(0)}
.dr-top{display:flex;align-items:center;gap:11px;padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.dr-ring{width:36px;height:36px;border-radius:50%;background:#e8b84b;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;animation:logoThrob 2.8s ease-in-out infinite}
/* box-shadow ripple rather than a ::after ring — the logo's own overflow:hidden
   would clip a pseudo-element, but never its own shadow. */
@keyframes logoThrob{
  0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(232,184,75,.45)}
  50%    {transform:scale(1.07);box-shadow:0 0 0 7px rgba(232,184,75,0)}
}
.dr-ring img{width:100%;height:100%;object-fit:cover;display:none}
.dr-church{font-size:10px;color:#8890aa;letter-spacing:.06em;text-transform:uppercase}
.dr-team{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;line-height:1.3;margin-top:1px}
.dr-nav{flex:1;padding:10px 0}
.dr-item{display:flex;align-items:center;gap:13px;padding:13px 18px;cursor:pointer;font-size:15px;font-weight:500;color:#8890aa;transition:background .12s,color .12s;position:relative}
.dr-item:active{background:rgba(255,255,255,.04)}
.dr-item.on{color:#f0f0f5}
.dr-item.on::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 3px 3px 0;background:#e8b84b}
.dr-item svg{opacity:.6;flex-shrink:0;transition:opacity .15s}
.dr-item.on svg{opacity:1}

/* ── PAGE ─────────────────── */
.page {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
}

/* ── HEADER — 32px sides ──── */
.hdr{position:sticky;top:0;z-index:40;background:#12151c;border-bottom:1px solid rgba(255,255,255,.08);padding:12px var(--page-pad) 10px;margin-bottom:16px;width:100%}
/* While the schedule is still in flight the header is an empty shell — hide it
   so the loader gets the whole screen, and zero out the space .loading reserves
   for it (132px ≈ the page/content bottom padding, keeps it off the scrollbar). */
body.app-loading .hdr{display:none}
body.app-loading{--hdr-space:132px}
/* Dropped in by appLoaded_() once the data is home AND the gate has lifted, so
   the slide is actually witnessed. */
.hdr.drop{transform-origin:top center;animation:hdrDrop .5s cubic-bezier(.22,1,.36,1) both}
@keyframes hdrDrop{
  0%  {transform:translateY(-100%) scaleY(.9)}
  72% {transform:translateY(2px) scaleY(1.02)}
  100%{transform:translateY(0) scaleY(1)}
}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:0;}
.menu-btn{width:36px;height:36px;border-radius:10px;background:none;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#f0f0f5;transition:background .15s;margin-left:-8px}
.menu-btn:active{background:rgba(255,255,255,.08)}
.hdr-text{flex:1;min-width:0}
.hdr-l1{font-family:'Syne',sans-serif;font-weight:800;font-size:12px;line-height:1.22;letter-spacing:-.02em;color:#f0f0f5}

/* department pill: rounded-rect (not a full capsule) with a per-dept icon + name */
.dept-pill{display:inline-flex;align-items:center;gap:7px;padding:7px 13px 7px 9px;border-radius:11px;flex-shrink:0}
.dept-pill-icon{display:flex;align-items:center;justify-content:center;width:16px;height:16px;flex-shrink:0}
.dept-pill-icon svg{width:100%;height:100%;display:block}
.dept-pill-name{font-family:'Syne',sans-serif;font-weight:800;font-size:12px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}

/* Scoped to #dept-pill, NOT .dept-pill — the gate dropdown reuses the same class
   and its options must stay still. The halo borrows currentColor, so it picks up
   each dept's own color from setDeptHeader() for free. */
/* setDeptHeader() keeps the pill display:none until the gate has lifted, then
   arms .in — so the slide is actually witnessed instead of playing behind it.
   No opacity in deptSlideIn: it slides in squashed and springs back to width. */
#dept-pill{position:relative}
#dept-pill.in{animation:deptSlideIn .8s cubic-bezier(.22,1,.36,1) both, pillThrob 3.4s ease-in-out 1s infinite}
#dept-pill::after{content:'';position:absolute;inset:0;border-radius:inherit;border:1.5px solid currentColor;pointer-events:none;opacity:0}
#dept-pill.in::after{animation:pillHalo 3.4s cubic-bezier(.22,1,.36,1) 1s infinite}
@keyframes deptSlideIn{
  0%  {transform:translateX(80px) scaleX(.78)}
  62% {transform:translateX(-5px) scaleX(1.05)}
  100%{transform:translateX(0) scaleX(1)}
}
@keyframes pillThrob{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}
@keyframes pillHalo{0%{opacity:.5;transform:scale(1)}70%,100%{opacity:0;transform:scale(1.3)}}

        /* Big loader (full-page: jadwal / ringkasan / catatan) */
.big-spin{display:flex;gap:8px;justify-content:center;align-items:flex-end;height:30px;margin:0 auto 14px}
.big-spin span{width:12px;height:12px;border-radius:50%;background:#e8b84b;display:inline-block;animation:dotBounce .9s cubic-bezier(.34,1.56,.64,1) infinite}
.big-spin span:nth-child(1){animation-delay:0s}
.big-spin span:nth-child(2){animation-delay:.13s}
.big-spin span:nth-child(3){animation-delay:.26s}

@keyframes dotBounce{
  0%   { transform:translateY(0) scale(1,1); }
  12%  { transform:translateY(0) scale(1.3,.7); }
  30%  { transform:translateY(-20px) scale(.8,1.25); }
  50%  { transform:translateY(-20px) scale(.8,1.25); }
  68%  { transform:translateY(0) scale(1.3,.7); }
  82%  { transform:translateY(0) scale(.92,1.08); }
  100% { transform:translateY(0) scale(1,1); }
}

/* Small inline loader (roster "Memuat tim…") */
.r-spin{display:inline-flex;gap:4px;align-items:flex-end;height:14px}
.r-spin span{width:6px;height:6px;border-radius:50%;background:#e8b84b;display:inline-block;animation:dotBounce .9s cubic-bezier(.34,1.56,.64,1) infinite}
.r-spin span:nth-child(1){animation-delay:0s}
.r-spin span:nth-child(2){animation-delay:.13s}
.r-spin span:nth-child(3){animation-delay:.26s}

/* subtle life in the loading text */
.ld-txt{font-size:14px;color:#8890aa;animation:ldPulse 1.3s ease-in-out infinite}
@keyframes ldPulse{0%,100%{opacity:.55}50%{opacity:1}}

/* ── SEARCH ───────────────── */
.srch{position:relative;margin-bottom:14px}
.srch-icon{position:absolute;left:calc(var(--page-pad) + 13px);top:50%;transform:translateY(-50%);color:#4a5070;pointer-events:none;transition:color .2s}
.srch:focus-within .srch-icon{color:#e8b84b}
.srch-inp{width:100%;background:#12151c;border:1.5px solid rgba(255,255,255,.13);border-radius:14px;padding:13px 42px 13px 42px;font-family:'DM Sans',sans-serif;font-size:16px;color:#f0f0f5;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s,box-shadow .2s}
.srch-inp::placeholder{color:#4a5070}
.srch-inp:focus{border-color:#e8b84b;box-shadow:0 0 0 3px rgba(232,184,75,.1)}
.srch-clear{position:absolute;right:calc(var(--page-pad) + 11px);top:50%;transform:translateY(-50%);width:26px;height:26px;border-radius:50%;background:#222737;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;color:#8890aa;font-size:14px}

/* ── SUGGESTIONS ──────────── */
.sug{position:absolute;top:calc(100%+5px);left:var(--page-pad);right:var(--page-pad);z-index:100;background:#12151c;border:1.5px solid rgba(255,255,255,.13);border-radius:14px;overflow:hidden;display:none;box-shadow:0 14px 44px rgba(0,0,0,.75);animation:popIn .16s cubic-bezier(.34,1.5,.64,1) both}
@keyframes popIn{from{opacity:0;transform:scale(.96) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.sug-item{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);transition:background .1s}
.sug-item:last-child{border:none}
.sug-item:active{background:#1a1e28}
.sug-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.sug-av img{width:100%;height:100%;object-fit:cover;display:block}
.sug-name{font-size:15px;font-weight:500}
.sug-badges{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.badge{display:inline-block;font-size:13px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.sug-empty{padding:18px;text-align:center;font-size:14px;color:#8890aa}

/* ── CONTENT — 32px sides ─── */
.content{flex:1;padding-left:var(--page-pad);padding-right:var(--page-pad);padding-bottom:calc(env(safe-area-inset-bottom,0px)+72px);overflow-x:hidden;width:100%;box-sizing:border-box}
#content{opacity:0;transform:translateY(18px) scale(.98);transition:opacity .5s cubic-bezier(.22,1,.36,1),transform .62s cubic-bezier(.22,1,.36,1)}
#content.ready{opacity:1;transform:translateY(0) scale(1)}

/* ── HOME ─────────────────── */
.home{padding:52px 0 28px;text-align:center;animation:homePop .6s cubic-bezier(.22,1.1,.36,1) both}
body:not(.app-in) .home{animation:none}   /* first paint sits behind the gate — nothing to animate */

@keyframes homePop{
  0%  { opacity:0; transform:scale(.9) translateY(14px); }
  60% { opacity:1; transform:scale(1.02) translateY(-2px); }
  100%{ transform:scale(1) translateY(0); }
}
.home-orb{width:70px;height:70px;border-radius:22px;background:rgba(232,184,75,.13);border:1px solid rgba(232,184,75,.22);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(232,184,75,.1)}50%{box-shadow:0 0 0 16px transparent}}
.home-h{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;letter-spacing:-.03em;line-height:1.15;margin-bottom:10px}
.home-p{font-size:15px;color:#8890aa;line-height:1.65}

/* ── VOL CARD ─────────────── */
.vol-card{display:flex;align-items:center;gap:13px;background:#12151c;border:1.5px solid rgba(255,255,255,.13);border-radius:18px;padding:18px;margin-bottom:14px;transform-origin:top center;animation:slideDown .55s cubic-bezier(.22,1.1,.36,1) .06s both;cursor:pointer}
.vol-card:active{background:#171b24}
.vol-card-switch{flex-shrink:0;color:#4a5070;align-self:center}
@keyframes slideDown{
  0%  { opacity:0; transform:translateY(-12px) scaleY(.92); }
  70% { opacity:1; transform:translateY(1px) scaleY(1.015); }
  100%{ transform:translateY(0) scaleY(1); }
}
.vol-av{width:52px;height:52px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;border:2px solid}
.vol-av img{width:100%;height:100%;object-fit:cover;display:block}
.vol-name{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-.02em;line-height:1.1;margin-bottom:6px;color:#e8b84b}
.vol-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.vol-meta{font-size:13px;color:#8890aa;margin-top:10px}

/* ── SCHED TABS ───────────── */
.sched-tabs{display:flex;gap:5px;margin-bottom:16px;background:#12151c;border-radius:13px;padding:4px;border:1px solid rgba(255,255,255,.06);animation:tabsPop .5s cubic-bezier(.22,1.1,.36,1) .14s both}
@keyframes tabsPop{
  0% { opacity:0; transform:scale(.94); }
  65%{ opacity:1; transform:scale(1.015); }
  100%{ transform:scale(1); }
}
.sched-tab{flex:1;padding:9px 0;border-radius:9px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:#8890aa;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.sched-tab.on{background:#222737;color:#f0f0f5}

/* ── MONTH NAV ────────────── */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-top:10px;margin-bottom:12px;animation:navSlideIn .55s cubic-bezier(.22,1,.36,1) .22s both}
@keyframes navSlideIn{
  0%{ opacity:0; transform:translateX(26px); }
  100%{ opacity:1; transform:translateX(0); }
}
.month-lbl{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.01em}
.mon-btn{width:34px;height:34px;border-radius:10px;background:#12151c;border:1px solid rgba(255,255,255,.13);color:#8890aa;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.mon-btn:active{background:#222737;color:#f0f0f5}
.mon-btn:disabled{opacity:.22;cursor:default}

/* ── MINI CALENDAR ────────── */
.mini-cal{background:#12151c;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px 10px 10px;margin-bottom:18px;transform-origin:top center;animation:calIn .58s cubic-bezier(.22,1.1,.36,1) .3s both}
@keyframes calIn{
  0%  { opacity:0; transform:translateY(-14px) scaleY(.93); }
  70% { opacity:1; transform:translateY(2px) scaleY(1.012); }
  100%{ transform:translateY(0) scaleY(1); }
}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px}
.cal-dow{text-align:center;font-size:12px;font-weight:700;color:#e8b84b;padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0}
.cal-cell{height:34px;display:flex;align-items:center;justify-content:center}
.cal-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#4a5070;transition:all .15s}
.cal-cell.is-today:not(.has-event) .cal-num{box-shadow:0 0 0 1.5px #f0f0f5;color:#f0f0f5;font-weight:700}
.cal-cell.has-event:not(.is-today){cursor:pointer}
.cal-cell.has-event:not(.is-today) .cal-num{background:rgba(232,184,75,.18);color:#e8b84b;font-weight:800;font-size:14px}
.cal-cell.has-event:not(.is-today):active .cal-num{background:rgba(232,184,75,.32)}
.cal-cell.is-today.has-event{cursor:pointer}
.cal-cell.is-today.has-event .cal-num{background:#e8b84b;color:#0a0c10;font-weight:800;font-size:14px;box-shadow:0 0 0 2px #0a0c10,0 0 0 3.5px rgba(240,240,245,.6)}

/* ── SEC LABEL ────────────── */
.sec-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#4a5070;margin-top:14px;margin-bottom:10px}
        
/* ── MONTH SLIDE TRANSITION ── */
@keyframes slideInRight{from{opacity:0;transform:translateX(48px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-48px)}to{opacity:1;transform:translateX(0)}}
.slide-in-right{animation:slideInRight .45s cubic-bezier(.22,1,.36,1) both}
.slide-in-left{animation:slideInLeft .45s cubic-bezier(.22,1,.36,1) both}

/* ── EVENT LIST ───────────── */
.ev-list{display:flex;flex-direction:column;gap:10px}

/* ── EVENT CARD ───────────── */
.ecard{background:#12151c;border:1.5px solid rgba(255,255,255,.07);border-radius:18px;overflow:hidden;cursor:pointer;transition:border-color .2s,background .15s;transform-origin:top center;animation:cardBounce .62s cubic-bezier(.22,1.08,.36,1) both}
.ecard:nth-child(1){animation-delay:.38s}
.ecard:nth-child(2){animation-delay:.46s}
.ecard:nth-child(3){animation-delay:.54s}
.ecard:nth-child(4){animation-delay:.62s}
.ecard:nth-child(5){animation-delay:.70s}
.ecard:nth-child(n+6){animation-delay:.76s}

@keyframes cardBounce{
  0%  { opacity:0; transform:translateY(18px) scaleY(.94); }
  70% { opacity:1; transform:translateY(-1px) scaleY(1.012); }
  100%{ transform:translateY(0) scaleY(1); }
}
.ecard:active{background:#1a1e28}
.ecard.open{border-color:rgba(232,184,75,.45)}
.ecard.past{opacity:.38}
.ecard.digantikan{border-color:rgba(248,113,113,.3);opacity:.6}
.ecard.menggantikan{border-color:rgba(74,222,128,.4)}
.ecard.special{border-color:rgba(192,132,252,.45)}
.ecard-top{display:flex;align-items:center;padding:15px 16px;gap:25px}
.date-blk{flex-shrink:0;align-self:flex-start;width:65px;height:85px;background:#1a1e28;border-radius:12px;padding:9px 5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.date-blk.today{background:#e8b84b}
.db-dow{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8890aa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:54px;text-align:center}
.db-num{font-family:'DM Sans',sans-serif;font-size:30px;font-weight:900;line-height:1;color:#e8b84b}
.db-mon{font-size:11px;font-weight:600;color:#8890aa}
.date-blk.today .db-dow,.date-blk.today .db-num,.date-blk.today .db-mon{color:#0a0c10}
.ecard-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:4px}
.ecard-time-top{font-size:14px;font-weight:700;color:#e8b84b;letter-spacing:.02em;margin-bottom:3px}
.ecard-svc{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;letter-spacing:-.02em;color:#f0f0f5;line-height:1.2;margin-bottom:3px}
.ecard-meta-row{display:flex;align-items:center;gap:10px}
.ecard-meta-row{display:flex;align-items:center;gap:8px}
.ecard-tags-wrap{display:flex;flex-wrap:wrap;align-items:center;gap:8px;flex:1;min-width:0}
.ecard-time{font-size:16px;font-weight:700;color:#e8b84b}
.role-chip{display:inline-block;font-size:13px;font-weight:600;padding:4px 11px;border-radius:20px;white-space:nowrap}
.sub-badge{font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
.sub-badge.out{background:rgba(248,113,113,.18);color:#f87171}
.sub-badge.in{background:rgba(74,222,128,.18);color:#4ade80}
.ecard-arr{color:#4a5070;flex-shrink:0;display:flex;align-items:center;margin-left:4px;transition:transform .22s cubic-bezier(.34,1.7,.64,1),color .15s}
.ecard.open .ecard-arr{transform:rotate(90deg);color:#e8b84b}
        
/* ── ECARD DRESSCODE NOTIF ── */
/* Sits outside .roster, so it stays visible when the card is collapsed — that's
   the point: the status should be readable without opening anything. */
.ecard-notif{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid rgba(255,255,255,.06);font-size:12px;font-weight:600;cursor:pointer;line-height:1.35;transition:filter .15s}
.ecard-notif:active{filter:brightness(1.3)}
.ecard-notif svg{flex-shrink:0}
.ecard-notif-arr{margin-left:auto;opacity:.55}
.ecard-notif.none    {background:rgba(232,184,75,.10);color:#e8b84b}
.ecard-notif.pending {background:rgba(255,255,255,.04);color:#8890aa}
.ecard-notif.approved{background:rgba(74,222,128,.10);color:#4ade80}
.ecard-notif.rejected{background:rgba(248,113,113,.12);color:#f87171}

/* ── ROSTER PANEL ─────── */
        
        
/* ── ROSTER PANEL ─────────── */
.roster{max-height:0;overflow:hidden;transform-origin:top;transition:max-height .34s cubic-bezier(.22,1,.36,1)}
.roster {
    background:#12151c;
}
@keyframes rosterFadeIn{
  0%  { opacity:0; transform:translateY(-8px) scaleY(.9); }
  60% { opacity:1; transform:translateY(1px) scaleY(1.03); }
  100%{ transform:translateY(0) scaleY(1); }
}
.roster-fadein{transform-origin:top;animation:rosterFadeIn .3s cubic-bezier(.34,1.56,.64,1) both}
.roster-fadein{animation:rosterFadeIn 1.2s cubic-bezier(.16,1,.3,1) both}
.roster-inner{border-top:1px solid rgba(255,255,255,.06);padding:10px;background:#1a1e28;display:flex;flex-direction:column;gap:7px}
.roster-spin{display:flex;align-items:center;gap:8px;font-size:13px;color:#8890aa;padding:4px}

/* ── GROUP LABEL ──────────── */
.group-lbl{text-align:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#e8b84b;letter-spacing:.08em;text-transform:uppercase;padding:3px 0}

/* ── SEGMENT BLOCKS ───────── */
.seg-block{border-radius:12px;overflow:hidden;margin:0}
.sub-divider{height:1px;background:rgba(255,255,255,.1)}

/* ── ROLE ROW ── */
.role-row{display:flex;align-items:stretch;min-height:40px}
.r-lbl{width:33%;min-width:72px;max-width:108px;flex-shrink:0;display:flex;align-items:center;padding:8px 6px 8px 12px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;line-height:1.2}
.r-names{flex:1;display:flex;flex-direction:column;gap:5px;padding:7px 12px 7px 8px;border-left:1px solid rgba(255,255,255,.08)}

/* ── NAME CHIPS ───────────── */
.nchip{display:inline-flex;align-items:center;gap:7px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.07);border-radius:30px;padding:5px 13px 5px 5px;width:fit-content;animation:chipIn .2s cubic-bezier(.22,1,.36,1) both}
.nchip.me{background:rgba(232,184,75,.18);border-color:rgba(232,184,75,.35)}
.nchip-av{width:26px;height:26px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.nchip-av img{width:100%;height:100%;object-fit:cover;display:block}
.nchip-name{font-size:15px;font-weight:500;color:#f0f0f5}
.nchip.me .nchip-name{color:#e8b84b;font-weight:600}
.sub-grp{background:transparent;border:none;padding:0;display:flex;flex-direction:column;gap:6px;width:fit-content;animation:chipIn .22s cubic-bezier(.22,1,.36,1) both}
.n-orig{display:inline-flex;align-items:center;gap:7px;padding:2px 4px}
.n-orig .nchip-av{width:22px;height:22px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(248,113,113,.15)}
.n-orig .nname{font-size:13px;font-weight:500;color:#f87171;text-decoration:line-through;text-decoration-thickness:2px}
.n-new{display:inline-flex;align-items:center;gap:7px;background:rgba(74,222,128,.16);border:1px solid rgba(74,222,128,.32);border-radius:30px;padding:5px 13px 5px 5px;width:fit-content}
.n-new .nchip-av{width:24px;height:24px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(74,222,128,.2)}
.n-new .nname{font-size:14px;font-weight:600;color:#4ade80}


/* ── HISTORY ──────────────── */
.hist-group{margin-bottom:22px}
.hist-month{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#8890aa;margin-bottom:10px}

/* ── CATATAN ──────────────── */
.notes-list{display:flex;flex-direction:column;gap:12px;padding-top:6px}
.note-card{background:#12151c;border:1.5px solid rgba(255,255,255,.07);border-radius:16px;padding:18px;animation:noteSlideIn .55s cubic-bezier(.22,1.08,.36,1) both}
.note-card:nth-child(1){animation-delay:.06s}
.note-card:nth-child(2){animation-delay:.15s}
.note-card:nth-child(3){animation-delay:.24s}
.note-card:nth-child(n+4){animation-delay:.32s}
@keyframes noteSlideIn{
  0%  { opacity:0; transform:translateX(-24px) scale(.98); }
  70% { opacity:1; transform:translateX(2px) scale(1.005); }
  100%{ transform:translateX(0) scale(1); }
}

.note-date{font-size:11px;color:#4a5070;margin-bottom:5px}
.note-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:7px}
.note-body{font-size:14px;color:#8890aa;line-height:1.7}
.note-by{font-size:11px;color:#4a5070;margin-top:8px}

/* ── NOTE PDF EMBED ── */
.note-pdf-wrap{border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:#1a1e28;margin-top:12px}
.note-pdf-wrap iframe{width:100%;height:380px;border:none;display:block}
.note-open-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#e8b84b;text-decoration:none;margin-top:8px}
.note-open-link:active{opacity:.7}        

/* ── MASUKAN ──────────────── */
.fb-wrap{padding-top:6px;animation:fbPopIn .55s cubic-bezier(.22,1.08,.36,1) both}
@keyframes fbPopIn{
  0%  { opacity:0; transform:translateY(20px) scale(.98); }
  70% { opacity:1; transform:translateY(-1px) scale(1.005); }
  100%{ transform:translateY(0) scale(1); }
}
.fb-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.02em;margin-bottom:7px}
.fb-sub{font-size:14px;color:#8890aa;margin-bottom:22px;line-height:1.65}
.form-g{margin-bottom:14px}
.form-lbl{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#8890aa;margin-bottom:6px;display:block}
.form-inp{width:100%;background:#12151c;border:1.5px solid rgba(255,255,255,.13);border-radius:13px;padding:13px 15px;font-family:'DM Sans',sans-serif;font-size:15px;color:#f0f0f5;outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s}
.form-inp::placeholder{color:#4a5070}
.form-inp:focus{border-color:#e8b84b;box-shadow:0 0 0 3px rgba(232,184,75,.1)}
textarea.form-inp{resize:vertical;min-height:110px;line-height:1.6}
.sub-btn{width:100%;padding:14px;border-radius:13px;border:none;background:#e8b84b;color:#0a0c10;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.01em;cursor:pointer;transition:opacity .2s,transform .15s;margin-top:4px}
.sub-btn:active{opacity:.85;transform:scale(.98)}
.sub-btn:disabled{opacity:.4;cursor:default}
.gate-spin{width:18px;height:18px;border:2.5px solid rgba(10,12,16,.25);border-top-color:#0a0c10;border-radius:50%;display:inline-block;vertical-align:middle;animation:gateSpin .65s linear infinite}
@keyframes gateSpin{to{transform:rotate(360deg)}}
.fb-ok{text-align:center;padding:48px 0;animation:fadeUp .4s cubic-bezier(.22,1,.36,1)}
.fb-ok-ico{font-size:48px;margin-bottom:14px}
.fb-ok-h{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:8px}
.fb-ok-p{font-size:14px;color:#8890aa;line-height:1.6}

/* ── RINGKASAN (volunteer view) ── */
.ring-wrap{animation:fadeUp .3s cubic-bezier(.22,1,.36,1)}
.ring-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;margin-top:20px}
.ring-month-lbl{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.01em;color:#e8b84b}
.ring-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;border:1px solid rgba(255,255,255,.08)}
table.ring-tbl{border-collapse:collapse;font-size:12px;table-layout:fixed}
.ring-tbl th,.ring-tbl td{border:1px solid rgba(255,255,255,.08);padding:7px 10px;text-align:center;vertical-align:middle}
.ring-tbl th{background:#1a1e28;font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:11px}
.ring-tbl .week-hdr{background:#0f2d52;color:#e8b84b;font-size:11px;font-weight:800;letter-spacing:.08em}
.ring-tbl .date-hdr{background:#1e2636;color:#f0f0f5;font-size:12px;font-weight:700;white-space:nowrap}
.ring-tbl .svc-hdr{background:#1a1e28;color:#8890aa;font-size:11px;white-space:nowrap}
.ring-tbl .role-col{text-align:left;font-weight:700;font-size:11px;letter-spacing:.04em;text-transform:uppercase;padding-left:12px;white-space:nowrap;min-width:80px}
.ring-tbl .cell-filled{background:rgba(74,222,128,.05)}
.ring-tbl .cell-empty{color:#4a5070}
.ring-tbl tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.ring-save-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:13px;border:none;background:#e8b84b;color:#0a0c10;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:48px;transition:opacity .2s}
.ring-save-btn:active{opacity:.85}

/* ── KETERSEDIAAN (VOLUNTEER) ── */
.av-wrap{animation:fadeUp .3s cubic-bezier(.22,1,.36,1)}
.av-vol-line{font-size:14px;color:#8890aa;margin:8px 0 14px}
.av-vol-line b{color:#e8b84b;font-weight:600}
.av-month-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.av-month-pill{padding:8px 15px;border-radius:20px;border:1.5px solid rgba(255,255,255,.13);background:#12151c;color:#8890aa;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.av-month-pill.on{background:rgba(232,184,75,.15);border-color:#e8b84b;color:#e8b84b}
.av-month-single{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#e8b84b;margin-bottom:16px;letter-spacing:-.01em}
.av-hint{font-size:13px;color:#8890aa;line-height:1.6;margin-bottom:14px;text-align:center;background:#12151c;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px 14px}
.av-hint b{font-weight:700}
.av-cal{background:#12151c;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:14px 12px 12px;margin-bottom:18px}
.av-cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:8px}
.av-cal-dow{text-align:center;font-size:12px;font-weight:700;color:#e8b84b}
.av-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.av-cell{min-height:42px;display:flex;align-items:center;justify-content:center;border-radius:12px;font-size:15px;font-weight:600}
.av-cell.pad{visibility:hidden}
.av-cell.off{color:#2d3342}
.av-cell.svc{color:#f0f0f5;background:rgba(255,255,255,.05);cursor:pointer;border:1.5px solid rgba(255,255,255,.08);transition:transform .1s,background .12s,border-color .12s}
.av-cell.svc:active{transform:scale(.88)}
.av-cell.blk{background:rgba(248,113,113,.9);color:#fff;border-color:rgba(248,113,113,.9)}
.av-save-btn{width:100%;padding:14px;border-radius:13px;border:none;background:#333744;color:#666a7a;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:default;margin-bottom:40px;transition:background .25s,color .25s}
.av-save-btn.dirty{background:#e8b84b;color:#0a0c10;cursor:pointer}
.av-save-btn.dirty:active{opacity:.85;transform:scale(.98)}

/* ── CARD SUB-TABS (PAW 3-tab) ── */
.card-tabs{display:flex;gap:4px;padding:8px 10px 0;background:#1a1e28;border-top:1px solid rgba(255,255,255,.06)}
.card-tab{flex:1;padding:8px 0;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:#8890aa;cursor:pointer;border-radius:9px 9px 0 0;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .15s,color .15s}
.card-tab.on{background:#12151c;color:#e8b84b}
/* Order matters: .leaving sits after .on so its animation wins during the
   close phase. Only ever one pane is display:block at a time — the outgoing
   one finishes leaving before the incoming one mounts, so growRoster() never
   measures both stacked. --pane-dx carries the direction, set per-swap in JS. */
.card-pane{display:none;background:#12151c}
.card-pane.on{display:block;animation:paneIn .24s cubic-bezier(.22,1,.36,1) both}
.card-pane.leaving{display:block;pointer-events:none;animation:paneOut .15s cubic-bezier(.4,0,1,1) both}
@keyframes paneIn{from{opacity:0;transform:translateX(var(--pane-dx,18px))}to{opacity:1;transform:translateX(0)}}
@keyframes paneOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(var(--pane-dx,-18px))}}
.song-list{display:flex;flex-direction:column;gap:8px;padding:12px 12px 14px}
.song-row{display:flex;align-items:center;gap:10px;background:#1a1e28;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px 12px}
.song-info{flex:1;min-width:0}
.song-no{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#4a5070;margin-bottom:2px}
.song-title{font-size:15px;font-weight:600;color:#f0f0f5;line-height:1.25}
.song-pencipta{font-size:12px;color:#8890aa;margin-top:2px}
.song-yt{flex-shrink:0;width:38px;height:38px;border-radius:11px;background:rgba(255,60,60,.15);border:1px solid rgba(255,60,60,.3);display:flex;align-items:center;justify-content:center;color:#ff5252;text-decoration:none;transition:background .15s}
.song-yt:active{background:rgba(255,60,60,.28)}
.song-yt.off{opacity:.3;pointer-events:none}
.song-empty,.dress-empty{padding:26px 14px;text-align:center;font-size:13px;color:#8890aa}
.dress-pane-inner{padding:12px}
.dress-pdf-wrap{border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:#1a1e28;margin-bottom:14px}
.dress-pdf-wrap iframe{width:100%;height:420px;border:none;display:block}
.dress-open-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#e8b84b;text-decoration:none;margin-bottom:14px}
.selfie-box{background:#1a1e28;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px}
.selfie-h{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;margin-bottom:4px}
.selfie-sub{font-size:12px;color:#8890aa;line-height:1.55;margin-bottom:12px}
.selfie-status{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:6px 12px;border-radius:20px;margin-bottom:12px}
.selfie-status.none{background:rgba(255,255,255,.06);color:#8890aa}
.selfie-status.pending{background:rgba(232,184,75,.16);color:#e8b84b}
.selfie-status.approved{background:rgba(74,222,128,.16);color:#4ade80}
.selfie-status.rejected{background:rgba(248,113,113,.16);color:#f87171}
.selfie-preview{width:100%;max-width:220px;border-radius:12px;margin:0 auto 12px;display:block}
.selfie-btn{width:100%;padding:12px;border-radius:12px;border:1.5px dashed rgba(232,184,75,.4);background:rgba(232,184,75,.06);color:#e8b84b;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.selfie-btn:active{background:rgba(232,184,75,.15)}
.selfie-btn:disabled{opacity:.5;cursor:default}
.selfie-input{display:none}
/* .dept-pill (top-right header badge) used to be a plain inline label here — now defined near .hdr-l1 above with icon support */

/* ── STATES ───────────────── */
.empty{text-align:center;padding:40px 0;animation:emptyPop .5s cubic-bezier(.22,1.08,.36,1) both}
@keyframes emptyPop{
  0% { opacity:0; transform:scale(.93); }
  70%{ opacity:1; transform:scale(1.015); }
  100%{ transform:scale(1); }
}
.empty-ico{margin-bottom:10px}
.empty-msg{font-size:14px;color:#8890aa;line-height:1.6}
/* Full-page loaders (Jadwal / Ringkasan / Catatan / Ketersediaan) all share this
   class, so centering here lands them at the same spot as the splash + gate loader
   instead of hanging near the top. */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:calc(100svh - var(--hdr-space));padding:0;animation:loadPop .22s cubic-bezier(.22,1,.36,1) both}
@keyframes loadPop{
  0%{ opacity:0; transform:scale(.9); }
  100%{ opacity:1; transform:scale(1); }
}
/* .big-spin / .ld-txt live once, near the top (dot-bounce loader). The circle-spinner
   overrides that used to sit here were silently killing the dots everywhere. */
.no-ev{background:#12151c;border:1px solid rgba(255,255,255,.06);border-radius:13px;padding:22px;text-align:center;font-size:14px;color:#8890aa}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ONBOARDING GATE ──────── */
.gate{
  position:fixed;
  inset:0;
  z-index:280;
  background:#0a0c10;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:calc(env(safe-area-inset-top,0px) + var(--gate-top)) var(--page-pad) 16px;
  overflow-y:auto;
}

.gate.closing{
  pointer-events:none;
  transform-origin:top center;
  animation:gateLift .9s cubic-bezier(.6,0,.3,1) both;
}
@keyframes gateLift{
  0%  { transform:translateY(0) scaleY(1); }
  22% { transform:translateY(0) scaleY(.93); }
  100%{ transform:translateY(-104%) scaleY(1.06); }
}
.gate-inner{width:100%;max-width:360px}
.gate-inner:not(.in){opacity:0}
.gate-inner.in{animation:gatePop .62s cubic-bezier(.22,1.12,.36,1) both}
@keyframes gatePop{
  0%  { opacity:0; transform:scale(.94) translateY(18px); }
  70% { opacity:1; transform:scale(1.01) translateY(-2px); }
  100%{ opacity:1; transform:scale(1) translateY(0); }
}
.gate-logo{width:64px;height:64px;border-radius:20px;background:rgba(232,184,75,.13);border:1px solid rgba(232,184,75,.22);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;overflow:hidden;animation:breathe 3s ease-in-out infinite}
.gate-logo img{width:100%;height:100%;object-fit:cover;display:none}
.gate-title{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.02em;text-align:center;margin-bottom:7px}
.gate-sub{font-size:14px;color:#8890aa;text-align:center;line-height:1.6;margin-bottom:30px}
.gate select.form-inp{-webkit-appearance:none;appearance:none;cursor:pointer;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='%238890aa' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 15px center;padding-right:38px}
.gate select.form-inp:disabled{opacity:.4;cursor:default}
.gate .srch{margin-bottom:0}
.gate .sug{left:0;right:0}
.gate-name-wrap{transition:opacity .2s}
.gate .form-g{padding:0 20px}
.gate .sub-btn{margin-left:20px;margin-right:20px;width:calc(100% - 40px)}

/* ── GATE LOADING OVERLAY ── */
/* ── SPLASH ──
   One boot screen only: it now stays up until getConfig + getAllVolunteers land,
   so the old splash-dots → gate-dots → form double-loader is gone. */
#native-splash{position:fixed;inset:0;z-index:9999;background:#0a0c10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transform-origin:center 45%;transition:opacity .55s cubic-bezier(.22,1,.36,1),transform .55s cubic-bezier(.55,0,.5,1)}
#native-splash.off{opacity:0;transform:scale(1.14);pointer-events:none}
#native-splash .big-spin{margin:0}

/* ── GATE FIELDS — no labels; each control speaks for itself ── */
.gate-name-wrap .form-inp{width:100%;padding-left:15px;min-height:46px}

/* ── PANE LOADER (Lagu / Dresscode tabs) ── */
.pane-load{padding:24px 14px;text-align:center}
.pane-load .big-spin{margin:0 auto 10px}

/* ── GATE DEPT PICKER — same pill as the main header ── */
/* The trigger doesn't CONTAIN a pill — it IS the pill. renderDeptTrigger_ paints
   the picked dept's own bg/fg straight onto this element. */
.dept-pick{position:relative}
.dept-trig{width:100%;min-height:46px;background:#12151c;border:1.5px solid rgba(255,255,255,.13);border-radius:13px;padding:7px 11px 7px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:border-color .2s,box-shadow .2s,background .2s}
.dept-trig.on{box-shadow:0 0 0 3px rgba(232,184,75,.1)}
.dept-trig:not(.picked).on{border-color:#e8b84b}
.dept-trig-body{display:flex;align-items:center;gap:7px;min-width:0}
.dept-trig-ph{font-size:14px;color:#4a5070;padding:0 2px}
.dept-trig-chev{margin-left:auto;padding-left:2px;flex-shrink:0;transition:transform .22s cubic-bezier(.34,1.7,.64,1)}
.dept-trig.on .dept-trig-chev{transform:rotate(180deg)}
.dept-menu{position:absolute;top:calc(100% + 5px);left:0;right:0;z-index:120;background:#12151c;border:1.5px solid rgba(255,255,255,.13);border-radius:14px;padding:6px;max-height:264px;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;box-shadow:0 14px 44px rgba(0,0,0,.75);animation:popIn .16s cubic-bezier(.34,1.5,.64,1) both}
.dept-opt{display:flex;align-items:center;gap:8px;padding:6px;border-radius:10px;cursor:pointer;transition:background .1s}
.dept-opt:active{background:#1a1e28}
/* --d-fg/--d-bg are set inline per option from DEPT_META, so the selected row
   and its check pick up that dept's own color instead of a generic white tint. */
.dept-opt.sel{background:var(--d-bg,rgba(255,255,255,.04));box-shadow:inset 0 0 0 1px var(--d-fg,transparent)}
.dept-opt-check{margin-left:auto;color:var(--d-fg,#e8b84b);flex-shrink:0;opacity:0;transition:opacity .12s}
.dept-opt.sel .dept-opt-check{opacity:1}

/* ── TOOL PAGES (WL songlist / QC dresscode+selfie) ── */
.tool-wrap{padding-top:6px;animation:fadeUp .3s cubic-bezier(.22,1,.36,1)}
.tool-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.02em;margin-bottom:6px}
.tool-sub{font-size:13px;color:#8890aa;line-height:1.55;margin-bottom:18px}
.tool-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.tool-month-lbl{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#e8b84b}
/* songlist cards */
.tsl-card{display:flex;align-items:center;gap:13px;background:#12151c;border:1.5px solid rgba(255,255,255,.08);border-radius:15px;padding:14px 15px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;animation:fadeUp .28s cubic-bezier(.22,1,.36,1) both}
.tsl-card:active{background:#1a1e28}
.tsl-card.has{border-color:rgba(74,222,128,.3)}
.tsl-icon{width:42px;height:42px;border-radius:12px;background:rgba(232,184,75,.13);color:#e8b84b;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tsl-info{flex:1;min-width:0}
.tsl-grp{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#f0f0f5}
.tsl-count{font-size:12px;color:#8890aa;margin-top:2px}
.tsl-card.has .tsl-count{color:#4ade80}
.tsl-arrow{color:#4a5070;flex-shrink:0}
.tsl-daygroup{margin-bottom:20px}
.tsl-daylbl{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#e8b84b;margin-top:30px;margin-bottom:10px}
/* songlist editor (slide-in) */
.tool-editor{position:fixed;top:0;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;z-index:100;background:#0d0f14;transform:translateX(100%);visibility:hidden;transition:transform .32s cubic-bezier(.22,1,.36,1),visibility 0s linear .32s;display:flex;flex-direction:column;overflow:hidden;padding-top:env(safe-area-inset-top,0px)}
.tool-editor.on{transform:translateX(0);visibility:visible;transition:transform .32s cubic-bezier(.22,1,.36,1),visibility 0s}
@media(max-width:480px){.tool-editor{transform:translateX(100vw)}.tool-editor.on{transform:translateX(0)}}
.te-hdr{padding:14px var(--page-pad);background:#0d0f14;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.te-hdr-row{display:flex;align-items:center;gap:12px}
.te-back{width:36px;height:36px;border-radius:10px;background:none;border:1.5px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#f0f0f5;flex-shrink:0}
.te-info{flex:1;min-width:0}
.te-date{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#f0f0f5}
.te-sub{font-size:13px;color:#8890aa;margin-top:2px}
.te-body{flex:1;overflow-y:auto;padding:16px var(--page-pad) 120px}
/* reuse admin's .sl-* classes for song rows */
.tsl-row{background:#1a1e28;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px;margin-bottom:10px;position:relative}
.tsl-row-no{margin-bottom:9px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#4a5070}
.tsl-inp{width:100%;background:#12151c;border:1.5px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:#f0f0f5;outline:none;margin-bottom:8px;-webkit-appearance:none}
.tsl-inp:focus{border-color:#e8b84b}
.tsl-inp::placeholder{color:#4a5070}
.tsl-inp:last-of-type{margin-bottom:0}
.tsl-remove{margin-top:14px;background:none;border:none;color:#f87171;font-size:12px;font-weight:600;cursor:pointer;padding:2px 0;display:inline-flex;align-items:center;gap:4px}
.tsl-add-btn{width:100%;padding:11px;border-radius:11px;border:1.5px dashed rgba(232,184,75,.4);background:rgba(232,184,75,.06);color:#e8b84b;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:12px}
.tsl-save-btn{width:100%;padding:12px;border-radius:11px;border:none;background:#333744;color:#666a7a;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:default;transition:background .2s,color .2s}
.tsl-save-btn.dirty{background:#e8b84b;color:#0a0c10;cursor:pointer}
.tsl-empty{font-size:13px;color:#8890aa;text-align:center;padding:10px 0}
/* dresscode tool */
.tdc-dept-tabs{display:flex;gap:5px;background:#12151c;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:5px;margin-bottom:16px}
.tdc-dept-tab{flex:1;padding:11px 0;border:none;border-radius:10px;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .18s}
.tdc-dept-tab.on{box-shadow:inset 0 0 0 1px currentColor}
.tdc-week{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#e8b84b;background:rgba(232,184,75,.15);padding:2px 7px;border-radius:20px;margin-left:7px}
.tdc-daygroup{margin-bottom:20px}
.tdc-daylbl{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#e8b84b;margin-top:30px;margin-bottom:10px}
.tdc-card{background:#12151c;border:1.5px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;margin-bottom:10px}
.tdc-card.has{border-color:rgba(74,222,128,.3)}
.tdc-card-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.tdc-svc{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#f0f0f5}
.tdc-stat{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.tdc-stat.has{background:rgba(74,222,128,.16);color:#4ade80}
.tdc-stat.none{background:rgba(255,255,255,.06);color:#8890aa}
.tdc-url-inp{width:100%;background:#0f1218;border:1.5px solid rgba(255,255,255,.12);border-radius:9px;padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:13px;color:#f0f0f5;outline:none;margin-bottom:8px;-webkit-appearance:none}
.tdc-url-inp:focus{border-color:#e8b84b}
.tdc-row-actions{display:flex;gap:8px;align-items:center}
.tdc-save{flex:1;padding:9px;border-radius:9px;border:none;background:#333744;color:#666a7a;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:default}
.tdc-save.dirty{background:#e8b84b;color:#0a0c10;cursor:pointer}
.tdc-open{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#e8b84b;text-decoration:none;padding:9px 12px;border:1px solid rgba(232,184,75,.3);border-radius:9px}
.tdc-custom-tag{font-size:10px;font-weight:700;text-transform:uppercase;color:#c084fc;background:rgba(192,132,252,.15);padding:2px 7px;border-radius:20px;margin-left:7px}
/* selfie queue */
.tsq-groups{display:flex;gap:5px;background:#12151c;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:5px;margin-bottom:10px}
.tsq-gbtn{flex:1;padding:12px 0;border:none;border-radius:10px;background:none;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#8890aa;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .18s}
.tsq-gbtn.on{background:rgba(232,184,75,.15);color:#e8b84b;box-shadow:inset 0 0 0 1px rgba(232,184,75,.35)}
.tsq-gdot{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:20px;background:#e8b84b;color:#0a0c10;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700}
.tsq-filter{display:flex;gap:6px;margin-bottom:16px}
.tsq-fbtn{flex:1;padding:9px 0;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:#12151c;color:#8890aa;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.tsq-fbtn.on{background:#222737;color:#f0f0f5;border-color:rgba(232,184,75,.4)}
.tsq-card{background:#12151c;border:1.5px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;margin-bottom:14px}
.tsq-card.approved{border-color:rgba(74,222,128,.35)}
.tsq-card.rejected{border-color:rgba(248,113,113,.35)}
.tsq-img{width:100%;max-height:340px;object-fit:contain;background:#000;display:block;cursor:zoom-in}
.tsq-body{padding:13px 15px}
.tsq-name{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#f0f0f5}
.tsq-meta{font-size:12px;color:#8890aa;margin-top:2px}
.tsq-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:8px}
.tsq-badge.pending{background:rgba(232,184,75,.16);color:#e8b84b}
.tsq-badge.approved{background:rgba(74,222,128,.16);color:#4ade80}
.tsq-badge.rejected{background:rgba(248,113,113,.16);color:#f87171}
.tsq-actions{display:flex;gap:8px;margin-top:12px}
.tsq-btn{flex:1;padding:10px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.tsq-approve{background:#4ade80;color:#08210f}
.tsq-reject{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.35)}
.tsq-btn:disabled{opacity:.5;cursor:default}
.tsq-empty{text-align:center;padding:48px 16px;color:#8890aa;font-size:14px}        

.toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(20px);background:#1a1e28;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 20px;font-size:14px;color:#f0f0f5;box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap;z-index:500}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(74,222,128,.3);color:#4ade80}
.toast.err{border-color:rgba(248,113,113,.3);color:#f87171}
.toast.warn{border-color:rgba(232,184,75,.3);color:#e8b84b}

        
        
</style>
</head>

};
var API_WRITE_ACTIONS = ['submitFeedback','saveMyAvailability','uploadSelfie','saveSonglist','saveDresscode','approveSelfie'];

function callApi(action, args){
  var names = API_PARAM_MAP[action] || [];
  var params = {action: action};
  names.forEach(function(name, i){
    var val = args[i];
    params[name] = (val===undefined || val===null) ? "" : val;
  });
  if (API_WRITE_ACTIONS.indexOf(action) !== -1){
    return fetch(EXEC_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(params)
    }).then(function(r){ return r.json(); });
  }
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
  }).join('&');
  return fetch(EXEC_URL + '?' + qs).then(function(r){ return r.json(); });
}

function GasRun(){ this._s=null; this._f=null; }
GasRun.prototype.withSuccessHandler=function(fn){ this._s=fn; return this; };
GasRun.prototype.withFailureHandler=function(fn){ this._f=fn; return this; };
Object.keys(API_PARAM_MAP).forEach(function(fnName){
  GasRun.prototype[fnName]=function(){
    var args=Array.prototype.slice.call(arguments), s=this._s, f=this._f;
    callApi(fnName, args).then(function(data){
      if (data && data.error){ if(f) f({message:data.error}); else console.error(data.error); return; }
      if (s) s(data);
    }).catch(function(err){
      if (f) f({message: err.message || String(err)}); else console.error(err);
    });
    return this;
  };
});

/* ── GATE BOOT ──
   Memory now only PREFILLS the gate (dept + name). The person still has to tap
   Masuk to enter — no more abrupt auto-jump into the app on refresh.
   The overlay stays up until both getConfig + getAllVolunteers land, so the
   dept dropdown / name search can't be touched before their data exists. */
var gateReady_={config:false,vols:false,done:false};

function markGateReady_(which){
  gateReady_[which]=true;
  if(gateReady_.done||!gateReady_.config||!gateReady_.vols)return;
  gateReady_.done=true;
  prefillGateFromMemory_();
  hideSplash();
}

// Safety valve: a dead API must never trap the person behind the loader.
setTimeout(function(){markGateReady_("config");markGateReady_("vols");},8000);

function prefillGateFromMemory_(){
  var savedName=null;
  try{ savedName=localStorage.getItem(APP_CONFIG.storagePrefix+"volName"); }catch(e){ console.warn("localStorage read failed",e); }
  if(!savedName)return;
  var match=(st.allMusicians||[]).find(function(m){return m.name===savedName;});
  if(!match)return;

 if(!match.dept||(st.departments||[]).indexOf(match.dept)===-1)return;  // dept gone from config → pick fresh

  setGateDept_(match.dept);   // no focus() in here, so the keyboard stays down
  document.getElementById("gate-name-inp").value=match.name;
  st.gateSelectedVol=match;
  hideGateSug();
  document.getElementById("gate-enter-btn").disabled=false;
  prefetchSchedule_(match.name);   // returning person → warm it before they even tap
}

}).withFailureHandler(function(e){

/* ── SCHEDULE PREFETCH ──
   getVolunteerSchedule is the heavy one — it bundles events + rosters + extras.
   The new gate flow hands us a free window: the person picks a name, then reads
   the form and reaches for Masuk. Firing the request the instant they tap a name
   means it's usually already home by the time Masuk is pressed, so the loader
   flashes instead of hanging. If they're fast, fetchSchedule_ just piggybacks on
   the in-flight request rather than sending a second one. */
function fetchSchedule_(name,onOk,onErr){
  if(st.schedCache[name]!==undefined){onOk(st.schedCache[name]);return;}
  var w=st.schedInflight[name];
  if(w){w.ok.push(onOk);w.err.push(onErr);return;}
  w=st.schedInflight[name]={ok:[onOk],err:[onErr]};
  google.script.run.withSuccessHandler(function(d){
    st.schedCache[name]=d;delete st.schedInflight[name];
    w.ok.forEach(function(f){try{f(d);}catch(err){console.error(err);}});
  }).withFailureHandler(function(e){
    delete st.schedInflight[name];
    w.err.forEach(function(f){try{f(e);}catch(err){console.error(err);}});
  }).getVolunteerSchedule(name);
}

function prefetchSchedule_(name){
  if(!name)return;
  fetchSchedule_(name,function(){},function(){});   // fire and forget — warms the cache only
}

  // Cold cache → full-page spinner with header hidden for a clean look.

/* ── MERGE related services into one card ──
   Ibadah 1/2/3 → "Ibadah 123"   (only when a person serves all three)
   AOG Teens + AOG Youth → "AOG"  (only when a person serves both)
   Voltage always stays on its own. A group only merges when the role is the
   SAME across every member service; otherwise the cards stay separate. */
var MERGE_GROUPS=[
  {members:["Umum 1","Umum 2","Umum 3"], label:"Umum", time:"07:00, 09:30, 17:00"},
  {members:["AOG Teens","AOG Youth"],     label:"AOG",  time:"16:00, 18:30"}
];

// representative service for song/dress/selfie on a merged card (first member)
function svcOf_(ev){return ev&&ev.merged&&ev.merged.length?ev.merged[0]:(ev&&ev.service);}

// For a date's service→event map, return the merge group `service` folds into —
// but only if EVERY member is present that date AND all share the same role.
// Otherwise null, so the card stays separate.
function matchMergeGroup_(dateMap,service){
  if(!dateMap)return null;
  for(var i=0;i<MERGE_GROUPS.length;i++){
    var g=MERGE_GROUPS[i];
    if(g.members.indexOf(service)===-1)continue;
    var allPresent=g.members.every(function(sv){return dateMap[sv];});
    if(!allPresent)continue;
    var role0=dateMap[g.members[0]].role;
    var sameRole=g.members.every(function(sv){return dateMap[sv].role===role0;});
    if(!sameRole)continue;
    return g;
  }
  return null;
}

function mergeServiceGroups_(events){
  var byDate={};
  events.forEach(function(e){(byDate[e.date]=byDate[e.date]||{})[e.service]=e;});
  var out=[],emitted={};
  events.forEach(function(e){
    var g=matchMergeGroup_(byDate[e.date],e.service);
    if(!g){out.push(e);return;}            // not part of a full same-role group → keep as-is
    var mergedKey=e.date+"|"+g.label;
    if(emitted[mergedKey])return;          // merged card already added → drop the siblings
    emitted[mergedKey]=true;
    var m=byDate[e.date],mem=g.members,first=m[mem[0]];
    var subs=mem.map(function(sv){return m[sv].subStatus||"aktif";});
    var subStatus=subs.every(function(x){return x===subs[0];})?subs[0]:"aktif";
    out.push({
      date:e.date,
      service:g.label,
      time:g.time,
      role:first.role,
      name:e.name,
      isPast:mem.every(function(sv){return m[sv].isPast;}),
      isSpecial:mem.some(function(sv){return !!m[sv].isSpecial;}),
      subStatus:subStatus,
      merged:mem.slice()
    });
  });
  return out;
}

function fetchMergedRoster_(ev,onOk,onErr){
  var services=ev.merged,dept=st.vol&&st.vol.dept;
  var results=new Array(services.length),pending=services.length,failed=false;
  services.forEach(function(svc,i){
    var k=ev.date+"|"+svc;
    if(st.rosterCache[k]){                       // reuse the roster bundle already loaded
      results[i]=st.rosterCache[k];
      if(--pending===0&&!failed)onOk(combineRosters_(results));
      return;
    }
    google.script.run
      .withSuccessHandler(function(data){
        st.rosterCache[k]=data;results[i]=data;
        if(--pending===0&&!failed)onOk(combineRosters_(results));
      })
      .withFailureHandler(function(e){if(!failed){failed=true;onErr(e);}})
      .getServiceRoster(ev.date,svc,dept);
  });
}

function combineRosters_(list){
  var outSlots={},groupLabel="";
  list.forEach(function(data){
    if(!data)return;
    var slots=data.slots||data;
    if(data.groupLabel&&!groupLabel)groupLabel=data.groupLabel;
    Object.keys(slots).forEach(function(role){
      if(!outSlots[role])outSlots[role]=[];
      (slots[role]||[]).forEach(function(slot){
        var on=(slot.original&&slot.original.name)||"";
        var sn=(slot.substitute&&slot.substitute.name)||"";
        var dup=outSlots[role].some(function(x){
          return((x.original&&x.original.name)||"")===on&&((x.substitute&&x.substitute.name)||"")===sn;
        });
        if(!dup)outSlots[role].push(slot);      // union per role, de-dup identical people
      });
    });
  });
  return{slots:outSlots,groupLabel:groupLabel};
}

function fillRoster(elId,data,myName){
  var el=document.getElementById(elId);if(!el)return;
  var slots=data.slots||data,groupLabel=data.groupLabel||"",myLo=myName.toLowerCase();
  if(!Object.keys(slots).length){setRosterHTML(el,'<div style="color:#8890aa;font-size:13px;text-align:center;padding:6px">Belum ada data roster.</div>');return;}
  var h="",prevSeg=null,prevSub=null,segOpen=false;
  // Show PAW speaker for non-PAW depts (read-only, injected by backend)

}
function renderKetersediaan(){

function loadMyAvailability(){
  google.script.run
    .withSuccessHandler(function(res){
      var days=(res&&res.days)||[];
      st.availBlocked={};days.forEach(function(d){st.availBlocked[d]=true;});
      st.availDirty=false;
      buildKetersediaanUI();
    })
    .withFailureHandler(function(e){showErr(e.message);})
    .getMyAvailability(st.vol.name,st.vol.dept,st.availSelYear,st.availSelMonth);

function buildKetersediaanUI(){
  contentReady_();
  var y=st.availSelYear,m=st.availSelMonth;
  var h='<div class="av-wrap">';
  h+='<div class="av-vol-line">Ketersediaan untuk <b>'+esc(st.vol.name)+'</b></div>';
  if(st.availOpenMonths.length>1){
    h+='<div class="av-month-pills">';
    st.availOpenMonths.forEach(function(mo){
      var on=mo.year===y&&mo.month===m;
      h+='<button class="av-month-pill'+(on?' on':'')+'" onclick="selectAvailMonth('+mo.year+','+mo.month+')">'+esc(mo.label)+'</button>';
    });
    h+='</div>';
  } else {
    h+='<div class="av-month-single">'+BLN_L[m]+' '+y+'</div>';
  }
  h+='<div class="av-hint">Ketuk tanggal Sabtu/Minggu yang <b style="color:#f87171">TIDAK bisa</b> kamu layani. Merah = blokir.</div>';
  h+=buildAvailCal(y,m);
  h+='<button class="av-save-btn'+(st.availDirty?' dirty':'')+'" id="av-save" onclick="saveAvail()"'+(st.availDirty?'':' disabled')+'>Simpan Ketersediaan ✓</button>';
  h+='</div>';
  document.getElementById("content").innerHTML=h;
}

function buildAvailCal(year,mon){
  var fd=new Date(year,mon,1).getDay(),days=new Date(year,mon+1,0).getDate();
  var h='<div class="av-cal"><div class="av-cal-dow-row">';
  DOW.forEach(function(l){h+='<div class="av-cal-dow">'+l+'</div>';});
  h+='</div><div class="av-cal-grid">';
  for(var i=0;i<fd;i++)h+='<div class="av-cell pad"></div>';
  for(var d=1;d<=days;d++){
    var dow=new Date(year,mon,d).getDay();
    if(dow!==0&&dow!==6){h+='<div class="av-cell off">'+d+'</div>';continue;}
    var blk=!!st.availBlocked[d];
    h+='<div class="av-cell svc'+(blk?' blk':'')+'" onclick="toggleBlock('+d+')">'+d+'</div>';
  }
  h+='</div></div>';
  return h;
}

function toggleBlock(day){
  if(st.availBlocked[day])delete st.availBlocked[day];
  else st.availBlocked[day]=true;
  st.availDirty=true;
  buildKetersediaanUI();
}

function selectAvailMonth(y,m){
  if(st.availDirty&&!confirm("Ada perubahan belum disimpan. Pindah bulan tanpa simpan?"))return;
  st.availSelYear=y;st.availSelMonth=m;
  loadMyAvailability();
}

function saveAvail(){
  var btn=document.getElementById("av-save");
  if(btn){btn.disabled=true;btn.textContent="Menyimpan…";}
  var days=Object.keys(st.availBlocked).map(function(x){return parseInt(x);}).filter(function(x){return !isNaN(x);}).sort(function(a,b){return a-b;});
  google.script.run
    .withSuccessHandler(function(res){
      if(res&&res.ok){
        st.availDirty=false;
        buildKetersediaanUI();
        var b=document.getElementById("av-save");if(b)b.textContent="Tersimpan ✓";
      } else {
        if(btn){btn.disabled=false;btn.textContent="Simpan Ketersediaan ✓";}
        alert((res&&res.msg)||"Gagal menyimpan.");
      }
    })
    .withFailureHandler(function(e){
      if(btn){btn.disabled=false;btn.textContent="Simpan Ketersediaan ✓";}
      alert("Gagal: "+e.message);
    })
    .saveMyAvailability(st.vol.name,st.vol.dept,st.availSelYear,st.availSelMonth,days.join(","));
}

var PANE_OUT_MS=150, PANE_DX=18;

function cardTab(e,kid,which){
  e.stopPropagation();
  var card=document.getElementById("card-"+kid);
  var beforeTop=card?card.getBoundingClientRect().top:null;   // remember header position
  var TABS=cardTabsFor_(st.vol&&st.vol.dept);   // every card on screen is one dept

  var cur=null;
  TABS.forEach(function(t){
    var p=document.getElementById("pane-"+t+"-"+kid);
    if(p&&p.classList.contains("on"))cur=t;
  });
  if(cur===which)return;   // re-tapping the active tab shouldn't replay the animation

  // buttons flip immediately — the tap should feel answered before the pane moves
  TABS.forEach(function(t){
    var tab=document.getElementById("ct-"+t+"-"+kid);
    if(tab)tab.classList.toggle("on",t===which);
  });

  var dir=(TABS.indexOf(which)>TABS.indexOf(cur))?1:-1;   // slide follows tab order
  var oldPane=cur?document.getElementById("pane-"+cur+"-"+kid):null;

  function mountNew(){
    if(oldPane){oldPane.classList.remove("on","leaving");oldPane.style.removeProperty("--pane-dx");}
    var np=document.getElementById("pane-"+which+"-"+kid);
    if(np){
      np.style.setProperty("--pane-dx",(dir*PANE_DX)+"px");   // enters from the side it came from
      np.classList.add("on");
    }
    var ev=findEventByKid_(kid);
    if(which==="song")loadCardSonglist(kid,ev);
    if(which==="dress")loadCardDresscode(kid,ev);
    growRoster(kid);
    // keep the event's date/header exactly where it was — don't let the page slide
    if(card&&beforeTop!==null){
      requestAnimationFrame(function(){
        var diff=card.getBoundingClientRect().top-beforeTop;
        if(Math.abs(diff)>1)window.scrollBy(0,diff);
      });
    }
  }

  if(oldPane){
    oldPane.style.setProperty("--pane-dx",(-dir*PANE_DX)+"px");   // exits the opposite way
    oldPane.classList.remove("on");
    oldPane.classList.add("leaving");
    setTimeout(mountNew,PANE_OUT_MS);   // close finishes before open starts
  } else mountNew();
}

/* ── CARD EXTRAS — cached + de-duped so tabs render instantly ──
   Every songlist/dresscode/selfie response is cached for the session, and a
   fetch already in flight (e.g. from a prefetch) is reused instead of re-sent. */
function cachedFetch_(cache,key,runner,onOk,onErr){
  if(cache[key]!==undefined){onOk(cache[key]);return;}      // cache hit → instant
  var w=st.inflight[key];
  if(w){w.ok.push(onOk);w.err.push(onErr);return;}           // already loading → piggyback
  w=st.inflight[key]={ok:[onOk],err:[onErr]};
  runner(function(data){
    cache[key]=data;delete st.inflight[key];
    w.ok.forEach(function(f){try{f(data);}catch(err){console.error(err);}});
  },function(e){
    delete st.inflight[key];
    w.err.forEach(function(f){try{f(e);}catch(err){console.error(err);}});
  });
}

function fetchSonglist_(ev,onOk,onErr){
  var svc=svcOf_(ev);
  cachedFetch_(st.songCache,"song|"+ev.date+"|"+svc,function(ok,err){
    google.script.run.withSuccessHandler(ok).withFailureHandler(err).getSonglist(ev.date,svc);
  },onOk,onErr||function(){});
}

function fetchDresscode_(ev,onOk,onErr){
  var svc=svcOf_(ev);
  cachedFetch_(st.dressCache,"dress|"+ev.date+"|"+svc,function(ok,err){
    google.script.run.withSuccessHandler(ok).withFailureHandler(err).getDresscode(ev.date,svc);
  },onOk,onErr||function(){});
}

// getVolunteerSchedule bundles songlist/dresscode/selfie for upcoming services
// (PAW only). Seeding them here means the Lagu/Dresscode tabs open from cache
// with no request at all — same trick as the roster bundle.
function seedExtras_(extras){
  if(!st.vol||!extras)return;
  Object.keys(extras).forEach(function(k){
    var x=extras[k]||{};
    if(x.song)st.songCache["song|"+k]=x.song;
    if(x.dress)st.dressCache["dress|"+k]=x.dress;
    if(x.selfie)st.selfieCache["selfie|"+st.vol.name+"|"+k]=x.selfie;
  });
}

function selfieKey_(ev){return"selfie|"+st.vol.name+"|"+ev.date+"|"+svcOf_(ev);}

function fetchSelfie_(ev,onOk,onErr){
  if(!st.vol){onOk(null);return;}
  var svc=svcOf_(ev);
  cachedFetch_(st.selfieCache,selfieKey_(ev),function(ok,err){
    google.script.run.withSuccessHandler(ok).withFailureHandler(err).getMySelfie(st.vol.name,ev.date,svc);
  },onOk,onErr||function(){});
}

// A bundled status is a snapshot from page load — an approval could have landed
// since. Show the cached one instantly, then quietly re-check and repaint only
// if it actually changed.
function revalidateSelfie_(kid,ev){
  if(!st.vol)return;
  var key=selfieKey_(ev),svc=svcOf_(ev);
  google.script.run.withSuccessHandler(function(res){
    var prev=st.selfieCache[key]||{};
    st.selfieCache[key]=res;
    if(prev.status!==(res&&res.status)||prev.url!==(res&&res.url))applySelfie_(kid,res);
  }).withFailureHandler(function(){}).getMySelfie(st.vol.name,ev.date,svc);
}

// Warm all three the moment a card opens, in parallel with the roster.
function prefetchCardExtras_(ev,kid){
  if(!ev||!st.vol)return;
  var dept=st.vol.dept;
  if(deptHasTab_(dept,"song"))fetchSonglist_(ev,function(res){renderSonglistPane_(kid,res);},function(){});
  if(deptHasTab_(dept,"dress")){
    fetchDresscode_(ev,function(res){renderDressPane_(kid,ev,res);},function(){});
    fetchSelfie_(ev,function(){},function(){});   // cache only; the dress pane reads it
  }
}

// One background request for the next few services' extras, fired after the
// schedule has painted. Replaces per-card prefetching (which cost 3 calls/card).
var EXTRAS_MAX=8;
function loadCardExtras_(){
  if(!st.vol||st.extrasLoaded)return;
  if(!deptHasTab_(st.vol.dept,"song")&&!deptHasTab_(st.vol.dept,"dress"))return;
  var keys=st.allEvents.filter(function(e){return !e.isPast;})
    .slice(0,EXTRAS_MAX)
    .map(function(e){return e.date+"|"+svcOf_(e);});
  if(!keys.length)return;
  st.extrasLoaded=true;
  google.script.run

// The card's max-height is measured from scrollHeight, so it MUST be re-measured
// after the image has real dimensions — otherwise the photo renders cropped.
function setSelfiePreview_(kid,url){

  if(!pv)return;

}

function applySelfie_(kid,res){
  renderSelfieStatus(kid,(res&&res.status)||"none");
  setSelfiePreview_(kid,res&&res.url);

function onSelfiePicked(e,kid){
  e.stopPropagation();
  var file=e.target.files&&e.target.files[0];
  if(!file)return;
  var ev=findEventByKid_(kid);
  if(!ev)return;
  var btn=document.getElementById("selfie-btn-"+kid);
  if(btn){btn.disabled=true;btn.textContent="Memproses…";}
  downscaleImage(file,1000,0.7,function(dataUrl){
    if(btn)btn.textContent="Mengupload…";
    google.script.run.withSuccessHandler(function(res){
      if(btn){btn.disabled=false;btn.textContent="Upload Ulang";}
      if(res&&res.ok){
        var fresh={status:"pending",url:res.url||""};
        st.selfieCache[selfieKey_(ev)]=fresh;  // keep cache honest
        applySelfie_(kid,fresh);   // preview waits for img load before re-measuring
      } else { alert((res&&res.msg)||"Gagal upload."); }
    }).withFailureHandler(function(err){
      if(btn){btn.disabled=false;btn.textContent="Upload Selfie";}
      alert("Gagal: "+err.message);
    }).uploadSelfie(st.vol.name,ev.date,svcOf_(ev),dataUrl,"image/jpeg");
  });
}

function downscaleImage(file,maxDim,quality,cb){
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
      else if(h>=w&&h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
      var cv=document.createElement("canvas");cv.width=w;cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      cb(cv.toDataURL("image/jpeg",quality));
    };
    img.onerror=function(){alert("Gambar tidak bisa dibaca.");};
    img.src=reader.result;
  };
  reader.onerror=function(){alert("Gagal membaca file.");};
  reader.readAsDataURL(file);
}

function chRingMonth(dir){
  st.ringMonth+=dir;
  if(st.ringMonth>11){st.ringMonth=0;st.ringYear++;}
  if(st.ringMonth<0){st.ringMonth=11;st.ringYear--;}
  renderRingkasan();
  // Prefetch the month BEYOND the new one so the next tap is instant
  var dept=st.vol&&st.vol.dept;
  if(dept){
    var ahead=dir>0?nextMonth_(st.ringYear,st.ringMonth):prevMonth_(st.ringYear,st.ringMonth);
    var ck=dept+"|"+mKey(ahead.y,ahead.m);
    if(!st.ringCache[ck]){
      google.script.run.withSuccessHandler(function(data){st.ringCache[ck]=data;}).withFailureHandler(function(){}).getPublicMonthData(ahead.y,ahead.m,dept);
    }
  }
}

  h+='<div style="padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.08);background:#12151c">'+

function saveRingkasanAsImage(){
  var outerWrapper=document.getElementById("ring-table-wrap");
  var scrollDiv=outerWrapper?outerWrapper.querySelector(".ring-scroll"):null;
  var table=outerWrapper?outerWrapper.querySelector(".ring-tbl"):null;
  if(!outerWrapper||!table){alert("Tidak ada data tabel untuk disimpan.");return;}

  var savedOuter={overflow:outerWrapper.style.overflow,width:outerWrapper.style.width};
  var savedScroll={overflowX:scrollDiv.style.overflowX,width:scrollDiv.style.width};
  outerWrapper.style.overflow="visible";
  outerWrapper.style.width=table.scrollWidth+"px";
  scrollDiv.style.overflowX="visible";
  scrollDiv.style.width=table.scrollWidth+"px";

  html2canvas(outerWrapper,{
    scrollX:0,scrollY:0,
    windowWidth:outerWrapper.scrollWidth,windowHeight:outerWrapper.scrollHeight,
    backgroundColor:"#0a0c10",scale:2
  }).then(function(canvas){
    outerWrapper.style.overflow=savedOuter.overflow;
    outerWrapper.style.width=savedOuter.width;
    scrollDiv.style.overflowX=savedScroll.overflowX;
    scrollDiv.style.width=savedScroll.width;
    var link=document.createElement("a");
    var deptTag=(st.vol&&st.vol.dept)||"Jadwal";
    link.download="Jadwal_"+deptTag+"_"+BLN_L[st.ringMonth]+"_"+st.ringYear+".png";
    link.href=canvas.toDataURL("image/png");
    link.click();
  }).catch(function(err){
    outerWrapper.style.overflow=savedOuter.overflow;
    outerWrapper.style.width=savedOuter.width;
    scrollDiv.style.overflowX=savedScroll.overflowX;
    scrollDiv.style.width=savedScroll.width;
    console.error(err);alert("Gagal membuat gambar. Silakan coba lagi.");
  });
}

var SAT_TEMPLATES=[{service:"Voltage",time:"13:00"},{service:"AOG Teens",time:"16:00"},{service:"AOG Youth",time:"18:30"}];
var SUN_TEMPLATES=[{service:"Umum 1",time:"07:00"},{service:"Umum 2",time:"09:30"},{service:"Umum 3",time:"17:00"}];

/* ── TOOL PREFETCHERS (fire once on login, warm caches) ────── */
function prefetchToolSonglist(){
  var y=st.viewYear,m=st.viewMonth,mkey=y+"-"+m;
  if(st.toolSongCardsKey===mkey)return;
  google.script.run.withSuccessHandler(function(res){
    st.toolSongCards=(res&&res.cards)||[];st.toolSongCardsKey=mkey;
  }).withFailureHandler(function(){}).getSonglistCards(y,m);
}

function prefetchToolDresscode(){
  if(!st._toolDressByKey)st._toolDressByKey={};
  var y=st.viewYear,m=st.viewMonth;
  // Fetch the first dept to get the depts list, then fetch the rest
  var first=st.toolDressDept||(st.toolDressDepts&&st.toolDressDepts[0])||"PAW";
  st.toolDressDept=first;
  var ckey1=y+"-"+m+"|"+first;
  if(st._toolDressByKey[ckey1])return;
  callApi('getDresscodeList',[y,m,first]).then(function(res){
    var depts=(res&&res.depts)||["PAW","Usher"];
    st.toolDressDepts=depts;
    if(depts.indexOf(st.toolDressDept)===-1)st.toolDressDept=depts[0];
    var list=generateDressSlotsVol(y,m,(res&&res.items)||[]);
    st.toolDressList=list;
    st._toolDressByKey[y+"-"+m+"|"+first]={list:list,depts:depts};
    // Prefetch every other dept in background
    depts.forEach(function(d){
      if(d===first)return;
      var ck=y+"-"+m+"|"+d;
      if(st._toolDressByKey[ck])return;
      callApi('getDresscodeList',[y,m,d]).then(function(r2){
        st._toolDressByKey[ck]={list:generateDressSlotsVol(y,m,(r2&&r2.items)||[]),depts:depts};
      }).catch(function(){});
    });
  }).catch(function(){});
}

function prefetchToolSelfie(){
  if(st._toolSelfieLoaded)return;
  callApi('getSelfieQueue',[st.vol.name]).then(function(res){
    st.toolSelfieItems=(res&&res.items)||[];st._toolSelfieLoaded=true;
  }).catch(function(){});
}

function saveToolSonglist(){
  var clean=(st.toolSongs||[]).filter(function(s){return(s.judul||"").trim();}).map(function(s){return{judul:s.judul.trim(),pencipta:(s.pencipta||"").trim(),link:(s.link||"").trim()};});
  var btn=document.getElementById("tsl-save");if(btn){btn.disabled=true;btn.textContent="Menyimpan…";}
  callApi('saveSonglist',[st.toolSongDate,st.toolSongGroup,JSON.stringify(clean),st.vol.name]).then(function(res){
    if(res&&res.ok){
      st.toolSongs=clean;st.toolSongDirty=false;renderToolSongEditorBody();
      if(st.toolSongIdx!==null&&st.toolSongCards[st.toolSongIdx]){st.toolSongCards[st.toolSongIdx].songs=clean;st.toolSongCards[st.toolSongIdx].songCount=clean.length;}
      // also invalidate volunteer song cache so the read-only pane picks up the edit
      Object.keys(st.songCache).forEach(function(k){if(k.indexOf(st.toolSongDate)!==-1)delete st.songCache[k];});
      showToast((res&&res.msg)||"Songlist tersimpan.","ok");
    } else {if(btn){btn.disabled=false;btn.classList.add("dirty");}showToast((res&&res.msg)||"Gagal.","err");}
  }).catch(function(e){if(btn){btn.disabled=false;btn.classList.add("dirty");}showToast("Gagal: "+(e.message||e),"err");});
}

/* ── QC DRESSCODE TOOL ──────────────────────────────────────── */
function dressWeekVol_(dateStr){return Math.ceil(parseInt(dateStr.split("-")[2],10)/7);}
// Groups templates the same way songlist does: Umum 1/2/3 → "Umum",
// AOG Teens/Youth → "AOG", Voltage stays "Voltage". One dresscode per group.
function dressGroupOf_(svc){
  var s=String(svc||"").trim();
  if(/^umum(\s*[123])?$/i.test(s))return "Umum";
  if(/^aog(\s|$)/i.test(s))return "AOG";
  if(/^voltage$/i.test(s))return "Voltage";
  return s;
}

function generateDressSlotsVol(year,month,saved){
  var map={},order=[];
  var d=new Date(year,month,1);
  while(d.getMonth()===month){
    var dow=d.getDay(),tpls=(dow===6)?SAT_TEMPLATES:(dow===0)?SUN_TEMPLATES:null;
    if(tpls){
      var ds=year+"-"+pad(month+1)+"-"+pad(d.getDate());
      var seen={};
      tpls.forEach(function(t){
        var grp=dressGroupOf_(t.service);
        if(seen[grp])return;seen[grp]=true;
        var k=ds+"|"+grp;
        if(!map[k]){map[k]={date:ds,service:grp,pdfUrl:"",isCustom:false};order.push(k);}
      });
    }
    d.setDate(d.getDate()+1);
  }
  (saved||[]).forEach(function(s){
    var grp=dressGroupOf_(s.service);
    var k=s.date+"|"+grp;
    if(map[k]){map[k].pdfUrl=s.pdfUrl;}
    else{map[k]={date:s.date,service:grp,pdfUrl:s.pdfUrl,isCustom:true};order.push(k);}
  });
  // Sort by date, then fixed group order: Voltage > AOG > Umum > custom
  var groupRank={"Voltage":0,"AOG":1,"Umum":2};
  order.sort(function(a,b){
    var da=a.split("|")[0],db=b.split("|")[0];
    if(da!==db)return da<db?-1:1;
    var ga=a.split("|")[1],gb=b.split("|")[1];
    var ra=groupRank[ga]!==undefined?groupRank[ga]:3;
    var rb=groupRank[gb]!==undefined?groupRank[gb]:3;
    return ra-rb;
  });
  return order.map(function(k){return map[k];});
}

}
